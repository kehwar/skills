# Engineering skill adaptation manifest for upstream/mattpocock
#
# Only skills listed here are rebuilt from upstream. Skills not listed
# (custom originals, manually managed) are left untouched.
#
# Each entry: source path + optional steps.
# Steps run in order: copy dir -> replace -> patch.
#
# Step types:
#   - replace: {old: "...", new: ""}          Simple find-and-replace
#   - replace: {target: "frontmatter.X", ...}  YAML frontmatter field replacement
#   - replace: {old: "...", new: "...", regex: true}  Regex replacement (\1 groups supported)
#   - patch: "path/to/patch.patch"            Apply unified diff patch file

patches_dir: patches/mattpocock

skills:
  # ── Copy-only (no changes needed) ──
  tdd:
    source: engineering/tdd

  codebase-design:
    source: engineering/codebase-design

  prototype:
    source: engineering/prototype

  research:
    source: engineering/research

  resolving-merge-conflicts:
    source: engineering/resolving-merge-conflicts

  diagnosing-bugs:
    source: engineering/diagnosing-bugs

  implement:
    source: engineering/implement

  handoff:
    source: productivity/handoff

  teach:
    source: productivity/teach

  writing-great-skills:
    source: productivity/writing-great-skills

  improve-codebase-architecture:
    source: engineering/improve-codebase-architecture

  # ── Text replacements ──

  code-review:
    source: engineering/code-review
    steps:
      - replace:
          old: 'run `/setup-matt-pocock-skills` if `docs/agents/issue-tracker.md` is missing'
          new: "use the /issue-tracker skill if it's missing"
      - replace:
          old: 'in `docs/agents/issue-tracker.md`'
          new: 'in /issue-tracker'

  spec-review:
    source: engineering/code-review
    steps:
      - replace:
          old: '^name: code-review$'
          new: 'name: spec-review'
          regex: true
      - replace:
          old: '^(description: )Review the changes since a fixed point \(commit, branch, tag, or merge-base\)'
          new: '\1Review the current code state'
          regex: true
      - replace:
          old: 'Use when the user wants to review a branch, a PR, work-in-progress changes, or asks to "review since X".'
          new: 'Use when a feature or implementation needs a holistic review of current code against a spec and standards.'
      - replace:
          old: 'the diff between `HEAD` and a fixed point the user supplies'
          new: 'the current code state in the checkout'
      - replace:
          old: 'The issue tracker should have been provided to you — run `/setup-matt-pocock-skills` if `docs/agents/issue-tracker.md` is missing.'
          new: "The issue tracker should have been provided to you — use the /issue-tracker skill if it's missing."
      - replace:
          old: 'in `docs/agents/issue-tracker.md`'
          new: 'in /issue-tracker'
      - replace:
          old: '### 1. Pin the fixed point'
          new: '### 1. Establish the review subject'
      - replace:
          old: 'Whatever the user said is the fixed point — a commit SHA, branch name, tag, `main`, `HEAD~5`, etc.'
          new: 'Use the spec and the user''s description to identify the feature or area under review. The review subject is the current code state.'
      - replace:
          old: ' If they didn''t specify one, ask for it.'
          new: ''
      - replace:
          old: 'Capture the diff command once:'
          new: 'Read the relevant implementation, tests, configuration, and documentation in the current checkout, including code that was not recently changed.'
      - replace:
          old: ' `git diff <fixed-point>...HEAD` (three-dot, so the comparison is against the merge-base). Also note the list of commits via `git log <fixed-point>..HEAD --oneline`.'
          new: ''
      - replace:
          old: 'Before going further, confirm the fixed point resolves (`git rev-parse <fixed-point>`) and the diff is non-empty.'
          new: 'Before going further, confirm that you can name the implementation paths and behaviour covered by the review.'
      - replace:
          old: 'A bad ref or empty diff should fail here — not inside two parallel sub-agents.'
          new: 'If the feature or code area cannot be identified, ask the user for its scope.'
      - replace:
          old: 'match it against the diff'
          new: 'match it against the relevant current code'
      - replace:
          old: 'more than one hunk or file in the change'
          new: 'more than one relevant file or code path'
      - replace:
          old: 'recurs across the change'
          new: 'recurs across the relevant code'
      - replace:
          old: 'one logical change forces scattered edits across many files in the diff'
          new: 'one logical behaviour is scattered across many files or modules'
      - replace:
          old: 'one file or module is edited for several unrelated reasons'
          new: 'one file or module is responsible for several unrelated reasons to change'
      - replace:
          old: 'The full diff command and commit list.'
          new: 'The review subject and current implementation paths.'
      - replace:
          old: 'The diff command and commit list.'
          new: 'The review subject and current implementation paths.'
      - replace:
          old: 'per file/hunk where relevant'
          new: 'per file/location where relevant'
      - replace:
          old: 'the diff violates'
          new: 'the current code violates'
      - replace:
          old: 'quote the hunk'
          new: 'quote the relevant code'
      - replace:
          old: 'behaviour in the diff'
          new: 'behaviour in the current implementation'
      - replace:
          old: 'Quote the spec line for each finding.'
          new: 'Quote the spec line and cite the relevant code location for each finding.'
      - replace:
          old: 'A change can pass one axis and fail the other:'
          new: 'A current implementation can pass one axis and fail the other:'
      - replace:
          old: 'does exactly what the issue asked'
          new: 'does exactly what the spec asks'

  to-tickets:
    source: engineering/to-tickets
    steps:
      - replace:
          old: "run `/setup-matt-pocock-skills` if not."
          new: "use the /issue-tracker skill if not."
      - replace:
          old: "depends on the tracker `/setup-matt-pocock-skills` configured"
          new: "depends on /issue-tracker skill"

  to-spec:
    source: engineering/to-spec
    steps:
      - replace:
          old: "run `/setup-matt-pocock-skills` if not."
          new: "use the /issue-tracker skill if not."

  wayfinder:
    source: engineering/wayfinder
    steps:
      - replace:
          old: "run `/setup-matt-pocock-skills` if not."
          new: "use the /issue-tracker skill if not."

  domain-modeling:
    source: engineering/domain-modeling
    steps:
      - patch: domain-modeling/file-structure.patch
      - replace:
          old: "project's domain model"
          new: "profile's domain model"
          all: true

  triage:
    source: engineering/triage
    steps:
      - replace:
          old: 'These are canonical role names.*?\n\n'
          new: ""
          regex: true

  grilling:
    source: productivity/grilling
    steps:
      - replace:
          old: "The *decisions*, though, are mine — put each one to me and wait for my answer."
          new: "The *decisions*, though, are mine — put each one to me and wait for my answer. As decisions crystallize, run the /domain-modeling skill to keep the domain model current."

  skill-router:
    source: engineering/ask-matt
    steps:
      - replace:
          old: "ask-matt"
          new: "skill-router"
      - replace:
          old: "skills in this repo"
          new: "skills in this profile"
      - replace:
          old: '# Ask Matt'
          new: '# Skill Router'
      - replace:
          old: '\[smart zone\]\([^)]+\)'
          new: 'smart zone'
          regex: true
      - replace:
          old: "/grill-with-docs"
          new: "/grilling"
          all: true
      - replace:
          old: '^- \*\*`/grill-me`\*\*.*\n'
          new: ""
          regex: true
          all: true
      - replace:
          old: '/compact(?=\W|$)'
          new: '/compress'
          regex: true
          all: true
      - replace:
          old: '## Precondition\n\n\*\*`/setup-matt-pocock-skills`\*\*.*'
          new: ""
          regex: true
      - replace:
          old: ". Start here when you **have a codebase**:"
          new: ","
      - replace:
          old: " (No codebase? Use `/grill-me` — see Standalone. Both run the same `/grilling` primitive; `grill-with-docs` is the one that leaves a paper trail.)"
          new: ""