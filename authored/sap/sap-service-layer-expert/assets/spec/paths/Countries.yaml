get:
  tags:
  - Countries
  summary: GET Countries
  description: Retrieve a collection of 'Countries' with all or some selected properties in the given order by specifying
    the given filter condition.
  operationId: get_Countries
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/Countries
  x-resource-description: This entity enables you to manipulate 'Countries'. It manages the settings of each country, such
    as country code, country name and address format.
post:
  tags:
  - Countries
  summary: POST Countries
  description: Create an instance of 'Countries' with the given payload of type 'Country' in JSON format.
  operationId: post_Countries
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            Code:
              type: string
              example: NC
            Name:
              type: string
              example: New Country
        example:
          Code: NC
          Name: New Country
  x-example-url: POST https://localhost:50000/b1s/v2/Countries
  x-resource-description: This entity enables you to manipulate 'Countries'. It manages the settings of each country, such
    as country code, country name and address format.
