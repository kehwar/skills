get:
  tags:
  - Teams
  summary: GET Teams(id)
  description: Retrieve all or some selected properties from an instance of 'Teams' with the given id.
  operationId: get_Teams_id
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
  x-example-url: GET https://localhost:50000/b1s/v2/Teams(123)
  x-resource-description: This entity enables you to manipulate 'Teams'. It represents the list of teams from which team memberships
    of an employee can be selected. An employee can be a Member or a Leader of more than one team.
patch:
  tags:
  - Teams
  summary: PATCH Teams(id)
  description: Update an instance of 'Teams' with the given payload of type 'Team' in JSON format and with the specified id.
  operationId: patch_Teams_id
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            Description:
              type: string
              example: Code Refactor
            TeamMembers:
              type: array
              items:
                type: object
                properties:
                  RoleInTeam:
                    type: string
                    example: borit_Leader
            TeamName:
              type: string
              example: Refactor
        example:
          Description: Code Refactor
          TeamMembers:
          - RoleInTeam: borit_Leader
          TeamName: Refactor
  x-example-url: PATCH https://localhost:50000/b1s/v2/Teams(123)
  x-resource-description: This entity enables you to manipulate 'Teams'. It represents the list of teams from which team memberships
    of an employee can be selected. An employee can be a Member or a Leader of more than one team.
