post:
  tags:
  - CompanyService
  summary: POST CompanyService_CreatePeriodWithFinanceParams
  description: 'Invoke the method ''CreatePeriodWithFinanceParams'' on this service by specifying the payload ''PeriodCategory''
    in the JSON format. It returns a ''PeriodCategoryParams'' identification key, extended with finance parameters derived
    by the ''FinancePeriodParams'' identification key (system number, period indicator). The PeriodCategory object provides
    two types of properties: 1.Properties that access existing Accounts and function as foreign keys to the ''ChartOfAccounts''
    object. 2.Properties that define new accounts by using Posting and Sub-Period definitions. The ''FinancePeriodParams''
    specifies the identification key(system number, period indicator ) to which the ''CompanyService'' is related.'
  operationId: post_CompanyService_CreatePeriodWithFinanceParams
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            FinancePeriodParams:
              type: object
              properties:
                PeriodIndicator:
                  type: string
                  example: Default
            PeriodCategory:
              type: object
              properties:
                BeginningofFinancialYear:
                  type: string
                  example: '2010-01-01'
                NumberOfPeriods:
                  type: integer
                  example: 1
                PeriodCategory:
                  type: string
                  example: '2010'
                PeriodName:
                  type: string
                  example: '2010'
                SubPeriodType:
                  type: string
                  example: spt_Year
        example:
          FinancePeriodParams:
            PeriodIndicator: Default
          PeriodCategory:
            BeginningofFinancialYear: '2010-01-01'
            NumberOfPeriods: 1
            PeriodCategory: '2010'
            PeriodName: '2010'
            SubPeriodType: spt_Year
  x-example-url: POST https://localhost:50000/b1s/v2/CompanyService_CreatePeriodWithFinanceParams
  x-resource-description: This API enables you to invoke the interfaces defined on 'CompanyService'.
