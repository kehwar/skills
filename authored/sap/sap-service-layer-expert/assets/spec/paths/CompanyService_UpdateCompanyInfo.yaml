post:
  tags:
  - CompanyService
  summary: POST CompanyService_UpdateCompanyInfo
  description: Invoke the method 'UpdateCompanyInfo' on this service by specifying the payload 'CompanyInfo' in the JSON format.
    It includes the initial parameters related to the company. The default values of some of the properties vary according
    to the country localization.
  operationId: post_CompanyService_UpdateCompanyInfo
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            CompanyInfo:
              type: object
              properties:
                EnableAccountSegmentation:
                  type: string
                  example: tYES
                EnableExpensesManagement:
                  type: string
                  example: tYES
                MaxRecordsInChooseFromList:
                  type: integer
                  example: 0
                MinimumAmountForAnnualList:
                  type: integer
                  example: 0
                MinimumAmountForAppndixOP:
                  type: integer
                  example: 0
                MinimumBaseAmountPerDoc:
                  type: integer
                  example: 0
                PercentOfTotalAcquisition:
                  type: integer
                  example: 0
                Version:
                  type: string
                  example: '910190'
        example:
          CompanyInfo:
            EnableAccountSegmentation: tYES
            EnableExpensesManagement: tYES
            MaxRecordsInChooseFromList: 0
            MinimumAmountForAnnualList: 0
            MinimumAmountForAppndixOP: 0
            MinimumBaseAmountPerDoc: 0
            PercentOfTotalAcquisition: 0
            Version: '910190'
  x-example-url: POST https://localhost:50000/b1s/v2/CompanyService_UpdateCompanyInfo
  x-resource-description: This API enables you to invoke the interfaces defined on 'CompanyService'.
