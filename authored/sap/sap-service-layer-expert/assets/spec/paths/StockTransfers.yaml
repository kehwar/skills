post:
  tags:
  - StockTransfers
  summary: POST StockTransfers
  description: Create an instance of 'StockTransfers' with the given payload of type 'StockTransfer' in JSON format.
  operationId: post_StockTransfers
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            StockTransferLines:
              type: array
              items:
                type: object
                properties:
                  ItemCode:
                    type: string
                    example: i001
                  Quantity:
                    type: string
                    example: '100'
                  UnitPrice:
                    type: string
                    example: '30'
                  WarehouseCode:
                    type: string
                    example: w001
        example:
          StockTransferLines:
          - ItemCode: i001
            Quantity: '100'
            UnitPrice: '30'
            WarehouseCode: w001
  x-example-url: POST https://localhost:50000/b1s/v2/StockTransfers
  x-resource-description: This entity enables you to manipulate 'StockTransfers'. It represents transfer records of items
    from one warehouse to another.
