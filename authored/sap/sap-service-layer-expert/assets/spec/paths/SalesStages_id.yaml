get:
  tags:
  - SalesStages
  summary: GET SalesStages(id)
  description: Retrieve all or some selected properties from an instance of 'SalesStages' with the given id.
  operationId: get_SalesStages_id
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
  x-example-url: GET https://localhost:50000/b1s/v2/SalesStages(123)
  x-resource-description: This entity enables you to manipulate 'SalesStages'. It defines sales stages and the probability
    of closing a deal indicated by each stage. For example, you enter stage 1 by identifying a customer as a lead (prospective
    customer); if you define the closing percentage of this stage as 5%, it means that you estimate 5 out of 100 leads can
    be converted to customers who will place orders with you.
