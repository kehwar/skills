                  ItemCode:
                    type: string
                    example: I01
                  Quantity:
                    type: string
                    example: '100'
        example:
          CCDNumber: 18/2018/18
          CountryOfOrigin: XX
          Date: '2016-08-31'
          TrackingNoteItemCollection:
