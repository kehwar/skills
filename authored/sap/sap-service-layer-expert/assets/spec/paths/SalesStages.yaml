get:
  tags:
  - SalesStages
  summary: GET SalesStages
  description: Retrieve a collection of 'SalesStages' with all or some selected properties in the given order by specifying
    the given filter condition.
  operationId: get_SalesStages
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/SalesStages
  x-resource-description: This entity enables you to manipulate 'SalesStages'. It defines sales stages and the probability
    of closing a deal indicated by each stage. For example, you enter stage 1 by identifying a customer as a lead (prospective
    customer); if you define the closing percentage of this stage as 5%, it means that you estimate 5 out of 100 leads can
    be converted to customers who will place orders with you.
post:
  tags:
  - SalesStages
  summary: POST SalesStages
  description: Create an instance of 'SalesStages' with the given payload of type 'SalesStage' in JSON format.
  operationId: post_SalesStages
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            ClosingPercentage:
              type: string
              example: '10'
            Name:
              type: string
              example: Lead
            Stageno:
              type: string
              example: '1'
        example:
          ClosingPercentage: '10'
          Name: Lead
          Stageno: '1'
  x-example-url: POST https://localhost:50000/b1s/v2/SalesStages
  x-resource-description: This entity enables you to manipulate 'SalesStages'. It defines sales stages and the probability
    of closing a deal indicated by each stage. For example, you enter stage 1 by identifying a customer as a lead (prospective
    customer); if you define the closing percentage of this stage as 5%, it means that you estimate 5 out of 100 leads can
    be converted to customers who will place orders with you.
