get:
  tags:
  - Teams
  summary: GET Teams
  description: Retrieve a collection of 'Teams' with all or some selected properties in the given order by specifying the
    given filter condition.
  operationId: get_Teams
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/Teams
  x-resource-description: This entity enables you to manipulate 'Teams'. It represents the list of teams from which team memberships
    of an employee can be selected. An employee can be a Member or a Leader of more than one team.
post:
  tags:
  - Teams
  summary: POST Teams
  description: Create an instance of 'Teams' with the given payload of type 'Team' in JSON format.
  operationId: post_Teams
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            Description:
              type: string
              example: Testing Team
            TeamMembers:
              type: array
              items:
                type: object
                properties:
                  EmployeeID:
                    type: string
                    example: '20'
                  RoleInTeam:
                    type: string
                    example: borit_Leader
            TeamName:
              type: string
              example: ACE
        example:
          Description: Testing Team
          TeamMembers:
          - EmployeeID: '20'
            RoleInTeam: borit_Leader
          TeamName: ACE
  x-example-url: POST https://localhost:50000/b1s/v2/Teams
  x-resource-description: This entity enables you to manipulate 'Teams'. It represents the list of teams from which team memberships
    of an employee can be selected. An employee can be a Member or a Leader of more than one team.
