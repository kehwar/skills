name: ExchangeRateSelectEnum
title: ExchangeRateSelectEnum Enumeration
kind: enum
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Enumerations~ExchangeRateSelectEnum_EN.html
description: Indicates whether to use the original exchange rate defined in the invoice, or to use the exchange rate defined for the day on which the dunning letters are created. This option is relevant when calculating interest in foreign currency for dunning letter.
