name: FormPreferencesService
title: FormPreferencesService Object
kind: service
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService.html
description: The FormPreferencesService manages the display preferences of a specified form for a specified user. Form preferences include settings such as, column width, visual order of columns, and more.
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method. To display the form in the application: - Select a form. From the main menu, select Tools --> Form Settings . Mandatory properties: - FormID and User ( ColumnsPreferencesParams ) Column , ItemNumber and Width ( ColumnPreferences ).'
methods:
- name: GetColumnsPreferences
  description: Retrieves the column preferences of a specified form for a specified user.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService~GetColumnsPreferences.html
- name: GetDataInterface
  description: Creates an empty data structure. This means the structure contains the default setting/values of the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates a data structure from a specified XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates a data structure from a specified XML string.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService~GetDataInterfaceFromXMLString.html
- name: UpdateColumnsPreferences
  description: Updates the column preferences of a specified form for a specified user with the data specified in ColumnsPreferences data structure.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FormPreferencesService~UpdateColumnsPreferences.html
