name: ReportLayoutsService
title: ReportLayoutsService Object
kind: service
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayoutsService.html
description: 'The ReportLayoutsService service enables you to do the following: - Copy a PLD report layout from one company to another. - Add a Crystal Reports layout or standalone report. Source table: RDOC (report layouts) and RDFL (associates default report with user, business partners)'
remarks: 'To work with report layouts in SAP Business One: - Open a marketing document form (for example, Sales A/R -- Sales Quotation ). Select Tools --> Print Layout Designer (or select the pencil icon on the toolbar). The Layout Designer - Selection Criteria form opens. Click Edit . The Report and Layout Manager opens. To work with the Print Layout Designer: - Open the Report and Layout Manager, as described above. - Select a PLD report layout. - Click Edit .'
