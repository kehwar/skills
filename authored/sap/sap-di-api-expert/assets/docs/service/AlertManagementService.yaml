name: AlertManagementService
title: AlertManagementService Object
kind: service
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService.html
description: 'AlertManagementService is a business object that manages alert system for SAP Business One application. This object enables you to: - Manage system and user alerts. Manage alert''s recipients. Define event driven alerts and cyclic alerts. Delivere alerts by the use of email, SMS or FAX. Save the object in XML format. Source table: OALT .'
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method. To display the form in the application: Administration -- Alert Management .'
methods:
- name: AddAlertManagement
  description: Creates new instance of AlertManagementParams (Code, Name and Type) Object that match the input parameter AlertManagement .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~AddAlertManagement.html
- name: GetAlertManagement
  description: Gets instance of AlertManagement Object according to AlertManagementParams (Code, Name and Type).
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~GetAlertManagement.html
- name: GetAlertManagementList
  description: Returns a AlertManagementParamsCollection object, a data collection of all the instances of AlertManagementParams Identification keys that match a given AlertManagementParams identification key (Code, Name and Type).
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~GetAlertManagementList.html
- name: GetDataInterface
  description: Creates empty data structure. This means the structure contains the default setting/values of the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates data structure from specified XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates data structure from specified XML string.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~GetDataInterfaceFromXMLString.html
- name: RemoveAlertManagement
  description: You can remove inactive user alerts if you have full authorization to remove user alerts.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~RemoveAlertManagement.html
- name: UpdateAlertManagement
  description: Update this ApprovalTemplate by another ApprovalTemplate .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlertManagementService~UpdateAlertManagement.html
