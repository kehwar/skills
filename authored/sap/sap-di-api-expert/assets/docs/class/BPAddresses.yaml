name: BPAddresses
title: BPAddresses Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPAddresses.html
description: 'BPAddresses is a child object of the BusinessPartners and represents the Ship To and Bill To addresses list of the business partner. This object is part of the Business Partner module. You can retrieve or set this object by using the Addresses property of the BusinessPartners object. This object enables you to add Ship To, Bill To, and multiple addresses to the business partner master data. Source table: CRD1 .'
remarks: 'Mandatory field in SAP Business One: AddressName . To display the form in the application: - Select Business Partners --> Business Partner Master Data --> Addresses tab.'
methods:
- name: Add
  description: Adds a new Address record. To save the information to the database, use the Add method in the BusinessPartners object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPAddresses~Add.html
- name: Delete
  description: Deletes the current line. Returns a result value that indicates success or failure.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPAddresses~Delete.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPAddresses~SetCurrentLine.html
properties:
- name: AddressName
  description: 'Sets or returns the name of the address (Bill To address, Main address, Ship To address, and so on). Field name: Address . Mandatory property. Length: 50 characters.'
