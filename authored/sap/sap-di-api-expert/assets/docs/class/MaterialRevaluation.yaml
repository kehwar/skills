name: MaterialRevaluation
title: MaterialRevaluation Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluation.html
description: 'MaterialRevaluation is a business object that enables you to update the items'' price ( average price or standard price only), revaluate the stock, and create journal entries accordingly. This object applies only to companies that manage their stock using Continuous Stock system. This object enables you to: - Add a material revaluation. Retrieve a material revaluation by its key. Update a material revaluation. Save the object in XML format. Source table: OMRV .'
