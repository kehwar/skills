name: DunningLetters
title: DunningLetters Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters.html
description: 'Represents a list of dunning levels that is used as a template when creating a new dunning term. You can define up to 10 dunning levels, and relate each level to a dunning letter format. This object enables you to: - Add a dunning level. Retrieve a dunning level by its key. Update a dunning level. Remove a dunning level. Save the object in XML format. This object manages a list of dunning levels. This list is a template when creating a new dunning term, and the template list does not directly affect business partners or the dunning letters functionality. Dunning terms can be assigned to business partners and are managed by the DunningTermsService . Source table: ODUN .'
remarks: 'Mandatory fields: RowNumber , LetterFormat and Effectiveafter . To display the form in the application: - Select Administration --> Setup --> Business Partners --> Dunning Levels .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~GetByKey.html
- name: Remove
