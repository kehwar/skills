properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~Browser.html
- name: CalcInterest
  description: 'Sets or returns a valid value of BoYesNoEnum type that specifies whether or not to calculate interest on a delinquent debt. Field name: CalcIntert .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~CalcInterest.html
  field_name: CalcIntert
- name: Effectiveafter
  description: 'Sets or returns the overdue number of days. Field name: EffctAftr . Mandatory in SAP Business One. Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~Effectiveafter.html
  field_name: EffctAftr
  length: 3
- name: FeeCurrency
  description: 'Sets or returns the currency of the dunning letter fee. Field name: FeeCurr . Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~FeeCurrency.html
  field_name: FeeCurr
  length: 3
- name: Feeperletter
  description: 'Sets or returns the fee for each dunning letter sent to the business partner. Field name: LetterFee .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~Feeperletter.html
  field_name: LetterFee
- name: LetterFormat
  description: 'Sets or returns the letter format to relate to the dunning level. Field name: LetrFormat . Mandatory in SAP Business One. Length: 8 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~LetterFormat.html
  field_name: LetrFormat
  length: 8
- name: MinimumBalance
  description: 'Sets or returns the minimum balance of the debt. SAP Business One will send a dunning letter only for a debt balance higher than this minimum amount. Field name: MinBalance .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~MinimumBalance.html
  field_name: MinBalance
- name: MinimumBalanceCurrency
  description: 'Sets or returns the currency of MinimumBalance . Field name: MinBlnCurr . Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~MinimumBalanceCurrency.html
  field_name: MinBlnCurr
  length: 3
- name: RowNumber
  description: 'Sets or returns the dunning level number, which is used as an identification key. Field name: LineNum . Mandatory in SAP Business One.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~RowNumber.html
  field_name: LineNum
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningLetters~UserFields.html
