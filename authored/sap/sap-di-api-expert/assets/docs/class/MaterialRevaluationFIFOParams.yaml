name: MaterialRevaluationFIFOParams
title: MaterialRevaluationFIFOParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams.html
description: Contains parameters for retrieving FIFO layers using the MaterialRevaluationFIFOService service.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~ToXMLString.html
properties:
- name: ItemCode
  description: The key of an item whose costs are to be revaluated. This is a foreign key to the Items object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~ItemCode.html
- name: LocationCode
  description: A key to a location. Only layers for this location are returned by the GetMaterialRevaluationFIFO method. You must specify the location type in the LocationType property. Currently, the only location type is warehouse and, therefore, this property is a foreign key to the Warehouses object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~LocationCode.html
- name: LocationType
  description: A type of location for storing items. A specific location of this type is specified in the LocationCode property. Currently, the only valid value is 64 , indicating a warehouse.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~LocationType.html
- name: ShowIssuedLayers
  description: 'Indicates which layers to retrieve, as follows: If set to yes, all layer are retrieved. If set to no, only layers with an open quantity not equal to zero are retrieved. Only relevant when the revaluation method is inventory debit/credit (see RevalType property of the MaterialRevaluation object).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MaterialRevaluationFIFOParams~ShowIssuedLayers.html
