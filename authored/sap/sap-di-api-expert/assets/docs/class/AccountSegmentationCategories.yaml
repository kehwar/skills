name: AccountSegmentationCategories
title: AccountSegmentationCategories Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentationCategories.html
description: 'The AccountSegmentationCategories object represents the categories for each of the account segments in the Financials module. This object enables you to: - Add an account category to a segment. Retrieve an account segment category by its key. Update an account segment category. Save the object in XML format. Source table: OASC .'
remarks: 'Applicable only when the EnableAccountSegmentation property of the CompanyInfo object is set to Y. Account segmentation is used mainly in USA. To display the form in the application: - Select Administration --> Setup -->Financials -->Account Segmentation . Double-click the number on the left of the account segmentation name.'
methods:
- name: Add
  description: Adds an account segment category.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentationCategories~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
