  field_name: ResCode
- name: Locked
  description: 'The warehouse for the resource is locked. Thus prevents you from adding the resource from this warehouse to production orders. Field name: Locked .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ResourceWarehouse~Locked.html
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ResourceWarehouse~UserFields.html
- name: Warehouse
  description: 'The warehouse code. Field name: WhsCode . Length: 8 characters.'
