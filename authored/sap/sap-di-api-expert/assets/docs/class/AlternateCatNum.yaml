name: AlternateCatNum
title: AlternateCatNum Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternateCatNum.html
description: 'AlternateCatNum is a business object that represents the alternative catalog numbers in the Business Partners module. This object enables you to: - Add an alternative catalog number. Retrieve an alternative catalog number by its key. Update an alternative catalog number. Save the object in XML format. Source table: OSCN .'
remarks: 'Customers or vendors usually maintain their own catalog numbers for items. You can define and use these catalog numbers instead of the item numbers. Mandatory fields in SAP Business One: CardCode , ItemCode , and Substitute . To display the form in the application: - Select Inventory --> Item Management --> Batches --> Define Business Partner Catalog Numbers .'
