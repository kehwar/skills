  description: 'The name of the active attribute in the attribute group that you assigned to the asset class of the asset. Field name: AttrName . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AttributeGroupLine~AttributeName.html
  field_name: AttrName
  length: 100
- name: Code
  description: 'The code of an attribute group. Field name: Code.'
