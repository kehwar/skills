name: BPPriorities
title: BPPriorities Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPPriorities.html
description: 'The BPPriorities object enables to define business partner priorities for payment terms. Source table: OBPP .'
remarks: 'The list of priorities will appear as a selection list in the Priority field of the Payment Terms tab of the business partner master card. To display the form in the application: - Select Administration -->Setup -->Business Partners -->Business Partner Priorities .'
