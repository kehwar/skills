properties:
- name: Status
  description: 'Status is a string that represents a list of the task statuses. The statuses for workflow tasks are as follows: TaskStatus_To_Be_Picked W TaskStatus_Picking P TaskStatus_In_Process G TaskStatus_Completing D TaskStatus_Completed F TaskStatus_Canceled Q TaskStatus_Canceling C TaskStatus_Forwarding O TaskStatus_Error E TaskStatus_Terminated T A string may contain the vertical bar "|" as separators, such as "W", "W|G" or "W|G|F".'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowApprovalTaskListParams~Status.html
