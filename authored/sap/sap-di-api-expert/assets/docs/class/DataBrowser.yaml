name: DataBrowser
title: DataBrowser Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser.html
description: The DataBrowser enables to navigate between records that are selected from the database or from XML formatted data. All business objects can call the DataBrowser object using the Browser property. You must use a Recordset object to initialize the DataBrowser object. You cannot create a new DataBrowser object, it is invoked as a Browser property of a business object.
remarks: To use the DataBrowser object, first create a new Recordset object, preform the required query, and then assign the Recordset object to the Recordset property of the DataBrowser object. See Selecting Information Using the Recordset and DataBrowser Objects sample.
methods:
- name: GetByKeys
  description: Returns a DI object that match the unique ID (BusinessObjectInfo.ObjectKey) generated by the UI when FormDataEvent occurs. For more information, please refer to FormDataEvent event in UI Reference.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~GetByKeys.html
- name: MoveFirst
  description: Moves the business object that is connected to the first result in the Recordset .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~MoveFirst.html
- name: MoveLast
  description: Moves the business object that is connected to the last result in the Recordset .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~MoveLast.html
- name: MoveNext
  description: Moves the business object that is connected to the next result in the Recordset .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~MoveNext.html
- name: MovePrevious
  description: Moves the business object that is connected to the previous result in the Recordset .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~MovePrevious.html
- name: ReadXml
  description: Browses XML formatted data and enables to update the data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~ReadXml.html
- name: Refresh
  description: Refreshen the results set. You can use the Refresh method when you want to run a new query with the linked Recordset object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~Refresh.html
properties:
- name: BoF
  description: Returns a Boolean value that specifies whether or not the pointer is at the beginning of the result set.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~BoF.html
- name: EoF
  description: Returns a Boolean value that specifies whether or not the result set has reached the last record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~EoF.html
- name: RecordCount
  description: Returns the total result count returned by the query.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~RecordCount.html
- name: Recordset
  description: Sets the Recordset object that you want to link to.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DataBrowser~Recordset.html
