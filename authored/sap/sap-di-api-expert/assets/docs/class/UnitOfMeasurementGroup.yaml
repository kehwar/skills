name: UnitOfMeasurementGroup
title: UnitOfMeasurementGroup Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UnitOfMeasurementGroup.html
description: 'A UoM (Unit of Measurement) group is a set of UoMs that you want to use for a certain type of product. Each UoM group has a base UoM. All the other UoMs belonging to this group are related to this base UoM by conversion rules. You can assign a UoM group to an item. When you use different UoMs for the item in sales, purchasing, inventory, and production transactions, SAP Business One automatically processes the differences in UoMs according to their conversion rules. Source table: OUGP .'
remarks: "- From the SAP Business One Main Menu , choose Administration --> Setup --> Inventory --> Unit of Measurement Groups . In the Unit of Measurement - Setup window, enter a group name and its description. Choose Group Definition to open the Unit of Measurement Groups â\x80\x93 <Group> â\x80\x93 Setup window."
