name: MessageDataColumn
title: MessageDataColumn Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataColumn.html
description: 'MessageDataColumn is a data structure related to the MessagesService . It enables to add one data column to the data columns collection. The MessageDataColumn object contains the title of the column and whether or not it includes a link to a document. Source table: ALR2 .'
remarks: 'To display the form in the application: - From the main menu bar, click the Message/Alert Overview icon. Select the Data tab.'
