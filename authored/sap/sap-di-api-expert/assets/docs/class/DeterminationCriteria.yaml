description: 'The available determination criteria are predefined (you cannot define additional determination criteria): Item Group Item Code Warehouse Code Business Partner Group Ship-to Country Ship-to State You can activate and prioritize the determination criteria to be applied on the inventory G/L account determination. Source table: ODMC .'
