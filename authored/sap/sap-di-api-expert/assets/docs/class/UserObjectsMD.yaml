- name: ExtensionName
  description: 'Sets or returns the name and full path of your business logic implementation (DLL). Length: 254 characters. Field name: ExtName .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~ExtensionName.html
  field_name: ExtName
