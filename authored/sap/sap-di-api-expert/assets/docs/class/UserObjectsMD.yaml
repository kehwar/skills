- name: UseUniqueFormType
  description: Indicates whether every child form of a parent UDO gets a unique ID. If false, all child forms share the same ID.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~UseUniqueFormType.html
