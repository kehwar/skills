name: UserObjectsMD
title: UserObjectsMD Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD.html
description: 'The UserObjectsMD object represents the registration data settings, such as table name and supported services, of a user defined object. This object enables you to: - Add a user define object. Retrieve a user define object by its key. Update a user define object . Remove a user define object from the database. Save the object in XML format. Specify the menu location of the UDO. Source table: OUDO . IMPORTANT: After creating a new UDO in .NET, you must release the object by executing the following line of code, where myObject is a reference to the UserObjectsMD object:'
remarks: 'Mandatory fields in SAP Business One: Code and TableName . To activate the registration wizard in the application: - Select Tools > User Defined Object > User Defined Object Registration . For more information, see the User Defined Object documentation.'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~GetByKey.html
- name: Remove
  description: Deletes a record from the object table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~Remove.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~Update.html
properties:
- name: ApplyAuthorization
  description: You can control authorizations for user-defined objects (UDOs) in the General Authorizations window.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~ApplyAuthorization.html
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~Browser.html
- name: CanApprove
  description: 'Indicates whether the UDO uses the Approve service, which enables a UDO record to be a request and to be approved by the specified workflow template. Field name: CanApprove'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanApprove.html
- name: CanArchive
  description: Indicates that the UDO records can be archived. The OnCanArchive virtual method in the implementation DLL for the UDO can specify conditions to limit which records are archived.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanArchive.html
- name: CanCancel
  description: 'Indicates whether the UDO uses the Cancel service, which enables users to cancel a UDO record. Field name: CanCancel'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanCancel.html
- name: CanClose
  description: 'Indicates whether the UDO uses the Close service, which enables a user to close a UDO record without creating a posting in accounting. Field name: CanClose'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanClose.html
- name: CanCreateDefaultForm
  description: 'Indicates whether the UDO uses the Default Form service, which creates a default form that has an ordinary table with selected fields. Field name: CanDefForm'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanCreateDefaultForm.html
  field_name: CanDefForm
- name: CanDelete
  description: 'Indicates whether the UDO uses the Delete service, which enables a user to delete records from Master Data type objects. Field name: CanDelete'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanDelete.html
- name: CanFind
  description: 'Indicates whether the UDO uses the Find service, which enables the Choose from list dialog box in the application ( Find Form ). Field name: CanFind'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanFind.html
- name: CanLog
  description: 'Indicates whether the UDO uses the History Log service, which creates a history log table in the database. Field name: CanLog'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanLog.html
- name: CanYearTransfer
  description: 'Indicates whether the UDO uses the Year Transfer service, which enables the copying of the user tables to a new database. Field name: CanYrTrnsf'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~CanYearTransfer.html
  field_name: CanYrTrnsf
- name: ChildTables
  description: Returns the UserObjectMD_ChildTables child tables.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~ChildTables.html
- name: Code
  description: 'Sets or returns the Object Unique ID. The Unique ID is the primary key of the user defined object and its child objects. Length: 20 characters (must include at least one alphabetical character). Field name: Code .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~Code.html
  length: 20
- name: EnableEnhancedForm
  description: 'Creates the UDO enhanced form (UDO form with header-line style). Field name: CanNewForm.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserObjectsMD~EnableEnhancedForm.html
  field_name: CanNewForm
- name: EnhancedFormColumns
  description: Returns the UserObjectMD_EnhancedFormColumns child object.
