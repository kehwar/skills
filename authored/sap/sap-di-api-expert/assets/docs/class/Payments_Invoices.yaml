name: Payments_Invoices
title: Payments_Invoices Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Invoices.html
description: 'Payments_Invoices is a child object of the Payments object and represents the invoices related to the payments in the Banking module. Source tables: RCT2 (incoming payments) and VPM2 (outgoing payments).'
remarks: 'Mandatory field in SAP Business One: DocEntry . To display the form in the application: - For RCT2 table, select Banking --> Incoming Payments --> Incoming Payments . - For VPM2 table, select Banking --> Outgoing Payments --> Payments to Vendors .'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Invoices~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Invoices~SetCurrentLine.html
properties:
