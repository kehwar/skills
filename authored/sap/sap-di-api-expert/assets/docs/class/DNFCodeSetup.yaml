name: DNFCodeSetup
title: DNFCodeSetup Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup.html
description: 'Represents a DNF code that can be assigned to an item. Source table: ODNF Mandatory properties: DNFCode , NCMCode'
remarks: Relevant for Brazil only.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~ToXMLString.html
properties:
- name: AbsEntry
  description: 'The key for a specific DNF code. Field name: AbsEntry'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~AbsEntry.html
- name: DNFCode
  description: 'The DNF code. Field name: DNFCode'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~DNFCode.html
- name: Factor
  description: 'The factor for the DNF code. Field name: DNFFactor'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~Factor.html
  field_name: DNFFactor
- name: NCMCode
  description: 'The key to the NCM code to which the DNF code is associated. Field name: NCMEntry'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~NCMCode.html
  field_name: NCMEntry
- name: UoM
  description: 'The UoM for the DNF code. Field name: DNFUoM'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DNFCodeSetup~UoM.html
  field_name: DNFUoM
