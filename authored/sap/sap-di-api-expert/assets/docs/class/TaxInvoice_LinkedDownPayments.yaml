name: TaxInvoice_LinkedDownPayments
title: TaxInvoice_LinkedDownPayments Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TaxInvoice_LinkedDownPayments.html
description: 'Link to tax invoices from down payments for Russia localization. The whole "Linked Down Payments" subobject is read-only, meaning it is completed automatically during the adding of Tax Invoices (no matter if via UI or DI) and user can read the values via DI API using this subobject (LinkedDownPayments). Source table: TSI4 for A/R tax invoices, TPI4 for A/P tax invoices.'
remarks: Sales - A/R -> A/R Tax Invoice -> option Down Payments Purchasing - A/P -> A/P Tax Invoice -> option Down Payments
