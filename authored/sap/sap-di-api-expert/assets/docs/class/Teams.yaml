name: Teams
title: Teams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Teams.html
description: 'Teams is a business object that represents the list of teams from which team memberships of an employee can be selected. An employee can be a Member or a Leader of more than one team. Source table: OHTM .'
remarks: 'To display the form in the application: - Select Human Resources --> Employee Master Data. Select the Membership tab. From the Team list box, click Define New .'
