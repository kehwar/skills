name: SpecialPricesQuantityAreas
title: SpecialPricesQuantityAreas Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas.html
description: 'SpecialPricesQuantityAreas is a child object of SpecialPricesDataAreas object and represents special prices that are valid only for specified quantities and above. Source table: SPP2 .'
remarks: 'To display the form in the application: - Select Inventory --> Price Lists --> Special Prices --> Special Prices for Business Partners . Double-click a line number in the Special Prices for Business Partners table. Double-click a line number in the Special Prices for Periods table.'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~Add.html
- name: Delete
  description: Deletes the current line. Returns a result value that indicates success or failure.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~Delete.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~SetCurrentLine.html
properties:
- name: BPCode
  description: 'Returns the identification code of the business partner for whom the special price applies. The BPCode returns from the CardCode property of the SpecialPrices object. Field name: CardCode . Length: 15 characters. This is a foreign key to the BusinessPartnersService object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~BPCode.html
  field_name: CardCode
  length: 15
- name: Count
  description: Returns the total rows in the table, that is the total number of records in the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~Count.html
- name: Discountin
  description: 'Sets or returns the discount percentage for an item for the specified quantity. Field name: Discount .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~Discountin.html
  field_name: Discount
- name: ItemNo
  description: 'Returns the item code in the inventory for which the special price applies. The ItemNo returns from the ItemCode property of the SpecialPrices object. Field name: ItemCode . Length: 20 characters. This is a foreign key to the Items object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~ItemNo.html
  field_name: ItemCode
  length: 20
- name: PriceCurrency
  description: 'Sets or returns the currency of the special price. The currency must match to the currency in the specified price list. Field name: Currency . Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~PriceCurrency.html
  field_name: Currency
  length: 3
- name: Quantity
  description: 'Sets or returns the items quantity for which the special price applies. Field name: Amount .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~Quantity.html
  field_name: Amount
- name: RowNumber
  description: 'Returns the current available row number (0-based). Field name: SPP2LNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~RowNumber.html
  field_name: SPP2LNum
- name: SPDARowNumber
  description: Returns the row number in the SpecialPricesDataAreas object ( RowNumber ) for which the special price for quantity applies.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~SPDARowNumber.html
- name: SpecialPrice
  description: 'Sets or returns the special price after the discount, which is based on quantities. Field name: Price .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~SpecialPrice.html
  field_name: Price
- name: UoMEntry
  description: property UoMEntry
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~UoMEntry.html
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPricesQuantityAreas~UserFields.html
