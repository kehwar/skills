- name: AddressExtension
  description: 'The Bill To and Ship To addresses for the document. This property enables you to specify the BillTo and ShipTo addresses by defining their component parts -- for example, the street name, city name, and country -- instead of specifying the address as free-text strings. After setting the AddressExtension property, the system does the following: Clears the Address and Address2 properties. Creates BillTo and ShipTo addresses based on the values in the AddressExtension property. The address format is determined by the country''s address format, which is specified at Administration --> Setup --> Business Partner --> Countries . The format used is either the format for the country specified in the BillToCountry or ShipToCountry property of the AddressExtension property or, if no country is specified, the company country. Copies these addresses to the Address and Address2 properties.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Documents~AddressExtension.html
