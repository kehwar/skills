description: 'The ISD Credit Memo has the exact same information as the ISD Invoice, but the posting of the ISD Credit Memo is opposite to the posting of the ISD Invoice. Source table: OISC .'
remarks: "For India localization only. To access Input Service Distribution Invoice documents, the path is Purchasing - A/P --> Input Service Distribution â\x80\x93 ISD --> ISD Invoice."
