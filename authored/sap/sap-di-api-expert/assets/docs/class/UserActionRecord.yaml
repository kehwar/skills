name: UserActionRecord
title: UserActionRecord Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserActionRecord.html
description: 'Displays the access details and the actions of SAP Business One users who have logged on and logged off with the SAP Business One client or the DI API. Source table: USR5 .'
remarks: In the SAP Business One application, to open the Access Log window, in the SAP Business One menu bar, choose Tools --> Access Log . To open the Access Log Details window, in the Access Log window, double-click the table row of a user whose access information you want to display.
methods:
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserActionRecord~SetCurrentLine.html
properties:
- name: Action
  description: 'The action that the user performed. Field name: Action .'
