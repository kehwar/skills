- name: ActionBy
  description: 'The user ID of the user who performed the action. Field name: ActionBy . Length: 8 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserActionRecord~ActionBy.html
  length: 8
- name: ActionDate
  description: 'The date of the action. Field name: Date .'
