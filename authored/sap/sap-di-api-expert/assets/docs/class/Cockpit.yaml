name: Cockpit
title: Cockpit Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit.html
description: 'Represents a cockpit, which is a personalized work center where you can view, search, organize, and perform your regular work and related activities. Source table: OCPT .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Cockpit~ToXMLString.html
