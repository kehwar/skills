remarks: To access the Units of Measurement - Setup window, choose Administration --> Setup --> Inventory --> Units of Measurement .
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
