name: Holiday
title: Holiday Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday.html
description: 'Specify a set of company holidays. Source table: OHLD .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~ToXMLString.html
properties:
- name: HolidayCode
  description: 'The code of the holiday. You can enter holidays for each country you work with. Field name: HldCode . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~HolidayCode.html
  field_name: HldCode
  length: 20
- name: HolidayDates
  description: Holiday dates.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~HolidayDates.html
- name: SetWeekendsAsWorkDays
  description: 'Considers weekend days as business days while calculating due dates for payments. Field name: ignrWnd .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~SetWeekendsAsWorkDays.html
  field_name: ignrWnd
- name: ValidForOneYearOnly
  description: 'Applies the holiday table only to the year specified in the holiday dates. Deselect to define the holiday table as year independent. Field name: isCurYear .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~ValidForOneYearOnly.html
  field_name: isCurYear
- name: WeekendFrom
  description: 'Select days for the weekend. Field name: WndFrm .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~WeekendFrom.html
  field_name: WndFrm
- name: WeekendTO
  description: 'Select days for the weekend. Field name: WndTo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~WeekendTO.html
  field_name: WndTo
- name: WeekNoRule
  description: 'The rule of calculating week numbers. Field name: WeekNoRule .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Holiday~WeekNoRule.html
