name: TargetGroupsService
title: TargetGroupsService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TargetGroupsService.html
description: 'The TargetGroupsService service enables you to add, look up, update, and remove target groups. Source table: OTTG .'
remarks: "To create a target group, proceed as follows: - From the SAP Business One Main Menu , choose Administration --> Set Up --> Business Partners --> Target Group . - In the Target Group â\x80\x93 Set Up window, specify the Target Group Code and the Target Group Name for the new group and choose Update . - In the # column, double-click the gray sequence number area corresponding to the target group you created in step 2. The Target Group Details window appears."
