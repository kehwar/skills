description: 'EmployeesInfo is a business object that represents the employee master data in the Human Resources module. This object enables you to: - Add employee''s details. Retrieve employee''s details by its key. Update employee''s details. Save the object in XML format. Source table: OHEM .'
remarks: 'Mandatory fields in SAP Business One: FirstName and LastName . To display the form in the application: - Select Human Resources --> Employee Master Data .'
