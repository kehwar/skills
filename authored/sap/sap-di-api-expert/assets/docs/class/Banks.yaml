name: Banks
title: Banks Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks.html
description: 'The Banks object enables to define banks, which can be used by the HouseBankAccounts and BPBankAccounts objects. Source table: ODSC .'
remarks: 'Mandatory fields in SAP Business One: BankCode and CountryCode . To display the form in the application: - Select Administration -->Setup -->Banking -->Banks .'
methods:
- name: Add
  description: Adds a new record of banks table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~Update.html
properties:
- name: AbsoluteEntry
  description: 'Returns the identification key of the bank as assigned by the system when adding a new entry. Field name: AbsoluteEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~AbsoluteEntry.html
- name: AccountforOutgoingChecks
  description: 'Returns the bank account number for outgoing checks. Field name: DfltAcct . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~AccountforOutgoingChecks.html
  field_name: DfltAcct
  length: 50
- name: BankCode
  description: 'Sets or returns the bank code. Field name: BankCode . Mandatory property. Length: 30 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~BankCode.html
  length: 30
- name: BankName
  description: 'Sets or returns bank name. Field name: BankName . Length: 32 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~BankName.html
  length: 32
- name: BranchforOutgoingChecks
  description: 'Returns the bank branch for outgoing checks. Field name: DfltBranch . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~BranchforOutgoingChecks.html
  field_name: DfltBranch
  length: 50
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~Browser.html
- name: CountryCode
  description: 'Sets or returns the country code of the bank (for example: DE). Field name: CountryCod . Length: 3 characters. Mandatory property.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~CountryCode.html
  field_name: CountryCod
  length: 3
- name: DefaultBankAccountKey
  description: 'Sets or returns the identification key of the default house bank account. Field name: DfltActKey . This is a foreign key to the HouseBankAccounts object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~DefaultBankAccountKey.html
  field_name: DfltActKey
- name: DigitalPayments
  description: property DigitalPayments
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~DigitalPayments.html
- name: IBAN
  description: 'Sets or returns the International Bank Account Number (IBAN). Field name: IBAN . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~IBAN.html
  length: 50
- name: NextCheckNumber
  description: 'Returns the number of the next check for payment as specified in the NextCheckNo property of the HouseBankAccounts object. Field name: NextNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~NextCheckNumber.html
  field_name: NextNum
- name: PostOffice
  description: 'Determines whether or not the bank is also a post office. Field name: PostOffice .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~PostOffice.html
- name: SwiftNo
  description: 'Sets or returns the swift number for international payments by wire transfer. Field name: SwiftNum . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~SwiftNo.html
  field_name: SwiftNum
  length: 50
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Banks~UserFields.html
