  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ProductionOrders_Lines~PlasticPackageExemptionReason.html
- name: ProductionOrderIssueType
  description: 'Determines the method for issuing the components of the product from the inventory, whether Manual or Backflash (automatic). Field name: IssueType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ProductionOrders_Lines~ProductionOrderIssueType.html
