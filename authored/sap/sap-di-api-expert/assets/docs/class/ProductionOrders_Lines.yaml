- name: PlannedQuantity
  description: 'Sets or returns the total items quantity planned to be issued for the production order. For each component line, the value of this field is calculated according to the following formula: (Planned Quantity of the parent * Base Qty of the component) + Additional Qty of the component. Field name: PlannedQty .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ProductionOrders_Lines~PlannedQuantity.html
  field_name: PlannedQty
