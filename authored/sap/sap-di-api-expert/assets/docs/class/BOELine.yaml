  field_name: DpstAcct
- name: amount
  description: 'The total amount of the bill of exchange. Field name: BoeSum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BOELine~amount.html
  field_name: BoeSum
- name: Bank
  description: 'The house bank code of the deposit. Field name: DpsBankCod .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BOELine~Bank.html
  field_name: DpsBankCod
- name: BOEKey
  description: 'The key of the bill of exchange. Field name: BoeKey .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BOELine~BOEKey.html
  field_name: BoeKey
- name: BOENumber
  description: 'The number of the bill of exchange. Field name: BoeNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BOELine~BOENumber.html
  field_name: BoeNum
- name: BOEStatus
  description: 'The status of the bill of exchange. Field name: BoeStatus .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BOELine~BOEStatus.html
