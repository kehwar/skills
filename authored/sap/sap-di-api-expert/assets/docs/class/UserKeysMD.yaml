name: UserKeysMD
title: UserKeysMD Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD.html
description: 'The UserKeysMD object enables to mange user defined keys of user tables. A user table contains a default primary key that consists of the Code and Name columns. Use the UserKeysMD object to add secondary keys to user tables. This object enables you to: - Add a user key (identifier) to a user table. Retrieve the values of the object''s properties by its KeyIndex and TableName . Remove a user key. Save the object in XML format. Source table: OUKD .'
remarks: 'DI API allows only one meta data object instance (with no other instances of any object type). This maintains data integrity by preventing any manipulation of a business object while modifying the object''s properties. Furthermore, it is recommended to add user keys while the user table is still empty. To display the form in the application: - From the main menu bar, select Tools --> Manage User Fields . Select a User Table. Click Keys .'
methods:
- name: Add
  description: Adds a key to a row of a user defined table. See sample, Adding a Private Key .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~GetByKey.html
- name: Remove
  description: Deletes a key from an existing table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~SaveXML.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~Browser.html
- name: Elements
  description: Returns the UserKeysMD_Elements child object that contains the list of fields in the database used for adding the key.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~Elements.html
- name: KeyIndex
  description: 'Returns the serial number that uniquely identifies the key in the user table. This serial number is automatically assigned by SAP Business One (starting from 0). Field name: KeyId .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~KeyIndex.html
  field_name: KeyId
- name: KeyName
  description: 'Sets or returns the unique key name used for identification. Field name: KeyName . Length: 10 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~KeyName.html
  length: 10
- name: TableName
  description: 'Sets or returns the name of the required table in the database. Field name: TableName . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~TableName.html
  length: 20
- name: Unique
  description: 'Sets or returns a valid value of BoYesNoEnum type that specifies whether or not the key is unique. Unique keys prevents the end-user from adding new keys with the same key combination. Field name: UniqueKey .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserKeysMD~Unique.html
  field_name: UniqueKey
