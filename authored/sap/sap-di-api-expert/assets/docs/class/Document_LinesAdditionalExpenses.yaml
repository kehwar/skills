name: Document_LinesAdditionalExpenses
title: Document_LinesAdditionalExpenses Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_LinesAdditionalExpenses.html
description: 'Document_LinesAdditionalExpenses is a child object of Document_Lines and represents the line entries of the additional expenses document in the Marketing Documents module. The source table for each document is according to the document type as follows: INV2 , RIN2 , DLN2 , RDN2 , RDR2 , QUT2 , PCH2 , RPC2 , PDN2 , RPD2 , POR2 , and DRF2 .'
remarks: 'Mandatory field in SAP Business One: ExpenseCode and of Name of AdditionalExpenses object. You can add up to three (3) additional expenses in a row of a document and SAP Business One assigns a number ( GroupCode ) for each of the additional expenses. If no additional expense is defined in SAP Business One, the GetByKey method will retrieve null.'
methods:
