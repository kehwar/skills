name: ItemsDistributionRules
title: ItemsDistributionRules Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemsDistributionRules.html
description: 'ItemsDistributionRules is a child object of the Items object. You can assign distribution rules to an asset to facilitate cost accounting. Source table: ITM6 .'
remarks: For asset transactions that create journal entries, SAP Business One carries forward the relevant projects and distribution rules to the journal entries. To access the subtab, from the SAP Business One Main Menu , choose Financials --> Fixed Assets --> Asset Master Data . Select the Fixed Assets tab and then the Cost Accounting subtab.
