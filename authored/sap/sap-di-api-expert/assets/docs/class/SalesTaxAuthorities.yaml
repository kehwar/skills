name: SalesTaxAuthorities
title: SalesTaxAuthorities Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxAuthorities.html
description: 'SalesTaxAuthorities is a business object that represents the sales tax jurisdictions data for US and Canada localizations, or sales tax types for Latin America localization. In US and Canada localizations, the sales tax jurisdictions can be defined, for example, for each state , country , and city . In Latin America localization, the sales tax types are related to specific items, such as fuel and cigarettes, that are liable to tax ( Rate ) in addition to VAT. This object enables you to: - Add a sales tax authority. Retrieve a sales tax authority by its key. Update a sales tax authority data. Save the object in XML format. Source table: OSTA .'
remarks: 'Mandatory field in SAP Business One: Code . To display the form in the application (US and Canada localizations): - Select Administration --> Setup --> Financials --> Tax --> Sales Tax Jurisdiction . A Selection Criteria dialog box opens. From the Define Sales Tax Jurisdiction Types - Selection Criteria select a tax jurisdiction type and click OK. To display the form in the application (Latin America localization): - Select Administration --> Setup --> Financials --> Tax --> Tax Types . From the Define Tax Types - Selection Criteria select a tax category and click OK.'
