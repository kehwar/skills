  description: 'The visual order number of the counter. The value for the first row is null, and from the second row the number starts from 1. Field name: VisOrder .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TeamCounter~CounterVisualOrder.html
  field_name: VisOrder
- name: DocumentEntry
  description: 'The internal key of the inventory counting. Field name: DocEntry.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TeamCounter~DocumentEntry.html
  field_name: DocEntry
