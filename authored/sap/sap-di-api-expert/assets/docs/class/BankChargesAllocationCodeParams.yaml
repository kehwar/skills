name: BankChargesAllocationCodeParams
title: BankChargesAllocationCodeParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BankChargesAllocationCodeParams.html
description: Holds the key and name to a bank charges allocation code. This object is used to pass keys to and retrieve keys from BankChargesAllocationCodesService methods.
methods:
