name: ExternalReconciliationFilterParams
title: ExternalReconciliationFilterParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams.html
description: Specifies the selection criteria for viewing, canceling, or re-creating previous external reconciliations created for business partners or G/L accounts.
remarks: To open the Manage Previous External Reconciliations - Selection Criteria window, choose Banking --> Bank Statements and External Reconciliations --> Manage Previous External Reconciliations .
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ToXMLString.html
properties:
- name: AccountCodeFrom
  description: 'The business partner or one G/L account code from which you want to reconcile. Field name: AcctCodeFrom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~AccountCodeFrom.html
  field_name: AcctCodeFrom
- name: AccountCodeTo
  description: 'The business partner or one G/L account code to which you want to reconcile. Field name: AcctCodeTo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~AccountCodeTo.html
  field_name: AcctCodeTo
- name: ReconciliationAccountType
  description: 'The account type for which the reconciliation is performed. Field name: IsCard .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ReconciliationAccountType.html
  field_name: IsCard
- name: ReconciliationDateFrom
  description: 'The date from which the application performs reconciliations. Field name: MthDateFrom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ReconciliationDateFrom.html
  field_name: MthDateFrom
- name: ReconciliationDateTo
  description: 'The date to which the application performs reconciliations. Field name: MthDateTo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ReconciliationDateTo.html
  field_name: MthDateTo
- name: ReconciliationNoFrom
  description: 'A range of numbers representing the reconciliations the application should display. Field name: MatchNumFrom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ReconciliationNoFrom.html
  field_name: MatchNumFrom
- name: ReconciliationNoTo
  description: 'A range of numbers representing the reconciliations the application should display. Field name: MatchNumTo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliationFilterParams~ReconciliationNoTo.html
  field_name: MatchNumTo
