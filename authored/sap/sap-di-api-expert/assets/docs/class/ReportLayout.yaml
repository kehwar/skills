name: ReportLayout
title: ReportLayout Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayout.html
description: 'Represents a layout for PLD or a layout/report for Crystal Reports. Source table: RDOC'
remarks: 'The ReportLayoutsService enables you to transfer PLD report layouts from one company to another. When transferring a system layout, change the following properties before adding the layout to the destination company: Author : Change from System to a different name. If left unchanged, an exception is thrown. Editable : Change from NO to Yes to make the new layout editable. Name : Give the report layout a new name. When this object is used to import a layout/report for Crystal Reports, the fields Name , TypeCode , Author and Category must be set. Set Category to Crystal Reports and set TypeCode to either RCRI (for standalone reports) or a document type (for layouts).'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayout~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayout~FromXMLString.html
- name: GetXMLSchema
  description: Retrieves the XML schema of the data structure. Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayout~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object data. Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportLayout~ToXMLFile.html
- name: ToXMLString
