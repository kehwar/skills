name: BarCodeParams
title: BarCodeParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams.html
description: Holds the key to an existing bar code. This object is used to pass keys to and retrieve keys from BarCodesService methods.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~ToXMLString.html
properties:
- name: AbsEntry
  description: 'The key of a bar code. Field name: BcdEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~AbsEntry.html
  field_name: BcdEntry
- name: BarCode
  description: 'The bar code for the UoM. Field name: BcdCode . Length: 16 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~BarCode.html
  field_name: BcdCode
  length: 16
- name: ItemNo
  description: 'The item number. Field name: ItemCode . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~ItemNo.html
  field_name: ItemCode
  length: 20
- name: UoMEntry
  description: 'The key of a UoM. Field name: UomEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BarCodeParams~UoMEntry.html
  field_name: UomEntry
