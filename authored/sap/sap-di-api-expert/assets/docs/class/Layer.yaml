name: Layer
title: Layer Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer.html
description: Represents a FIFO layer for a specific item and location. After retrieving a FIFO layer, you may want to revaluate it. To specify a FIFO layer to be revaluated, pass its layer ID and sequence number to the corresponding properties of the FIFOLayers object in the MaterialRevaluation object.
remarks: 'Each FIFO layer contains the following properties: - TransactionSequenceNum : A sequence number that identifies each transaction that affects the stock of a FIFO item. - LayerID Property : A sequence number (within each transaction) that identifies the FIFO layers within a single transaction. A transaction may involve more than one FIFO layer, for example, when a customer buys 2 of an item but the cost of one item is $100 and the cost of the other is $200. These two properties, together, uniquely identify a FIFO layer.'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~ToXMLString.html
properties:
- name: CurrentCost
  description: The current cost of the item.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~CurrentCost.html
- name: DocNumber
  description: The DocEntry of the document that created the layer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~DocNumber.html
- name: DocType
  description: The type of document that created this layer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~DocType.html
- name: EntryDate
  description: The document posting date that created this layer, for example, in the goods receipt in a purchase order.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~EntryDate.html
- name: LayerID
  description: The layer ID. To specify this layer for revaluation, pass this value to the LayerID property of the FIFOLayers object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~LayerID.html
- name: OpenQty
  description: The quantity of the item that is still open in this layer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~OpenQty.html
- name: TransactionSequenceNum
  description: The transaction sequence number for the current layer. To specify this layer for revaluation, pass this value to the TransactionSequenceNum property of the FIFOLayers object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Layer~TransactionSequenceNum.html
