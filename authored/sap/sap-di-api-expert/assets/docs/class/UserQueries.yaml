name: UserQueries
title: UserQueries Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries.html
description: 'The UserQueries object enables to define user queries in the Queries Manager. Source table: OUQR .'
methods:
- name: Add
  description: Adds a user query to the User Queries library.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~Browser.html
- name: EnableMenuEntry
  description: 'Specify whether to display the query from the menu. Field name: MenuItem .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~EnableMenuEntry.html
  field_name: MenuItem
- name: InternalKey
  description: 'Returns the user query code as assigned by the system when adding a new user query. Field name: IntrnalKey .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~InternalKey.html
  field_name: IntrnalKey
- name: MenuCaption
  description: 'The caption of the menu. Field name: MenuCapt . Length: 254 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~MenuCaption.html
  field_name: MenuCapt
  length: 254
- name: MenuPosition
  description: 'Specify the position of the query in the menu. Field name: MenuPos .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~MenuPosition.html
  field_name: MenuPos
- name: MenuUniqueID
  description: 'Specify the unique ID of the menu. Field name: MenuUid . Length: 32 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~MenuUniqueID.html
  field_name: MenuUid
  length: 32
- name: ParentMenuID
  description: 'The ID of the parent menu, starts from 0. You can select the parent menu item from the menu navigaton tree structure. Field name: FatherMenu .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~ParentMenuID.html
  field_name: FatherMenu
- name: ProcedureAlias
  description: property ProcedureAlias
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~ProcedureAlias.html
- name: ProcedureName
  description: property ProcedureName
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~ProcedureName.html
- name: Query
  description: 'Sets or returns the query content, for example, a SELECT statement for SQL databases. Field name: QString . Length: 64,000 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~Query.html
  field_name: QString
- name: QueryCategory
  description: 'Sets or returns the code of the query category (foreign key to QueryCategories ). Mandatory property. Field name: QCategory .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~QueryCategory.html
  field_name: QCategory
- name: QueryDescription
  description: 'Sets or returns the query name. The value must be unique within the same category. Mandatory property. Field name: QName . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~QueryDescription.html
  field_name: QName
  length: 100
- name: QueryType
  description: 'The type of the query. Field name: QType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~QueryType.html
  field_name: QType
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserQueries~UserFields.html
