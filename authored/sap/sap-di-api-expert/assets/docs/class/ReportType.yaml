name: ReportType
title: ReportType Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType.html
description: 'Represent the report type to which a layout is assigned. You can insert report types for add-on forms. Source table: RTYP .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~ToXMLString.html
properties:
- name: AddonFormType
  description: 'The type of the add-on form. Field name: FRM_TYPE . Length: 250 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~AddonFormType.html
  field_name: FRM_TYPE
  length: 250
- name: AddonName
  description: 'The name of the add-on. Field name: ADD_NAME . Length: 250 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~AddonName.html
  field_name: ADD_NAME
  length: 250
- name: DefaultReportLayout
  description: 'The default report layout. Field name: DEFLT_REP . Length: 8 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~DefaultReportLayout.html
  field_name: DEFLT_REP
  length: 8
- name: MenuID
  description: 'The ID of the menu entry in the SAP Business One Main Menu . Field name: MNU_ID . Length 4 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~MenuID.html
  field_name: MNU_ID
- name: TypeCode
  description: 'The type of the report. Field name: CODE .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~TypeCode.html
  field_name: CODE
- name: TypeName
  description: 'The name of the report type. Field name: NAME . Length: 250 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportType~TypeName.html
  field_name: NAME
  length: 250
