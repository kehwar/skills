name: GLAccountAdvancedRulesService
title: GLAccountAdvancedRulesService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService.html
description: 'The GLAccountAdvancedRulesService service enables you to add, look up, update, and remove advanced G/L account determination rules. Source table: OGAR .'
remarks: To open the Advanced G/L Account Determination Rules window , from the SAP Business One Main Menu , choose Administration -> Setup -> Financials -> G/L Account Determination; in the G/L Account Determination window, choose the Advanced button.
methods:
- name: Add
  description: Adds an advanced G/L account determination rule.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~Add.html
- name: Delete
  description: Deletes an existing advanced G/L account determination rule.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~Delete.html
- name: Get
  description: Retrieves an advanced G/L account determination rule. The advanced G/L account determination rule is specified by its key, which is contained in the GLAccountAdvancedRuleParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the GLAccountAdvancedRulesService .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates an object from an XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates an object from XML.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~GetDataInterfaceFromXMLString.html
- name: GetList
  description: Returns the GLAccountAdvancedRuleParamsCollection data collection that identifies all advanced G/L account determination rules.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~GetList.html
- name: Update
  description: Updates an existing advanced G/L account determination rule.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccountAdvancedRulesService~Update.html
