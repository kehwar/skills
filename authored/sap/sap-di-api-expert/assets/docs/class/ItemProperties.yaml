name: ItemProperties
title: ItemProperties Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties.html
description: 'The ItemProperties object enables to update the property names that can be used for sorting or grouping items in reports. Source table: OITG'
remarks: 'To display the form in the application: - Select Administration --> Setup --> Inventory --> Item Properties .'
methods:
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~GetByKey.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~Browser.html
- name: Number
  description: Returns the code (1 to 64) of the item property.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~Number.html
- name: PropertyName
  description: 'Sets or returns the property name, which can be used for sorting and grouping items in reports. Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~PropertyName.html
  length: 50
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemProperties~UserFields.html
