- name: AuthorityProcess
  description: When creating records in ECM3 for the current electronic document, this object is used to specify particular data for the ECM3 record. Because users are allowed to modify only specific data in ECM3, this is used only during ECM3 record creation. During log entry creation, authorities processes specify which kind of action is currently relevant, e.g. approval or rejection of current electronic document.
