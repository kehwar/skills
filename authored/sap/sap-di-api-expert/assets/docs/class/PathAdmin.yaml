name: PathAdmin
title: PathAdmin Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin.html
description: 'An object for setting and getting directory paths for storing various files. Source tables: OADP'
remarks: To set paths in the application, go to Administration --> System Initialization --> General Settings --> Path tab.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~ToXMLString.html
properties:
- name: AttachmentsFolderPath
  description: 'Sets or returns the path to the folder for storing attachments, such as customer Web pages. Field name: AttachPath'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~AttachmentsFolderPath.html
  field_name: AttachPath
- name: ExtensionsFolderPath
  description: 'Sets or returns the path to the folder for storing secured images. Secured images include official stamps, which, due to legal requirements, can be saved on your computer as *.dll files only, and not in regular picture formats. Field name: ExtPath'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~ExtensionsFolderPath.html
  field_name: ExtPath
- name: PicturesFolderPath
  description: 'Sets or returns the path to the folder for storing store images, such as company logos. Field name: BitmapPath'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~PicturesFolderPath.html
  field_name: BitmapPath
- name: PrintId
  description: 'The key for the set of path settings. Field name: PrintId'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~PrintId.html
- name: WordTemplateFolderPath
  description: 'Sets or returns the path to the folder for storing Microsoft Word templates when exporting data to Word. Field name: WordPath'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PathAdmin~WordTemplateFolderPath.html
  field_name: WordPath
