name: AssetClassLine
title: AssetClassLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine.html
description: 'AssetClassLine is a child object of AssetClass object and represents the depreciation area fields of an asset class. Source table: ACS1 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~ToXMLString.html
properties:
- name: AccountDetermination
  description: 'The account determination for the Posting to G/L type of depreciation areas. Field name: AcctDtn . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~AccountDetermination.html
  field_name: AcctDtn
  length: 15
- name: ActiveStatus
  description: 'Indicate whether the depreciation area is active for the asset class. The system calculates the asset depreciation in all active depreciation areas. Field name: Active .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~ActiveStatus.html
  field_name: Active
- name: Code
  description: 'The unique code for the asset class. Field name: Code . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~Code.html
  length: 20
- name: DepreciationAreaID
  description: 'The depreciation areas for the asset class. Field name: DprAreaID . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~DepreciationAreaID.html
  field_name: DprAreaID
  length: 15
- name: DepreciationTypeID
  description: 'The depreciation type in the depreciation area. Field name: DprTypID . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~DepreciationTypeID.html
  field_name: DprTypID
  length: 15
- name: LineNumber
  description: 'The current row number in the list. Field name: LineNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~LineNumber.html
  field_name: LineNum
- name: UseLife
  description: 'The useful life in months for the assets in this asset class. Field name: UseLife.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClassLine~UseLife.html
