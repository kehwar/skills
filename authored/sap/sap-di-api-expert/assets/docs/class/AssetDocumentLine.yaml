description: 'AssetDocumentLine is a child object of AssetDocument object and represents the line entries of an asset document. Source table: ACQ1 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
