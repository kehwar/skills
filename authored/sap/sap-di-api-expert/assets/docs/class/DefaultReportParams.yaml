name: DefaultReportParams
title: DefaultReportParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultReportParams.html
description: 'Specifies the default report layout for a document type. The default report layout can be designated for a specific user and business partner, or for all users and business partners. Use this object with the GetDefaultReport / SetDefaultReport methods of the ReportLayoutsService . Source table: RDFL'
remarks: 'To specify a default report layout in SAP Business One: - Open a marketing document form (for example, Sales A/R -- Sales Quotation ). Select Tools --> Print Layout Designer (or select the pencil icon on the toolbar). Select a report layout. Click Set as Default .'
