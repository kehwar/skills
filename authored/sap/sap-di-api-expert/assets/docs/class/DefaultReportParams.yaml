properties:
- name: CardCode
  description: 'A business partner for which the report layout is the default. If blank, the report layout is default for all business partners. Field name: CardCode Length: 15 characters This is a foreign key to the BusinessPartners object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultReportParams~CardCode.html
  length: 15
- name: LayoutCode
  description: 'The default report layout for the document type specified in the ReportCode property. Field name: DfltReport Length: 8 characters'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultReportParams~LayoutCode.html
