name: UserMenuService
title: UserMenuService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService.html
description: 'UserMenuService manages the user menu. Source table: CUMI . The service maintains a collection of user menus, each identified by a specific value of UserMenuParams. It enables the user to: - Get current user menu definition. Get any user menu definition from the collection by it params identification key. Update user menus in the collection. Replace current user menu with user menu from the collection.'
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method. To display the form in the application: - Select Main Menu -- User Menu Tab'
methods:
- name: GetCurrentUserMenu
  description: Get the UserMenuItems data collection that represents current user menu.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~GetCurrentUserMenu.html
- name: GetDataInterface
  description: Creates an empty data structure. This means the structure contains the default setting/values of the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Retrieves the Data Interface schema from XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Retrieves the Data Interface schema from XML string.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~GetDataInterfaceFromXMLString.html
- name: GetUserMenu
  description: Get a User's defined menu ( UserMenuItems ), by its UserMenuParams identification key.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~GetUserMenu.html
- name: UpdateCurrentUserMenu
  description: Replace current User Menu with another User menu ( UserMenuItems ).
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~UpdateCurrentUserMenu.html
- name: UpdateUserMenu
  description: Replace a User Menu definition ( UserMenuItems ), identified by it UserMenuParams with a new User menu definition ( UserMenuItems ).
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserMenuService~UpdateUserMenu.html
