description: 'The ISD Recipient Credit Memo has the exact same information as the ISD Recipient Invoice, but the posting of the ISD Recipient Credit Memo is opposite to the posting of the ISD Recipient Invoice. Source table: OIRR .'
remarks: "For India localization only. To access Input Service Distribution Recipient Invoice documents, the path is Purchasing - A/P --> Input Service Distribution â\x80\x93 ISD --> ISD Recipient Invoice."
