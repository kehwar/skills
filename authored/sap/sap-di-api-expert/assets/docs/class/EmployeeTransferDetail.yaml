name: EmployeeTransferDetail
title: EmployeeTransferDetail Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail.html
description: 'EmployeeTransferDetail is a child object of the EmployeeTransfer object. Represents the sub-record of an employee transfer to the payroll provider. Source table: HET1 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~ToXMLString.html
properties:
- name: Comment
  description: 'Any comment. For example, B1iSN would report error details here. Field name: Comment .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~Comment.html
- name: EmployeeID
  description: 'This is a foreign key to the EmployeesInfo object. Field name: empID .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~EmployeeID.html
  field_name: empID
- name: Status
  description: 'The status of the employee transfer processing. When you add a new transfer, SAP Business One sets the status to New. B1iSN updates the status during the processing. Field name: Status .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~Status.html
- name: TransferedDate
  description: 'Represents the date that the data have been sent or exported successfully. Field name: Transfered .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~TransferedDate.html
  field_name: Transfered
- name: TransferedTime
  description: 'Represents the time that the data have been sent or exported successfully. Field name: TransTime .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~TransferedTime.html
  field_name: TransTime
- name: TransferID
  description: 'This is a foreign key to the EmployeeTransfer object. Field name: TransferID .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransferDetail~TransferID.html
