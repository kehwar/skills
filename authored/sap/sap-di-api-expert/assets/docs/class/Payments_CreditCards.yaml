name: Payments_CreditCards
title: Payments_CreditCards Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards.html
description: 'Payments_CreditCards is a child object of the Payments object and represents the payments by credit cards in the Banking module. Source tables: RCT3 (incoming payments) and VPM3 (outgoing payments).'
remarks: 'Mandatory fields in SAP Business One: CardValidUntil , CreditCard , CreditCardNumber , and CreditSum . To display the form in the application: - For RCT3 table, select Sales - A/R --> A/R Invoice . - or - For VPM3 table, select Purchasing - A/P --> A/P Invoice . On the toolbar, click the Payment Means icon. Select the Credit Card tab.'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~SetCurrentLine.html
properties:
- name: AdditionalPaymentSum
  description: 'Sets or returns the payment amount added to the first payment, due to rounding results. Field name: AddPmntSum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~AdditionalPaymentSum.html
  field_name: AddPmntSum
- name: CardValidUntil
  description: 'Sets or returns the credit card expiration date. Mandatory property. Field name: CardValid .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~CardValidUntil.html
  field_name: CardValid
- name: ConfirmationNum
  description: 'Sets or returns the confirmation number for the payment through a credit card. Field name: ConfNum . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~ConfirmationNum.html
  field_name: ConfNum
