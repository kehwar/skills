- name: CreditAcct
  description: 'Sets or returns the credit account number. Field name: CreditAcct . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_CreditCards~CreditAcct.html
  length: 15
- name: CreditCard
  description: 'Sets or returns the key of a credit card. Mandatory property. Field name: CreditCard . This is a foreign key to the CreditCards object.'
