name: LengthMeasures
title: LengthMeasures Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures.html
description: 'The LengthMeasures object enables to define the length and width measure units that are used for item records. Source table: OLGT .'
remarks: 'To display the form in the application: - Select Administration --> Setup --> Inventory --> Length and Width UoM .'
methods:
- name: Add
  description: Adds a length unit of measure definition.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~Browser.html
- name: UnitCode
  description: 'Returns the length unit code (primary key). Field name: UnitCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UnitCode.html
- name: UnitCodeforQuantityDisplay
  description: 'Sets or returns the volume code (for example, cc). Field name: VolDisply . Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UnitCodeforQuantityDisplay.html
  field_name: VolDisply
  length: 3
- name: UnitDisplay
  description: 'Sets or returns the displayed name for the length or width unit (for example, cm). Field name: UnitDisply . Length: 2 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UnitDisplay.html
  field_name: UnitDisply
  length: 2
- name: UnitLengthinmm
  description: 'Sets or returns the length in milimeters. For example: 10 mm for cm measure unit or 25.4 mm for Inch measure unit. Field name: SizeInMM .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UnitLengthinmm.html
  field_name: SizeInMM
- name: UnitName
  description: 'Sets or returns the unit name (for example, centimeter). Field name: UnitName . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UnitName.html
  length: 20
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LengthMeasures~UserFields.html
