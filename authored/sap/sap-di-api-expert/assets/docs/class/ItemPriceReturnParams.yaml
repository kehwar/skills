- name: Discount
  description: Returns the discount of the item price.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemPriceReturnParams~Discount.html
- name: Price
  description: Returns the item price.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemPriceReturnParams~Price.html
