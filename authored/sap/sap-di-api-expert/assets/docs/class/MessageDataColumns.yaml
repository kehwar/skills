name: MessageDataColumns
title: MessageDataColumns Collection
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataColumns.html
description: MessageDataColumns is a collection of MessageDataColumn data stractures. This enables to attache data to a message, such as invoice or quatation, that exits in the company database. The MessageDataColumns collection represents the columns of the Data tab table of a message.
