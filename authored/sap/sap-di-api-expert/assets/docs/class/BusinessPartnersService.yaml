name: BusinessPartnersService
title: BusinessPartnersService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BusinessPartnersService.html
description: 'The BusinessPartnersService enables to transfer credit or debit amounts from a specified opening balance account to one or more business partner accounts. This service creates a journal entry line. Mandatory properties: OpenBalanceAccount ( OpenningBalanceAccount object) and Code ( BPCode object). This object enables user to open Balanced Account. Source table: OCRD .'
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method. To display the form in the application: Select Business Partners .'
methods:
