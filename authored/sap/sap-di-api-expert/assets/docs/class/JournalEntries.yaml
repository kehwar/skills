name: JournalEntries
title: JournalEntries Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~JournalEntries.html
description: 'JournalEntries is a business object that represents the journal transactions in the Finance module. This object enables you to: - Add a journal transaction. Retrieve a journal transaction by its key. Update a journal transaction. Remove a journal transaction. Save the object in XML format. Source table: OJDT .'
remarks: To display the form in the applicationl, select Financials --> Journal Entry .
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
