properties:
- name: Object
  description: 'Sets or returns the object type that is linked to the message. For example, 13 for A/R invoice. Mandatory in case Link ( MessageDataColumn ) is set to tYES . Field name: ObjType . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataLine~Object.html
  field_name: ObjType
  length: 20
- name: ObjectKey
  description: 'Sets or returns the object key that is linked to the message. For example, a document identification key. Mandatory in case Link ( MessageDataColumn ) is set to tYES . Field name: KeyStr . Length: 254 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataLine~ObjectKey.html
  field_name: KeyStr
  length: 254
- name: Value
  description: 'Sets or returns the value of the cell in the Data table (represented by the column index and line index). Field name: Value . Length: 254 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataLine~Value.html
  length: 254
