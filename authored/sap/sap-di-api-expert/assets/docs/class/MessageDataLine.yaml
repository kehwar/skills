name: MessageDataLine
title: MessageDataLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageDataLine.html
description: 'The MessageDataLine is a child data structure related to the MessageDataColumn . It contains the value of a specified cell in the Data table, which is defined by its column number ( vtIndex of Item of MessageDataColumns ) and row number ( vtIndex of Item of MessageDataLines . Source table: ALR3 .'
