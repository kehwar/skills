table: OBTD
description: Journal Vouchers List
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Finance/OBTD.htm
fields:
- field: BatchNum
  description: Journal Voucher No.
  type: Int
  size: 11
- field: Status
  description: Open/Closed Document
  type: VarChar
  size: 1
  default: O
  constraints:
  - key: O
    label: Open
  - key: C
    label: Closed
- field: NumOfTrans
  description: No. of Transactions
  type: Int
  size: 6
- field: DateID
  description: Posting Date
  type: Date
  size: 8
- field: LocTotal
  description: Total (LC)
  type: Num
  size: 19.6
- field: FcTotal
  description: Total (FC)
  type: Num
  size: 19.6
- field: SysTotal
  description: Total (SC)
  type: Num
  size: 19.6
- field: MemoID
  description: Details
  type: nVarChar
  size: 50
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: Remarks
  description: Journal Voucher Remarks Field
  type: nVarChar
  size: 50
- field: UpdateTS
  description: Update Full Time
  type: Int
  size: 11
- field: DataVers
  description: Data Version
  type: Int
  size: 11
  default: 1
indexes:
- key: PRIMARY
  unique: true
  fields:
  - BatchNum
- key: STATUS
  unique: false
  fields:
  - Status
