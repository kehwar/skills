- field: ItemName
  description: Item Description - History
  type: nVarChar
  size: 200
- field: TransToTec
  description: Transfer to Technician - History
  type: Num
  size: 19.6
- field: Delivered
  description: Delivered - History
  type: Num
  size: 19.6
- field: RetFromTec
  description: Returned from Technician - History
  type: Num
  size: 19.6
- field: Returned
  description: Returned - History
  type: Num
  size: 19.6
- field: Bill
  description: Bill - History
  type: VarChar
  size: 1
