- field: UpdateDate
  description: Date of Update - History
  type: Date
  size: 8
- field: VisOrder
  description: Visual Order
  type: Int
  size: 11
- field: EncryptIV
  description: Encrypt IV
  type: nVarChar
  size: 100
indexes:
- key: PRIMARY
  unique: true
  fields:
  - SrcvCallID
  - Line
  - LogInstanc
