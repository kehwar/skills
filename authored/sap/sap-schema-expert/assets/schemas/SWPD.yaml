table: SWPD
description: SWPD
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/General/SWPD.htm
fields:
- field: ProcDefID
  description: WF process definition ID
  type: Identity
  size: 11
- field: DeploymtID
  description: Deployment ID
  type: Int
  size: 11
  related: SWDP
- field: ResourceID
  description: Resource ID
  type: Int
  size: 11
  related: SWRS
- field: Key
  description: WF process definition key
  type: nVarChar
  size: 254
- field: Name
  description: WF process definition name
  type: nVarChar
  size: 254
- field: Desc
  description: WF process definition
  type: Text
  size: 16
- field: Category
  description: WF category uri
  type: nVarChar
  size: 50
- field: Version
  description: WF process definition version
  type: nVarChar
  size: 13
- field: ProcType
  description: Process definition type
  type: nVarChar
  size: 20
- field: Status
  description: Status during import
  type: VarChar
  size: 1
  default: M
  constraints:
  - key: M
    label: Importing
  - key: P
    label: Imported
  - key: F
    label: Import failed
  - key: I
    label: Inactive
  - key: A
    label: Active
  - key: E
    label: Activate failed
  - key: D
    label: Deleted
- field: StartType
  description: Start Type
  type: VarChar
  size: 1
  default: M
  constraints:
  - key: M
    label: Manual Start
  - key: T
    label: Timer Start
  - key: C
    label: Conditional Start
indexes:
- key: PRIMARY
  unique: true
  fields:
  - ProcDefID
