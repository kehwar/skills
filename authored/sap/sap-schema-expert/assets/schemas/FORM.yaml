- field: _Top
  description: Top
  type: Int
  size: 11
- field: _Bottom
  description: Bottom
  type: Int
  size: 11
- field: _Left
  description: Left
  type: Int
  size: 11
- field: _Right
  description: Right
  type: Int
  size: 11
- field: MaxUnique
  description: Max Unique
  type: Int
  size: 11
- field: RobjCode
  description: ImpExp Obj Code
