- field: ResCode
  description: Resource Code from RSBD
  type: Int
  size: 11
  default: -1
- field: RevCode
  description: Revision Code
  type: Int
  size: 11
  default: -1
- field: UseBoBind
  description: Use BO Binding
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
indexes:
- key: PRIMARY
  unique: true
