table: TSCD
description: Schedules
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/General/TSCD.htm
fields:
- field: SrvcName
  description: Service application name
  type: nVarChar
  size: 20
- field: SchedType
  description: Type of schedule
  type: VarChar
  size: 1
  default: P
  constraints:
  - key: P
    label: Suspended / Paused
  - key: O
    label: Once
  - key: S
    label: Every X seconds
  - key: M
    label: Every X minutes
  - key: D
    label: Daily
  - key: W
    label: Weekly
  - key: T
    label: Monthly
- field: SchedDate
  description: Scheduled date
  type: Date
  size: 8
- field: SchedDay
  description: Scheduled day
  type: nVarChar
  size: 2
  default: '1'
- field: Interval
  description: Interval
  type: Int
  size: 11
- field: LastExDate
  description: Last execution date
  type: Date
  size: 8
- field: AutoStart
  description: Auto run when OS starts
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'NO'
indexes:
- key: PRIMARY
  unique: true
  fields:
  - SrvcName
- key: NAME_SCHED
  unique: true
  fields:
  - SrvcName
  - LastExDate
