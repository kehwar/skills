    label: Unknown
  - key: I
    label: Interface
  - key: U
    label: Upgrade
  - key: M
    label: Import
  - key: O
    label: DI API
  - key: S
    label: Service Layer
  - key: W
    label: Web Client
  - key: A
    label: Auto Summary
  - key: D
    label: Restore Wizard
  - key: P
    label: Partner Implementation
  - key: T
    label: Year of Transfer
