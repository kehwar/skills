  size: 19.6
- field: SumByPro
  description: Summarize by Project
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: SumByDistr
  description: Summarize by Distribution Rule
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: TransType
  description: Generate Document
  type: nVarChar
  size: 20
  default: '-1'
  constraints:
