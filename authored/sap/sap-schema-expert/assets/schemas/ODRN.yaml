    label: 'Yes'
  - key: N
    label: 'No'
- field: RefDate
  description: Posting Date
  type: Date
  size: 8
- field: PeriodCat
  description: Period Category ID
  type: nVarChar
  size: 10
- field: PostPeriod
  description: Posting Subperiod
  type: Int
  size: 11
- field: KeyDate
  description: Key Date
  type: Date
  size: 8
- field: Remarks
  description: Remarks
  type: nVarChar
  size: 32
- field: NumOfJEs
  description: No. of Journal Entries
  type: Int
  size: 11
- field: SumOfDpr
  description: Sum of Depreciation
