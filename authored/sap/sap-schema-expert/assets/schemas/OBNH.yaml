table: OBNH
description: Bank Statement Header
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Banking/OBNH.htm
fields:
- field: IdNumber
  description: Internal Number
  type: Int
  size: 11
- field: ActKey
  description: Bank Account Internal Number
  type: Int
  size: 11
  related: DSC1
- field: BSNum
  description: Statement Internal Number
  type: Int
  size: 11
- field: BSDate
  description: Statement Date
  type: Date
  size: 8
- field: Status
  description: Status
  type: VarChar
  size: 1
  default: D
  constraints:
  - key: E
    label: Finalized
  - key: D
    label: Draft
  - key: O
    label: Old
- field: Imported
  description: Imported From File
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: StrtBlncF
  description: Starting Balance (FC)
  type: Num
  size: 19.6
- field: EndBlncF
  description: Ending Balance (FC)
  type: Num
  size: 19.6
- field: Currency
  description: Currency
  type: nVarChar
  size: 3
  related: OCRN
- field: StrtBlncL
  description: Starting Balance (LC)
  type: Num
  size: 19.6
- field: EndBlncL
  description: Ending Balance (LC)
  type: Num
  size: 19.6
- field: FileCRC
  description: Bank Statement File Hash
  type: nVarChar
  size: 32
- field: StmtGuid
  description: Bank Statement GUID
  type: nVarChar
  size: 32
- field: BSFileNum
  description: Bank Statement Number
  type: nVarChar
  size: 50
- field: PeriodAbs
  description: Period Abs Entry
  type: Int
  size: 11
- field: DfltBPL
  description: Default Branch
  type: Int
  size: 11
- field: OrigBSDate
  description: Original Statement Date
  type: Date
  size: 8
indexes:
- key: PRIMARY
  unique: true
  fields:
  - IdNumber
- key: ACT_NUM_DT
  unique: true
  fields:
  - ActKey
  - BSNum
  - BSDate
