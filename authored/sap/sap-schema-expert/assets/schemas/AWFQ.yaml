table: AWFQ
description: SWFQ History Table
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/AWFQ.htm
fields:
- field: SequenceID
  description: Sequence ID
  type: Int
  size: 11
- field: SourceDB
  description: Source Database
  type: nVarChar
  size: 100
- field: Timestamp
  description: Time Stamp
  type: nVarChar
  size: 20
- field: ObjectType
  description: Object Type
  type: nVarChar
  size: 30
- field: TransType
  description: Transaction Type
  type: VarChar
  size: 1
  constraints:
  - key: A
    label: Add
  - key: U
    label: Update
  - key: C
    label: Cancel
  - key: D
    label: Delete
- field: FieldsInKe
  description: Number of Fields in Key
  type: Int
  size: 11
- field: FieldNames
  description: Key Field Names
  type: nVarChar
  size: 254
- field: FieldValue
  description: Key Field Values
  type: nVarChar
  size: 254
- field: UserID
  description: UserID
  type: nVarChar
  size: 25
- field: TaskID
  description: Task ID
  type: nVarChar
  size: 64
- field: TrigEvntID
  description: Trigger Event ID
  type: nVarChar
  size: 64
- field: TrigParams
  description: Trigger Parameters
  type: Text
  size: 16
- field: LogInst
  description: Log Instance
  type: Int
  size: 11
- field: IsSuccess
  description: Is Message Handled Successfully
  type: VarChar
  size: 1
- field: ResultMemo
  description: Memo of the Result
  type: nVarChar
  size: 250
indexes:
- key: PRIMARY
  unique: true
  fields:
  - SequenceID
  - LogInst
