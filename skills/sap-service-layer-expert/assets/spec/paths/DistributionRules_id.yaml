patch:
  tags:
  - DistributionRules
  summary: PATCH DistributionRules(id)
  description: Update an instance of 'DistributionRules' with the given payload of type 'DistributionRule' in JSON format
    and with the specified id.
  operationId: patch_DistributionRules_id
  responses:
    '200':
      description: Success
    '204':
