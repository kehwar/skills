      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            DistributionRuleLines:
              type: array
              items:
                type: object
                properties:
                  CenterCode:
                    type: string
                    example: '1'
                  EffectiveFrom:
                    type: string
                    example: '2016-09-01'
                  EffectiveTo:
                    type: string
                    example: '2016-12-01'
                  TotalInCenter:
                    type: integer
                    example: 50
            FactorDescription:
              type: string
              example: TEST
        example:
          DistributionRuleLines:
          - CenterCode: '1'
            EffectiveFrom: '2016-09-01'
            EffectiveTo: '2016-12-01'
            TotalInCenter: 50
          - CenterCode: '2'
            EffectiveFrom: '2016-09-01'
            EffectiveTo: '2016-12-01'
            TotalInCenter: 50
          FactorDescription: TEST
