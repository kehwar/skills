              type: string
              example: '2017-01-01'
            DocumentType:
              type: string
              example: adtAssetTransfer
            PostingDate:
              type: string
              example: '2017-01-01'
        example:
          AssetDocumentLineCollection:
          - AssetNumber: FA4
            NewAssetNumber: FA3
          AssetValueDate: '2017-01-01'
          DepreciationArea: '*'
          DocumentDate: '2017-01-01'
          DocumentType: adtAssetTransfer
