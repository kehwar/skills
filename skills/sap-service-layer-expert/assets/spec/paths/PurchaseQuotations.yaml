get:
  tags:
  - PurchaseQuotations
  summary: GET PurchaseQuotations
  description: Retrieve a collection of 'PurchaseQuotations' with all or some selected properties in the given order by specifying
    the given filter condition.
  operationId: get_PurchaseQuotations
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/PurchaseQuotations
  x-resource-description: This entity enables you to manipulate 'PurchaseQuotations'. It represents an invitation to a number
    of vendors to find the best offer for goods or services that you require.
post:
  tags:
  - PurchaseQuotations
  summary: POST PurchaseQuotations
  description: Create an instance of 'PurchaseQuotations' with the given payload of type 'Document' in JSON format.
  operationId: post_PurchaseQuotations
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            CardCode:
              type: string
              example: c001
            DocumentLines:
              type: array
              items:
                type: object
                properties:
                  ItemCode:
                    type: string
                    example: i001
                  Quantity:
                    type: string
                    example: '100'
                  TaxCode:
                    type: string
                    example: T1
                  UnitPrice:
                    type: string
                    example: '50'
            RequriedDate:
              type: string
              example: '2014-04-04'
        example:
          CardCode: c001
          DocumentLines:
          - ItemCode: i001
            Quantity: '100'
            TaxCode: T1
            UnitPrice: '50'
          RequriedDate: '2014-04-04'
  x-example-url: POST https://localhost:50000/b1s/v2/PurchaseQuotations
  x-resource-description: This entity enables you to manipulate 'PurchaseQuotations'. It represents an invitation to a number
    of vendors to find the best offer for goods or services that you require.
