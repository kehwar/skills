post:
  tags:
  - SalesTaxCodes
  summary: POST SalesTaxCodes
  description: Create an instance of 'SalesTaxCodes' with the given payload of type 'SalesTaxCode' in JSON format.
  operationId: post_SalesTaxCodes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            Code:
              type: string
              example: T1
            Name:
              type: string
              example: T1
            SalesTaxCodes_Lines:
              type: array
              items:
                type: object
                properties:
                  STACode:
                    type: string
                    example: AL
                  STAType:
                    type: string
                    example: '-3'
        example:
          Code: T1
          Name: T1
          SalesTaxCodes_Lines:
          - STACode: AL
            STAType: '-3'
  x-example-url: POST https://localhost:50000/b1s/v2/SalesTaxCodes
  x-resource-description: This entity enables you to manipulate 'SalesTaxCodes'. It represents the inclusive sales tax codes.
    Each sales tax code consists of one or more sales taxes.
