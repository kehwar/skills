post:
  tags:
  - ExternalReconciliationsService
  summary: POST ExternalReconciliationsService_GetReconciliationList
  description: Invoke the method 'GetReconciliationList' on this service by specifying the payload 'ExternalReconciliationFilterParams'
    in the JSON format. It returns the 'ExternalReconciliationsParamsCollection' data collection that identifies all eternal
    reconciliations with the optional filter payload.
  operationId: post_ExternalReconciliationsService_GetReconciliationList
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            ExternalReconciliationFilterParams:
              type: object
              properties:
                AccountCodeFrom:
                  type: string
                  example: _SYS00000000001
                AccountCodeTo:
                  type: string
                  example: _SYS00000000002
                ReconciliationAccountType:
                  type: string
                  example: rat_GLAccount
                ReconciliationDateFrom:
                  type: string
                  example: '2016-05-03'
                ReconciliationDateTo:
                  type: string
                  example: '2016-12-03'
                ReconciliationNoFrom:
                  type: integer
                  example: 1
                ReconciliationNoTo:
                  type: integer
                  example: 2
        example:
          ExternalReconciliationFilterParams:
            AccountCodeFrom: _SYS00000000001
            AccountCodeTo: _SYS00000000002
            ReconciliationAccountType: rat_GLAccount
            ReconciliationDateFrom: '2016-05-03'
            ReconciliationDateTo: '2016-12-03'
            ReconciliationNoFrom: 1
            ReconciliationNoTo: 2
  x-example-url: POST https://localhost:50000/b1s/v2/ExternalReconciliationsService_GetReconciliationList
  x-resource-description: This API enables you to invoke the interfaces defined on 'ExternalReconciliationsService'.
