get:
  tags:
  - Deposits
  summary: GET Deposits
  description: Retrieve a collection of 'Deposits' with all or some selected properties in the given order by specifying the
    given filter condition.
  operationId: get_Deposits
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/Deposits
  x-resource-description: This entity enables you to manipulate 'Deposits'.
post:
  tags:
  - Deposits
  summary: POST Deposits
  description: Create an instance of 'Deposits' with the given payload of type 'Deposit' in JSON format.
  operationId: post_Deposits
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            CreditLines:
              type: array
              items:
                type: object
                properties:
                  AbsId:
                    type: integer
                    example: 1
            DepositAccount:
              type: string
              example: '10000'
            DepositType:
              type: string
              example: dtCredit
            VoucherAccount:
              type: string
              example: '10100'
        example:
          CreditLines:
          - AbsId: 1
          DepositAccount: '10000'
          DepositType: dtCredit
          VoucherAccount: '10100'
  x-example-url: POST https://localhost:50000/b1s/v2/Deposits
  x-resource-description: This entity enables you to manipulate 'Deposits'.
