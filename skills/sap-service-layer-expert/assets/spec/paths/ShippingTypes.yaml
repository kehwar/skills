get:
  tags:
  - ShippingTypes
  summary: GET ShippingTypes
  description: Retrieve a collection of 'ShippingTypes' with all or some selected properties in the given order by specifying
    the given filter condition.
  operationId: get_ShippingTypes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  x-example-url: GET https://localhost:50000/b1s/v2/ShippingTypes
