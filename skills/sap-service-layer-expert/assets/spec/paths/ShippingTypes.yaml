post:
  tags:
  - ShippingTypes
  summary: POST ShippingTypes
  description: Create an instance of 'ShippingTypes' with the given payload of type 'ShippingType' in JSON format.
  operationId: post_ShippingTypes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
