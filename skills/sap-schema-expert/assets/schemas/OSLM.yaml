table: OSLM
description: 'Special Ledger - Analytical Accounting Report: Material'
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Finance/OSLM.htm
fields:
- field: DocID
  description: Document Identification Number
  type: Int
  size: 11
- field: DocDate
  description: Date of Report Generation
  type: Date
  size: 8
- field: Ref1
  description: Journal Entry Number
  type: Int
  size: 11
  related: OJDT
- field: Ref2
  description: Original JE Reference
  type: Int
  size: 11
  related: OJDT
- field: Status
  description: Document Status
  type: VarChar
  size: 1
- field: DateFrom
  description: Document Start Date
  type: Date
  size: 8
- field: DateTo
  description: Document End Date
  type: Date
  size: 8
- field: TotDebit
  description: Total Debit Amount
  type: Num
  size: 19.6
- field: TotCredit
  description: Total Credit Amount
  type: Num
  size: 19.6
- field: RateType
  description: Type of Exchange Rate
  type: VarChar
  size: 1
  default: O
  constraints:
  - key: O
    label: Original document
  - key: E
    label: Execution date
  - key: V
    label: Other value
- field: Comment
  description: Remarks
  type: nVarChar
  size: 250
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: Canceled
  description: Canceled
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: CancelDate
  description: Cancelation Date
  type: Date
  size: 8
- field: CancelUser
  description: Document Cancelled by
  type: Int
  size: 6
  related: OUSR
indexes:
- key: PRIMARY
  unique: true
  fields:
  - DocID
