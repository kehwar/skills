table: MSN4
description: MRP Scenarios - Items Array
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/MRP/MSN4.htm
fields:
- field: AbsEntry
  description: Internal Number
  type: Int
  size: 11
  related: OMSN
- field: ItemCode
  description: Item Code
  type: nVarChar
  size: 50
- field: Selected
  description: Selected
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: TmpForMrp
  description: Is Temporary for MRP
  type: VarChar
  size: 1
  default: N
- field: WorDueDate
  description: Production Order Due Date
  type: Date
  size: 8
- field: DsmDueDate
  description: Disassembly Order Due Date
  type: Date
  size: 8
- field: NorDueDate
  description: Non Prd Order Doc. Due Date
  type: Date
  size: 8
- field: Interval
  description: Order Intervals
  type: Int
  size: 6
- field: Multiple
  description: Order Multiple
  type: Num
  size: 19.6
- field: MinORdrQty
  description: Minimum Order Quantity
  type: Num
  size: 19.6
- field: LeadTime
  description: Lead Time
  type: Int
  size: 11
- field: prcrmntMtd
  description: Procurement Method
  type: VarChar
  size: 1
  default: B
  constraints:
  - key: B
    label: Buy
  - key: M
    label: Make
- field: ToleranDay
  description: Tolerance Day
  type: Int
  size: 11
- field: CompoWH
  description: Component Warehouse
  type: VarChar
  size: 1
  default: B
  constraints:
  - key: B
    label: From Bill of Materials Line
  - key: P
    label: From Parent Item Document Line
indexes:
- key: PRIMARY
  unique: true
  fields:
  - AbsEntry
  - ItemCode
- key: ItemCode
  unique: false
  fields:
  - ItemCode
