table: ANNM
description: Document Numbering - History
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/ANNM.htm
fields:
- field: ObjectCode
  description: Document
  type: nVarChar
  size: '20'
- field: AutoKey
  description: Automatic Key
  type: Int
  size: '11'
  default: '0'
- field: DfltSeries
  description: Default Series
  type: Int
  size: '11'
  default: '0'
- field: UpdCounter
  description: Update Counter
  type: Int
  size: '11'
  default: '0'
- field: UserSign
  description: User Signature
  type: Int
  size: '6'
  related: OUSR
- field: DocSubType
  description: Document Sub-Type
  type: nVarChar
  size: '2'
  default: --
  constraints:
  - key: --
    label: ''
  - key: IE
    label: Invoice Exempt
  - key: DN
    label: Debit Memo
  - key: IB
    label: Bill
  - key: EB
    label: Exempt Bill
  - key: RI
    label: Reserve Invoice
  - key: IR
    label: Invoice & Receipt
  - key: DM
    label: A/P Debit Memo
  - key: IX
    label: Export Invoice
  - key: RP
    label: A/P Reserve Invoice
  - key: OV
    label: Outgoing VAT - Withholding Tax
  - key: OG
    label: Outgoing Gross Income - Withholding Tax
  - key: 'ON'
    label: Outgoing Income - Withholding Tax
  - key: OS
    label: Outgoing Social Security - Withholding Tax
  - key: OI
    label: Outgoing Industry Specific - Withholding Tax
  - key: OD
    label: Outgoing District Specific - Withholding Tax
  - key: IC
    label: Incoming WTax Certificate
  - key: GA
    label: GST Tax Invoice
  - key: GD
    label: GST Debit Memo
  - key: RV
    label: Refund Voucher
- field: DocAlias
  description: Alternative Document Name
  type: nVarChar
  size: '20'
- field: PeriodTyp
  description: Seq. Period Type of Supply Code
  type: VarChar
  size: '1'
- field: logInstanc
  description: Log Instance - History
  type: Int
  size: '11'
- field: DigManuSer
  description: Digital Manual Series
  type: VarChar
  size: '1'
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
indexes:
- key: PRIMARY
  unique: true
  fields:
  - ObjectCode
  - DocSubType
  - logInstanc
