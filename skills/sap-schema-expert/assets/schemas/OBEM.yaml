table: OBEM
description: SAP Sustainability Footprint Management Footprint Inventory Scope Period
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/General/OBEM.htm
fields:
- field: AbsEntry
  description: Period Internal No.
  type: Int
  size: 11
- field: ScopeKey
  description: Footprint Inventory Scope Identifier in PFMCOP
  type: nVarChar
  size: 36
- field: ScopeName
  description: Footprint Inventory Scope Name
  type: nVarChar
  size: 36
- field: Periodic
  description: Periodicity
  type: VarChar
  size: 1
  default: M
  constraints:
  - key: M
    label: Month
  - key: Y
    label: Year
- field: StartDate
  description: Start Date
  type: Date
  size: 8
- field: EndDate
  description: End Date
  type: Date
  size: 8
- field: Status
  description: Status
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: N
    label: New
  - key: I
    label: Initializing
  - key: R
    label: Reinitializing
  - key: P
    label: In Process
  - key: C
    label: Complete
  - key: E
    label: Error
  - key: A
    label: Complete with Inconsistencies
- field: UpdateDate
  description: Last Transactional Data Update Date
  type: Date
  size: 8
- field: LastRepId
  description: Last Replication Identifier
  type: nVarChar
  size: 36
- field: RepMessage
  description: Replication Message
  type: Text
  size: 16
indexes:
- key: PRIMARY
  unique: true
  fields:
  - AbsEntry
