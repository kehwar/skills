table: MTH3V
description: Filter for Query MTH
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Banking/MTH3V.htm
fields:
- field: absEntry
  description: Internal Number
  type: Int
  size: 11
- field: AcctCdeFrm
  description: Account Code From
  type: nVarChar
  size: 15
- field: AcctCdeTo
  description: Account Code To
  type: nVarChar
  size: 15
- field: IsInternal
  description: Reconciliation Type
  type: VarChar
  size: 1
  default: E
  constraints:
  - key: I
    label: Internal
  - key: E
    label: External
- field: IsCard
  description: Select BP or Account
  type: VarChar
  size: 1
  default: A
  constraints:
  - key: A
    label: G/L Account
  - key: C
    label: BP
- field: MatchNumFr
  description: Reconciliation No. From
  type: Int
  size: 11
- field: MatchNumTo
  description: Reconciliation No. To
  type: Int
  size: 11
- field: MthDateFrm
  description: Reconciliation Date From
  type: Date
  size: 8
- field: MthDateTo
  description: Reconciliation Date To
  type: Date
  size: 8
- field: MthAcctCod
  description: Account Code
  type: nVarChar
  size: 15
- field: MatchNum
  description: Reconciliation No.
  type: Int
  size: 11
indexes:
- key: PRIMARY
  unique: true
  fields:
  - MthAcctCod
  - IsInternal
  - MatchNum
