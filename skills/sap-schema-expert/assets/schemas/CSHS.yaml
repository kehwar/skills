table: CSHS
description: User-Defined Values
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/CSHS.htm
fields:
- field: FormID
  description: Form ID
  type: nVarChar
  size: 100
- field: ItemID
  description: Field
  type: nVarChar
  size: 52
- field: ColID
  description: Column ID
  type: nVarChar
  size: 128
  default: '-1'
- field: ActionT
  description: Action
  type: Int
  size: 6
  default: 0
  constraints:
  - key: '0'
    label: ''
  - key: '1'
    label: Valid Values
  - key: '2'
    label: Query
- field: QueryId
  description: Query ID
  type: Int
  size: 11
  related: OUQR
- field: IndexID
  description: Index
  type: Int
  size: 11
- field: Refresh
  description: Refresh
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: FieldID
  description: Field
  type: nVarChar
  size: 60
- field: FrceRfrsh
  description: Force Refresh
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: ByField
  description: By Field
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: When Field Changes
  - key: N
    label: When Exiting Altered Column
  - key: C
    label: When Column Value Changes
indexes:
- key: PRIMARY
  unique: true
  fields:
  - IndexID
- key: DETAILS
  unique: true
  fields:
  - FormID
  - ItemID
  - ColID
