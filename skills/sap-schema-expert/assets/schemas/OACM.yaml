    label: 'Yes'
  - key: N
    label: 'No'
- field: CreateDate
  description: Creation Date
  type: Date
  size: 8
- field: UpdateDate
  description: Date of Update
  type: Date
  size: 8
indexes:
- key: PRIMARY
