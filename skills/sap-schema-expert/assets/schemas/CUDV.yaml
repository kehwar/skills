table: CUDV
description: User-Defined Values
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/CUDV.htm
fields:
- field: FormID
  description: Form ID
  type: nVarChar
  size: 100
- field: ItemID
  description: Field
  type: nVarChar
  size: 52
- field: ColID
  description: Column ID
  type: nVarChar
  size: 128
  default: '-1'
- field: ActionT
  description: Action
  type: Int
  size: 6
  default: 0
  constraints:
  - key: '0'
    label: ''
  - key: '1'
    label: Filtered List
  - key: '2'
    label: Formula
- field: QueryId
  description: Query ID
  type: Int
  size: 11
  related: OUQR
- field: IndexID
  description: Index
  type: Int
  size: 11
- field: Refresh
  description: Refresh
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: FieldID
  description: Field
  type: nVarChar
  size: 60
- field: FrceRfrsh
  description: Force Refresh
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: ByField
  description: By Field
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: When Field Changes
  - key: N
    label: When Exiting Altered Column
  - key: C
    label: When Column Value Changes
- field: ViewCmplt
  description: Allow to View Full List
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: ExpId
  description: Formula ID
  type: Int
  size: 11
  related: CUVE
- field: BObject
  description: B Object
  type: nVarChar
  size: 254
- field: DObject
  description: DB Object Name
  type: nVarChar
  size: 52
- field: CreateTS
  description: Create Time
  type: Int
  size: 11
- field: UpdateTS
  description: Update Time
  type: Int
  size: 11
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: UserSign2
  description: Updating User
  type: Int
  size: 6
  related: OUSR
- field: CreateDate
  description: Creation Date
  type: Date
  size: 8
- field: UpdateDate
  description: Date of Update
  type: Date
  size: 8
indexes:
- key: PRIMARY
  unique: true
  fields:
  - IndexID
- key: DETAILS
  unique: true
  fields:
  - FormID
  - ItemID
  - ColID
