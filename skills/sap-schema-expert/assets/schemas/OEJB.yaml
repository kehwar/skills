table: OEJB
description: Wizard Run Details for ERV-JAb
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Reports/OEJB.htm
fields:
- field: WizardId
  description: Wizard ID
  type: Int
  size: 11
- field: WizardName
  description: Wizard Name
  type: nVarChar
  size: 100
- field: FromDate
  description: From Date
  type: Date
  size: 8
- field: ToDate
  description: To Date
  type: Date
  size: 8
- field: PFromDate
  description: Previous Year From Date
  type: Date
  size: 8
- field: PToDate
  description: Previous Year To Date
  type: Date
  size: 8
- field: DateOfRun
  description: Date of Run
  type: Date
  size: 8
- field: Status
  description: Status
