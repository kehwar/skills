    label: Public Limited Company (AG)
  - key: SC
    label: European Cooperative Society (SCE)
  - key: SE
    label: Company under European Law (SE, Societa Europaea)
  - key: GEN
    label: Industrial Cooperative Society
  - key: GES
    label: Limited Liability Company (GmbH)
  - key: KG
    label: Limited Partnership
  - key: OG
    label: Open Company
- field: LFBSheetPr
  description: Lgl Form on Bal Sht Dte Prv Yr
