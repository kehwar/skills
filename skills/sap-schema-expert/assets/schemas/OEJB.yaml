    label: Open
  - key: C
    label: Closed
- field: ActYearCl
  description: Classifictn in Actual Yr
  type: VarChar
  size: 1
  constraints:
  - key: S
    label: Small
  - key: M
    label: Medium
  - key: L
    label: Large
- field: FormFinSt
  description: Form of Financial Statement
  type: Int
  size: 11
  default: 0
  constraints:
  - key: '0'
    label: ''
  - key: '1'
    label: Small GmbH (UGB Form 2,3)
  - key: '2'
    label: Small GmbH with Balance Sheet
  - key: '3'
    label: Medium Large GmbH
  - key: '4'
    label: AG (Eng. PLC)
- field: EBSTmpl
  description: E-Balance Sheet Template
  type: Int
  size: 11
  related: OFRT
- field: EPaLTmpl
  description: E-P&L Template
  type: Int
  size: 11
  related: OFRT
- field: OverwrFinS
  description: Overwrite Financial Statement
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: Reference
  description: Reference
  type: nVarChar
  size: 25
- field: HBCode
  description: House Bank Code
  type: Int
  size: 11
  related: DSC1
- field: PayRef
  description: Payment Reference
  type: nVarChar
  size: 12
- field: SndrRole
  description: Sender Role
  type: Int
  size: 11
  default: 0
  constraints:
  - key: '0'
    label: ''
  - key: '1'
    label: 1 - Sole Company Representative and Signatory
  - key: '2'
    label: 2 - Sole Authorized Company Representative
  - key: '3'
    label: 3 - One of Authorized Company Representatives
- field: CRegNumber
  description: Commercial Register Number
  type: nVarChar
  size: 7
- field: LFBSheetD
  description: Legal Form on Actl Bal Sht Dte
