- name: SalesTaxAuthorities
  kind: class
  description: 'SalesTaxAuthorities is a business object that represents the sales tax jurisdictions data for US and Canada localizations, or sales tax types for Latin America localization. In US and Canada localizations, the sales tax jurisdictions can be defined, for example, for each state , country , and city . In Latin America localization, the sales tax types are related to specific items, such as fuel and cigarettes, that are liable to tax ( Rate ) in addition to VAT. This object enables you to: Add a sales tax authority. Retrieve a sales tax authority by its key. Update a sales tax authority data. Save the object in XML format. Source table: OSTA .'
  doc_path: class/SalesTaxAuthorities.yaml
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxAuthorities.html
  related_tables:
  - OSTA
- name: SalesTaxAuthoritiesTypes
  kind: class
  description: 'SalesTaxAuthoritiesTypes is a business object that represents the type of sales tax authorities. It specifies whether or not the sales tax authority includes also VAT. This object enables you to: Add a sales tax authority type. Retrieve a sales tax authority type by its key. Update a sales tax authority type data. Save the object in XML format. Source table: OSTT .'
  doc_path: class/SalesTaxAuthoritiesTypes.yaml
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxAuthoritiesTypes.html
  related_tables:
  - OSTT
- name: SalesTaxCodes
  kind: class
  description: 'SalesTaxCodes is a business object that represents the inclusive sales tax codes. Each sales tax code consists of one or more sales taxes as defined in SalesTaxAuthorities object. This object enables you to: Add a sales tax code. Retrieve a sales tax code by its key. Update a sales tax code data. Save the object in XML format. Source table: OSTC .'
  doc_path: class/SalesTaxCodes.yaml
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxCodes.html
  related_tables:
