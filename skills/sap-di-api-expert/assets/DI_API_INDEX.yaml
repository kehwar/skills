- name: PriceLists
  kind: class
  description: 'PriceLists is a business object that represents the management of price lists in the Inventory module. A price list is used by Items_Prices object to set the item prices. An item can have several prices, with each based on a different price list, for example, purchase price list, sales price list, distributor price list, and so on. This object enables you to: Add a price list. Retrieve a price list by its key. Update a price list. Delete a price list. Save the object in XML format. Source table: OPLN .'
  doc_path: class/PriceLists.yaml
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PriceLists.html
  related_tables:
