- name: ProductionOrders
  kind: class
  description: 'The ProductionOrders object supports the creation and maintenance of production orders. This object replaces the WorkOrders object of release 2004. During upgrade to 2005, SAP Business One creates production orders based on the data of the existing work orders (OWKO, WKO1). Therefore, you must upgrade add-ons that use the WorkOrders object to use the ProductionOrders object. After the upgrade process work orders can be displayed only but cannot be maintained. Source table: OWOR .'
