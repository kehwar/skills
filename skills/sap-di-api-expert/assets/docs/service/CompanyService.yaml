name: CompanyService
title: CompanyService Object
kind: service
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyService.html
description: 'The CompanyService enables to manage the company administration data. This includes the following tables: - Administration data - OADM ( AdminInfo object). Company data - CINF ( CompanyInfo object). Posting Periods - OACT ( ChartOfAccounts object). Finance Periods - OFPR ( FinancePeriods object). You can also retrieve the status of the application features, whether these features are blocked or not, according to the installation type and localization (see GetFeaturesStatus method).'
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method.'
methods:
