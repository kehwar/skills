name: EmployeeTransfersService
title: EmployeeTransfersService Object
kind: service
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfersService.html
description: 'EmployeeTransfersService is a business object that manages employee master data transfers from SAP Business One to the DATEV HR client application. Source table: OHET .'
remarks: 'To transfer employee information from SAP Business One: - Choose Human Resources --> Human Resources Reports --> Employee List . - Select the desired employee from the list. - Choose the Transfer button.'
methods:
- name: AddEmployeeTransfer
  description: Adds an employee transfer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfersService~AddEmployeeTransfer.html
- name: DeleteEmployeeTransfer
  description: Deletes an existing employee transfer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfersService~DeleteEmployeeTransfer.html
- name: GetDataInterface
  description: Creates an empty data structure. This means the structure contains the default settings/values of the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfersService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
