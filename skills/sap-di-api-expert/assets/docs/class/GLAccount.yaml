name: GLAccount
title: GLAccount Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GLAccount.html
description: GLAccount is a data structure related to the AccountsService . The data is stored temporarily in a virtual table.
remarks: 'To display the form related to the data structure: - Select Administration --> System Initialization --> Openning Balances --> G/L Accounts Openning Balance.'
