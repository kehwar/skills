description: 'Holds the key of an address. This object is used to pass keys to and retrieve keys from AddressService methods. Source table: SCL7 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
