description: 'The LandedCost_CostLine object enables you to allocate landed costs to the various items according to specific criteria, for example volume, weight, or quantity. Source table: IPF2 .'
remarks: To access the form in the application, choose Purchasing A/P --> Landed Costs , and choose the Costs tab.
