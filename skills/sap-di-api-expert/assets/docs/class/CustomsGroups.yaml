name: CustomsGroups
title: CustomsGroups Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CustomsGroups.html
description: 'The CustomsGroups object enables to define custom groups, which specify the customs duty for items purchased abroad that are liable for customs. Source table: OARG .'
remarks: 'To display the form in the application: - Select Administration -->Setup -->Inventory -->Customs Groups .'
methods:
