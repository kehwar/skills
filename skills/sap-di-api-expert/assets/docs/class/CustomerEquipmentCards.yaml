name: CustomerEquipmentCards
title: CustomerEquipmentCards Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CustomerEquipmentCards.html
description: 'CustomerEquipmentCards is a business object that represents the customer equipment cards in the Services module. This object enables you to: - Add a customer equipment card. Retrieve a customer equipment card by its key. Update a customer equipment card. Remove a customer equipment card. Save the object in XML format. Source table: OINS .'
remarks: 'Mandatory fields in SAP Business One: ManufacturerSerialNum or InternalSerialNum (according to the definition of Unique Number in the General Settings in SAP Business One - SriUniqFld field in OADM table), ItemCode , and CustomerCode . To display the form in the application: - Select Service --> Customer Equipment Card .'
