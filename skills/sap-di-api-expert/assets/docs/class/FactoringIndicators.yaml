name: FactoringIndicators
title: FactoringIndicators Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FactoringIndicators.html
description: 'The FactoringIndicators object enables to define a key that can be recorded in certain journal entries and used as a selection criterion in various reports. Source table: OIDC .'
remarks: 'To display the form in the application: - Select Business Partners --> Business Partner Master Data --> General tab . Click the Choose From List button of the Factoring Indicator field. In the List of Indicators dialog box, click the New button.'
