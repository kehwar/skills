name: DynamicSystemStrings
title: DynamicSystemStrings Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings.html
description: 'The DynamicSystemStrings object enables to modify the field name and format in the interface to match the terms used in your company. For example, in the Business Partners Master Data form, you can modify the field name ''Code'' to '' BP Number '' (format: bold). Source table: SDIS .'
remarks: 'Mandatory properties: FormID and ItemID . The combination of these properties specify the primary key of the required field for modification. In case the ItemID specifies a table, set also the ColumnID , otherwise the system sets the value -1. To display the form in the application: - Open a form, e.g. an A/R Invoice. Hold down the Ctrl key and double-click the field name.'
methods:
- name: Add
  description: Applies a new modification to a field name.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~Browser.html
- name: ColumnID
  description: 'Sets or returns the column identification key. Field name: ColumnId . Mandatory property for Table fields. The default value is -1 ( Title field). Length: 10 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~ColumnID.html
  field_name: ColumnId
  length: 10
- name: FormID
  description: 'Sets or returns the form identification key. Field name: FormID . Mandatory property. Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~FormID.html
  length: 20
- name: IsBold
  description: 'Sets or returns a valid value that determines whether or not the new name of the field appears bold . Field name: IsBold .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~IsBold.html
- name: IsItalics
  description: 'Sets or returns a valid value that determines whether or not the new name of the field appears italic . Field name: IsItalic .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~IsItalics.html
  field_name: IsItalic
- name: ItemID
  description: 'Sets or returns the ID of the field or the table in a form (primary key with FormID ). Field name: ItemId . Mandatory property. Length: 10 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~ItemID.html
  field_name: ItemId
  length: 10
- name: ItemString
  description: 'Sets or returns the new name for the specified field. Field name: ItemString . Length: 64 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~ItemString.html
  length: 64
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DynamicSystemStrings~UserFields.html
