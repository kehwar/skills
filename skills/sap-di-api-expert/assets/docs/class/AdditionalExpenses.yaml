name: AdditionalExpenses
title: AdditionalExpenses Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AdditionalExpenses.html
description: 'AdditionalExpenses is a business object that represents the additional expenses defined in the Administration module. These definitions are used by the Marketing Documents and Receipts . This object enables to calculate additional costs connected with a document, such as delivery changes and deposit tax. This object enables you to: - Add an additional expense. Retrieve an additional expense by its key. Update an additional expense. Save the object in XML format. Source table: OEXD .'
remarks: 'To display the form in the application: - Select Administration --> System Initialization --> Document Settings . - In the General tab, select Manage Expenses In Documents . - Click Define Expenses .'
