name: KPIsService
title: KPIsService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService.html
description: 'The KPIsService service enables you to add, look up, update, and remove dashboard parameters. Source table: OKPI .'
remarks: To open the Dashboard Parameters - Setup window, from the SAP Business One Main Menu , choose Administration --> Setup --> General --> Dashboard Parameters .
methods:
- name: Add
  description: Adds a dashboard parameter.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~Add.html
- name: Delete
  description: Deletes an existing dashboard parameter.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~Delete.html
- name: Get
  description: Retrieves a dashboard parameter. The dashboard parameter is specified by its key, which is contained in the KPIParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the KPIsService .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates an object from an XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates an object from XML.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~GetDataInterfaceFromXMLString.html
- name: GetList
  description: Returns the KPIsParams data collection that identifies all dashboard parameters.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~GetList.html
- name: Update
  description: Updates an existing dashboard parameter.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KPIsService~Update.html
