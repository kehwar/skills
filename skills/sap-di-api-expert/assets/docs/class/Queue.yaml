name: Queue
title: Queue Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue.html
description: 'Queue is a business object that represents the queues list in the Service module from which you can assign a queue member to a service call. A queue is a group of SAP Business One users (queue members) that have a common role, such as software service representatives , hardware service representatives , and so on. This object enables you to: - Add a queue. Retrieve a queue by its key. Update a queue. Remove a queue. Save the object in XML format. Source table: OQUE .'
remarks: 'Mandatory fields in SAP Business One: Description , QueueID , and QueueManager . To display the form in the application: - Select Administration --> Setup --> Service --> Queues .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~GetByKey.html
- name: Remove
  description: Not supported.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Browser.html
- name: Description
  description: 'Sets or returns a description of the queue. Mandatory property. Field name: descript . Length: 200 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Description.html
  field_name: descript
  length: 200
- name: Inactive
  description: 'Sets or returns a valid value of BoYesNoEnum type that specifies whether or not the queue is inactive. Field name: inactive .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~Inactive.html
  field_name: inactive
- name: QueueEmail
  description: 'Sets or returns a e-mail address of the queue. Field name: email . Length: 200 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~QueueEmail.html
  field_name: email
  length: 200
- name: QueueID
  description: 'Sets or returns a unique code for identifying the queue. Mandatory property. Field name: queueID . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~QueueID.html
  field_name: queueID
  length: 20
- name: QueueManager
  description: 'Sets or returns a queue manager as defined in SAP Business One. Mandatory property. Field name: manager . This is a foreign key to the Users object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Queue~QueueManager.html
  field_name: manager
- name: QueueMembers
