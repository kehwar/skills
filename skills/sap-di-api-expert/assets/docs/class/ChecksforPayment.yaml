name: ChecksforPayment
title: ChecksforPayment Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChecksforPayment.html
description: 'Represents checks that are not tied to a document. SAP Business One updates the balances of vendor accounts each time you add a check for payment. This object is part of the Banking module. Checks tied to documents are represented by the Payments_Checks object. This object enables you to: - Add checks for payment. Retrieve a check details by its key. Update checks for payment. Save the object in XML format. Source table: OCHO .'
remarks: 'Mandatory fields in SAP Business One: BankCode , CustomerAccountCode , CountryCode , and RowTotal (from ChecksforPaymentLines object). To display the form in the application: - Select Banking --> Outgoing Payments --> Checks for Payment .'
