- name: Details
  description: 'Set to the Remarks field in the down payment invoice. Field name: BsComments'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~Details.html
