name: DownPaymentsToDraw
title: DownPaymentsToDraw Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw.html
description: 'Represents down payments drawn into A/R or A/P invoices. The Documents.DownPaymentAmount property is updated with the total amount to draw. Source tables: INV9 , PCH9 , RIN9 , RPC9 , DRF9'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~SetCurrentLine.html
properties:
- name: AmountToDraw
  description: 'The net amount (without tax) drawn to the invoice. Field name: DrawnSum'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~AmountToDraw.html
  field_name: DrawnSum
- name: AmountToDrawFC
  description: 'The net amount (without tax) drawn to the invoice in foreign currency. Field name: DrawnSumFc'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~AmountToDrawFC.html
  field_name: DrawnSumFc
- name: AmountToDrawSC
  description: 'The net amount (without tax) drawn to the invoice in system currency. Field name: DrawnSumSc'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DownPaymentsToDraw~AmountToDrawSC.html
  field_name: DrawnSumSc
- name: Count
  description: The number of downpayment lines in the collection.
