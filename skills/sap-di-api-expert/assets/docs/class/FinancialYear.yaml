name: FinancialYear
title: FinancialYear Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FinancialYear.html
description: 'Represents a financial year for TDS (withholding tax) reports. Source table: OFYM'
remarks: 'For India only. Mandatory properties: Code , Description , StartDate , AssessYear'
