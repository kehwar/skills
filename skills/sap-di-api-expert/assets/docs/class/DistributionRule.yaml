name: DistributionRule
title: DistributionRule Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule.html
description: 'Represents a distribution rule for spreading a specific expense, account, journal entry, or other entity among profit centers. Source table: OOCR Mandatory properties: FactorCode , TotalFactor'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~ToXMLString.html
properties:
- name: Direct
  description: 'Indicates whether the allocation of amounts is done directly or indirectly. Field name: Direct'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~Direct.html
- name: DistributionRuleLines
  description: The set of profit centers to which to assign costs and revenues that have been tied to this distribution rule.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~DistributionRuleLines.html
- name: FactorCode
  description: 'The key for a specific distribution rule. Field name: OcrCode'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~FactorCode.html
  field_name: OcrCode
- name: FactorDescription
  description: 'A description for a specific distribution rule. Field name: OcrName'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~FactorDescription.html
  field_name: OcrName
- name: InWhichDimension
  description: 'The dimension in which this distribution rule is located. Field name: DimCode This is a foreign key to the Dimension object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~InWhichDimension.html
  field_name: DimCode
- name: IsFixedAmount
  description: property IsFixedAmount
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~IsFixedAmount.html
- name: TotalFactor
  description: 'A number that represents 100 percent of the amount to be distributed. For example, if TotalFactor is 80, and the distribution contained profit center A at 20 and profit center B at 60, then profit center A would be allocated 25 percent and profit center B would be allocated 75 percent. Field name: OcrTotal'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~TotalFactor.html
  field_name: OcrTotal
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRule~UserFields.html
