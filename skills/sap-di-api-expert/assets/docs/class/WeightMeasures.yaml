name: WeightMeasures
title: WeightMeasures Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures.html
description: 'The WeightMeasures object enables to define the weight measure units that are used for item records. Source table: OWGT .'
remarks: 'To display the form in the application: - Select Administration --> Setup --> Inventory --> Weight UoM .'
methods:
- name: Add
  description: Adds a weight unit of measure definition.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~Browser.html
- name: UnitCode
  description: 'Returns the weight unit code (primary key). Field name: UnitCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~UnitCode.html
- name: UnitDisplay
  description: 'Sets or returns the displayed name of the weight unit (for example, kg). Field name: UnitDisply . Length: 2 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~UnitDisplay.html
  field_name: UnitDisply
  length: 2
- name: UnitName
  description: 'Sets or returns the unit name (for example, Kilogram). Field name: UnitName . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~UnitName.html
  length: 20
- name: UnitWeightinmg
  description: 'Sets or returns the weight in miligrams. For example: 1,000,000 mg for Kg measure unit or 28,300 mg for Oz measure unit. Field name: WightInMG .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~UnitWeightinmg.html
  field_name: WightInMG
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WeightMeasures~UserFields.html
