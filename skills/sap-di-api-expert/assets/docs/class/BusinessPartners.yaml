description: 'BusinessPartners is a business object that represents the Business Partners Master Data in the Business Partners module. This object enables you to: - Add a business partner record. Retrieve a business partner record by its key. Update a business partner record. Remove a business partner record. Save the object in XML format. Source table: OCRD .'
remarks: 'To display the form in the application: - Select Business Partners --> Business Partner Master Data .'
