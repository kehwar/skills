name: PaymentWizard
title: PaymentWizard Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard.html
description: 'The payment wizard enables you to generate incoming and outgoing payments in batches according to the selected A/R and A/P open transactions and the selected payment methods. Source table: OPWZ .'
remarks: From the SAP Business One Main Menu , choose Banking -> Payment Wizard . From the Web Client, choose Payment -> Payment Runs -> Payment Run detailed view -> Navigation button.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~ToXMLString.html
properties:
- name: BankTransferPaymentMethod
  description: 'Indicates whether Bank Transfer is selected as a payment method in the wizard. Field name: BnkTrnsPmM .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~BankTransferPaymentMethod.html
  field_name: BnkTrnsPmM
- name: BillOfExchangePaymentMethod
  description: 'Indicates whether Bill of Exchange is selected as a payment method. Field name: BoePmnMn .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~BillOfExchangePaymentMethod.html
  field_name: BoePmnMn
- name: CheckPaymentMethod
  description: 'Indicates whether Check is selected as a payment method in the wizard. Field name: CheckPmntM .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~CheckPaymentMethod.html
  field_name: CheckPmntM
- name: IdNumber
  description: 'Internal unique identifier of the Payment Wizard run. Field name: IdNumber .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~IdNumber.html
- name: IncomingType
  description: 'Specifies the type of incoming payments processed by the wizard. Field name: IncomType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~IncomingType.html
  field_name: IncomType
- name: OutgoingType
  description: 'Specifies the type of outgoing payments processed by the wizard. Field name: OutgoType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~OutgoingType.html
  field_name: OutgoType
- name: PmntDate
  description: 'Payment date assigned to the payments created by the wizard. Field name: PmntDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~PmntDate.html
- name: WizardName
  description: 'Name or description of the Payment Wizard run. Field name: WizardName . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentWizard~WizardName.html
  length: 100
