  field_name: ItmsPerUnt
- name: LineNumber
  description: 'The line number of the inventory counting document. Field name: LineNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~LineNumber.html
  field_name: LineNum
- name: MultipleCounterRole
  description: 'The role of the multiple counters, that is, the multiple counters conduct the inventory counting individually or as a team. Field name: CounteRole .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~MultipleCounterRole.html
  field_name: CounteRole
- name: UoMCode
