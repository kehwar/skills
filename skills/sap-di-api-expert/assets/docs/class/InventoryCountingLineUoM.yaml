  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~BarCode.html
  length: 16
- name: ChildNumber
  description: 'ChildNum indicates for one "UoM Code" + "Bar Code". Field name: ChildNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~ChildNumber.html
  field_name: ChildNum
- name: CountedQuantity
  description: 'The item quantity in the warehouse as counted in the inventory taking. Field name: CountQty .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~CountedQuantity.html
  field_name: CountQty
- name: CounterID
  description: 'The ID of the counter. Field name: CounterId .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~CounterID.html
  field_name: CounterId
- name: CounterType
  description: 'The type of the counter. Field name: CounteType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~CounterType.html
  field_name: CounteType
- name: DocumentEntry
  description: 'The internal key of the inventory counting. Field name: DocEntry.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCountingLineUoM~DocumentEntry.html
  field_name: DocEntry
