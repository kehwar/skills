name: Users
title: Users Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users.html
description: 'Users is a business object that represents the users table of the SAP Business One application. The users table includes the users list, login details, and authorizations. This object enables you to: - Add users to the users list. Retrieve user''s details by its key. Update user''s details. Remove users from the users list. Save the object in XML format. Source table: OUSR .'
remarks: 'Mandatory fields in SAP Business One: UserCode and UserPassword . To display the form in the application: - Select Administration --> Setup --> General --> Users .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Add.html
- name: Close
  description: Not supported.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Close.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~GetByKey.html
- name: Remove
  description: Deletes a user from the users list.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Remove.html
- name: RemoveUserAndLicense
  description: Removes the user and their license allocation.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~RemoveUserAndLicense.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Update.html
properties:
