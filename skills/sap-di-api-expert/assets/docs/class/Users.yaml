  description: 'Sets or returns the user''s branch code. Field name: Branch . This is a foreign key to the Branches table ( OUBR - not exposed through the DI API).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Branch.html
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~Browser.html
- name: CashLimit
  description: 'Indicates whether to set the maximum cash amount a regular user is authorized to enter in an incoming payment ( Payment Means window, Cash tab). Field name: CashLimit .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Users~CashLimit.html
- name: Defaults
  description: 'Sets or returns the users group code. Length: 8 characters. Field name: DfltsGroup . This is a foreign key to the UserDefaultGroups object , which provides the default values related to the users group.'
