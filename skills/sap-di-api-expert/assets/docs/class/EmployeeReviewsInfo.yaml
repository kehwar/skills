name: EmployeeReviewsInfo
title: EmployeeReviewsInfo Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo.html
description: 'EmployeeReviewsInfo is a child object of the EmployeesInfo object and represents the employee reviews information. Source table: HEM3 .'
remarks: 'To display the form in the application: - Select Human Resources --> Employee Master Data. Select the Administration tab. Click Reviews .'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~SetCurrentLine.html
properties:
- name: Count
  description: Returns the total data rows in the employee reviews list.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Count.html
- name: Date
  description: 'Sets or returns the date of the review. Field name: date .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Date.html
  field_name: date
- name: EmployeeNo
  description: 'Sets or returns the employee ID, which SAP Business One generates automatically when adding a new employee. Field name: empID . This is a foreign key to the EmployeesInfo object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~EmployeeNo.html
  field_name: empID
- name: Grade
  description: 'Sets or returns the grade of the employee. Field name: grade . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Grade.html
  field_name: grade
  length: 50
- name: LineNum
  description: 'Returns the current row number in the employee reviews list. Field name: line .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~LineNum.html
  field_name: line
- name: Manager
  description: 'Sets or returns the manager''s employee-ID of the employee. Field name: manager . This is a foreign key to the EmployeesInfo object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Manager.html
  field_name: manager
- name: Remarks
  description: 'Sets or returns a memo type string that specifies remarks of the employee review. Field name: remarks . Length: 64,000 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~Remarks.html
  field_name: remarks
- name: ReviewDescription
  description: 'Sets or returns a description of the employee review. Field name: reviewDesc . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~ReviewDescription.html
  field_name: reviewDesc
  length: 100
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeReviewsInfo~UserFields.html
