name: UoMGroupDefinition
title: UoMGroupDefinition Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition.html
description: 'Defines and sets conversion rules for Unit of Measure Groups. Source table: UGP1 .'
remarks: From the Main Menu, choose Administration > Setup > Inventory > Unit of Measure Groups. Available under form settings.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~ToXMLString.html
properties:
- name: Active
  description: 'Determines whether "IUoMGroupDefinition" conversion rule is active or not. Field name: IsActive .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~Active.html
  field_name: IsActive
- name: AlternateQuantity
  description: 'The alternate quantity. Field name: AltQty .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~AlternateQuantity.html
  field_name: AltQty
- name: AlternateUoM
  description: 'The alternate UoM. Field name: UomEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~AlternateUoM.html
  field_name: UomEntry
- name: BaseQuantity
  description: 'The base quantity. Field name: BaseQty .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~BaseQuantity.html
  field_name: BaseQty
- name: BaseUdfFtr
  description: 'Provides the user-defined fields (UDFs) of items in the drop down. Functionally the same as"UdfFactor". Populates values based on the fields defined in the user-defined fields. Field name: BaseUdfFtr .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~BaseUdfFtr.html
- name: BaseWgtFtr
  description: 'Provides weight related values. Functionally equivalent to "WeightFactor". Populates weight-related values, such as grams or milligrams. Field name: BaseWgtFtr .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~BaseWgtFtr.html
- name: UdfFactor
  description: 'Provides the user-defined fields (UDFs) of items in the drop down. Functionally the same as"BaseUdfFtr". Populates values based on the fields defined in the user-defined fields. Field name: UdfFactor .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~UdfFactor.html
- name: WeightFactor
  description: 'Provides weight related values. Functionally equivalent to "BaseWgtFtr". Populates weight-related values, such as grams or milligrams. Field name: WghtFactor .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UoMGroupDefinition~WeightFactor.html
  field_name: WghtFactor
