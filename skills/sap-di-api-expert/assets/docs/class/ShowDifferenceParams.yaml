name: ShowDifferenceParams
title: ShowDifferenceParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams.html
description: Holds the key to an existing change log that contains several log instances. This object is used to pass keys to and retrieve keys from the ChangeLogsService methods.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~ToXMLString.html
properties:
- name: LogInstance
  description: 'The instance number of the first log that you want to compare and show the differences. Field name: Instance . Length: 11 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~LogInstance.html
  field_name: Instance
  length: 11
- name: LogInstance2
  description: 'The instance number of the second log that you want to compare and show the differences. Field name: Instance2 . Length: 11 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~LogInstance2.html
  field_name: Instance2
  length: 11
- name: Object
  description: 'The unique code of the object that is changed. Field name: ObjectCode . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~Object.html
  field_name: ObjectCode
  length: 50
- name: PrimaryKey
  description: 'The primary number of the document. Note: This field is for non user-defined objects. Field name: PK1 . Length: 64 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~PrimaryKey.html
  field_name: PK1
  length: 64
- name: UDOObjectCode
  description: 'The unique code of the user-defined object that is changed. Field name: UDOObjectCode . Length: 11 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShowDifferenceParams~UDOObjectCode.html
  length: 11
