- name: Code
  description: 'The code for the warehouse sublevel. Field name: SLCode. Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WarehouseSublevelCodeParams~Code.html
  field_name: SLCode
