name: WarehouseSublevelCodeParams
title: WarehouseSublevelCodeParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WarehouseSublevelCodeParams.html
description: Holds the key to an existing warehouse sublevel code. This object is used to pass keys to and retrieve keys from WarehouseSublevelCodesService methods.
methods:
