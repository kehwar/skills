  field_name: BeforVatFC
- name: BillofLadingNumber
  description: 'The number of the bill of lading attached to the landed costs document Field name: BillOfLad. Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~BillofLadingNumber.html
  field_name: BillOfLad
  length: 20
- name: Broker
  description: 'The code of the broker hired to assist with the import and customs procedures. Field name: AgentCode. Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~Broker.html
  field_name: AgentCode
  length: 15
- name: BrokerName
  description: 'The name of the broker hired to assist with the import and customs procedures. Field name: AgentName. Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~BrokerName.html
  field_name: AgentName
  length: 100
- name: ClosedDocument
  description: 'Specify the field when you finish processing a landed costs document. Field name: DocStatus.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ClosedDocument.html
  field_name: DocStatus
- name: CustomsAffectsInventory
  description: 'Specifies whether the customs fees affect the inventory value. Field name: incCustom.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~CustomsAffectsInventory.html
  field_name: incCustom
- name: DocEntry
  description: 'The internal ID of the landed costs. Field name: DocEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~DocEntry.html
- name: DocumentCurrency
  description: 'The currency used for the document. Field name: DocCur. Length: 3 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~DocumentCurrency.html
  field_name: DocCur
  length: 3
- name: DocumentRate
  description: 'The exchange rate used for the document. You must enter an exchange rate; otherwise, you are not able to continue recording the landed costs document. After you specify an exchange rate, you can choose either the vendor currency or your local currency. Your selection determines the currency in which monetary values are displayed in the document. Field name: DocRate.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~DocumentRate.html
  field_name: DocRate
- name: DueDate
  description: 'Specify the due date for the document. The default value is the date on which the landed costs document is created. If required, change the date. Field name: DocDueDate.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~DueDate.html
  field_name: DocDueDate
- name: FileNumber
  description: 'Number of the landed costs document, as provided by your broker. Field name: AgentNum. Length: 16 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~FileNumber.html
  field_name: AgentNum
  length: 16
- name: JournalRemarks
  description: 'The remarks for the journal entry, which is used to fill the journal entry memo field (OJDT.Memo). Field name: JdtMemo. Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~JournalRemarks.html
  field_name: JdtMemo
  length: 50
