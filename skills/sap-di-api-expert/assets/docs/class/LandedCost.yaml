  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~Reference.html
  field_name: Ref1
  length: 11
- name: Remarks
  description: 'Displays the reference numbers or the vendor numbers for the goods receipt PO used in the landed costs document, and depends on the default settings made. You can change the remarks, if necessary. Field name: Descr. Length: 250 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~Remarks.html
