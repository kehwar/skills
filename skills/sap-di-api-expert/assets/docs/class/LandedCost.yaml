  field_name: DocNum
- name: PostingDate
  description: 'Specify the posting date. The default value is the date on which the landed costs document is created. If required, change the date. Field name: DocDate.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~PostingDate.html
  field_name: DocDate
- name: ProjectedCustoms
  description: 'Projected customs, which are calculated automatically as follows: Projected customs = (FOB + included for customs landed costs) x fixed customs rate % Field name: ExpCustom.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ProjectedCustoms.html
