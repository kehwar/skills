name: LandedCost
title: LandedCost Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost.html
description: 'Represents a landed costs document, which is used for recording and allocating the costs incurred when importing goods. Source table: OIPF .'
remarks: To access the window, from the SAP Business One main menu, choose Purchasing A/P --> Landed Costs .
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ToXMLString.html
properties:
- name: ActualCustoms
  description: 'The actual customs amount. Actual customs are calculated as follows: Actual customs = (FOB + included for customs landed costs) x fixed customs rate %. The fixed customs rate is defined in the Customs Group field on the Purchasing Data tab of the item master data. Field name: ActCustom.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ActualCustoms.html
  field_name: ActCustom
- name: ActualCustomsFC
  description: 'The actual customs amount in foreign currency. Field name: AcCustomFC.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~ActualCustomsFC.html
  field_name: AcCustomFC
- name: AmountToBalance
  description: 'Difference between the sum of amounts on the Costs tab and the Total Freight Charges value on the Items tab. Field name: Cost_Match.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~AmountToBalance.html
  field_name: Cost_Match
- name: AmountToBalanceFC
  description: 'Difference between the sum of amounts on the Costs tab and the Total Freight Charges value on the Items tab in foreign currency. Field name: C_Match_FC.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~AmountToBalanceFC.html
  field_name: C_Match_FC
- name: AttachmentEntry
  description: property AttachmentEntry
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~AttachmentEntry.html
- name: BeforeTax
  description: 'Sum of base document price + (expenditure*quantity) + projected customs Field name: BeforeVat.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~BeforeTax.html
  field_name: BeforeVat
- name: BeforeTaxFC
  description: 'Before tax in foreign currency. Field name: BeforVatFC.'
