  description: Returns the LandedCost_CostLine object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCost~LandedCost_CostLines.html
