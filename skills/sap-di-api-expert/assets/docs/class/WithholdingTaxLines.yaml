name: WithholdingTaxLines
title: WithholdingTaxLines Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WithholdingTaxLines.html
description: 'WithholdingTaxLines is a child object of Document_Lines object and supports Withholding Tax in a line level (as opposed to WithholdingTaxData object, which supports Withholding Tax in a document level). The WithholdingTaxLines object is applicable for cluster B only (country-specific for Brazil only). Source table: INV5 . Relevant only for the following tables: OINV , ORIN , ODLN , ORDR , ORDN , OPCH , ORPC , OPDN , ORPD , OPOR , ODRF , OCSI , OCSV , OCPI , and OCPV .'
remarks: 'The data for the Withholding tax table consists on WithholdingTaxCodes definitions. To define withholding tax codes in the application: - Select Administration --> Setup --> Financials --> Tax --> Withholding Tax . To display the form in the application: - Select a document (for example, select Sales - A/R --> A/R Invoice ). Select a document line. From the main menu, select Go to --> WT Table .'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WithholdingTaxLines~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WithholdingTaxLines~SetCurrentLine.html
