  description: 'The creation date of the serial number. Field name: InDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~AdmissionDate.html
  field_name: InDate
- name: Details
  description: 'Specify any free text regarding serial numbers. Field name: Notes . Length: 16 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~Details.html
  field_name: Notes
  length: 16
- name: DocEntry
  description: 'The document entry key that identifies the serial number detail. Field name: DocEntry.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~DocEntry.html
- name: ExpirationDate
  description: 'The expiry date of the serial number. Field name: ExpDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~ExpirationDate.html
  field_name: ExpDate
- name: ItemCode
  description: 'The number of the item. Field name: ItemCode . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~ItemCode.html
  length: 20
- name: ItemDescription
  description: The description of the item.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~ItemDescription.html
- name: Location
  description: 'The location of the item in the warehouse. Field name: Location . Length: 100 characters.'
