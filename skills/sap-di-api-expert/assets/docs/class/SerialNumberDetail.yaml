  field_name: GrntStart
- name: SerialNumber
  description: The serial number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~SerialNumber.html
- name: SystemNumber
  description: 'The system number of the item. Field name: SysNumber .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~SystemNumber.html
  field_name: SysNumber
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~UserFields.html
