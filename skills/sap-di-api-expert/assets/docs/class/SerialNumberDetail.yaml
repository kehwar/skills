  field_name: MnfDate
- name: MfrSerialNo
  description: 'The manufacturer serial number. Field name: MnfSerial . Length: 36 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SerialNumberDetail~MfrSerialNo.html
