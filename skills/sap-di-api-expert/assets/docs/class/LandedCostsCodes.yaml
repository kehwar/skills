name: LandedCostsCodes
title: LandedCostsCodes Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LandedCostsCodes.html
description: 'The LandedCostsCodes object enables to define codes for landed costs and their distribution type. These codes are used in delivery notes to divide the landed costs between the items according to the specified distribution type ( AllocationBy ), such as weight. Source table: OALC .'
remarks: 'To display the form in the application: - Select Administration --> Setup --> Purchasing --> Landed Costs .'
