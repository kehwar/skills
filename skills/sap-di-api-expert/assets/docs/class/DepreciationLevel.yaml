name: DepreciationLevel
title: DepreciationLevel Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel.html
description: 'DepreciationLevel is a child object of DepreciationType object. You can view an asset''s useful life as several phases and depreciate the asset by a defined rate for each phase. This way, the asset can have a course of depreciation that changes in levels over time. SAP Business One lets you break down an asset''s useful life into multiple phases, for each of which you can specify a depreciation rate and a validity period. Source table: DTP1 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~ToXMLString.html
properties:
- name: amount
  description: 'The amount for the depreciation. Field name: Amount .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~amount.html
  field_name: Amount
- name: DepreciationCalculationBase
  description: 'The base for the depreciation calculation in each phase of an asset''s useful life. Field name: Base .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~DepreciationCalculationBase.html
  field_name: Base
- name: Level
  description: 'The level of depreciation. SAP Business One lets you specify multiple levels, with each level representing a phase in an asset''s useful life. Field name: Level .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~Level.html
- name: NumberOfYears
  description: 'The number of years in each phase of an asset''s useful life. Field name: Years .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~NumberOfYears.html
  field_name: Years
- name: Percentage
  description: 'The annual percentage rate for the depreciation calculation that is valid for each phase. Field name: Percentage .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationLevel~Percentage.html
