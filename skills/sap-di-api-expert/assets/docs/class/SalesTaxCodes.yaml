name: SalesTaxCodes
title: SalesTaxCodes Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxCodes.html
description: 'SalesTaxCodes is a business object that represents the inclusive sales tax codes. Each sales tax code consists of one or more sales taxes as defined in SalesTaxAuthorities object. This object enables you to: - Add a sales tax code. Retrieve a sales tax code by its key. Update a sales tax code data. Save the object in XML format. Source table: OSTC .'
remarks: 'Mandatory fields in SAP Business One: ValidForAP and /or ValidForAR must be tYES . To display the form in the application (US and Canada localizations): - Select Administration --> Setup --> Financials --> Tax --> Sales Tax Codes . To display the form in the application (Latin America localization): - Select Administration --> Setup --> Financials --> Tax --> Tax Codes .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxCodes~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxCodes~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesTaxCodes~GetByKey.html
