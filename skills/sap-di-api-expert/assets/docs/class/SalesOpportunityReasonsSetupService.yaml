- name: GetSalesOpportunityReasonSetup
  description: Retrieves a reason. The reason is specified by its key ( Num ), which is contained in the SalesOpportunityReasonSetupParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityReasonsSetupService~GetSalesOpportunityReasonSetup.html
- name: GetSalesOpportunityReasonSetupList
  description: Retrieves the keys and names of all the reasons.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityReasonsSetupService~GetSalesOpportunityReasonSetupList.html
- name: UpdateSalesOpportunityReasonSetup
  description: Updates an existing reason. The data for the reason, including the key of the reason to be updated, is contained in the SalesOpportunityReasonSetup object passed to the method. To update a reason, you must first retrieve it using the GetSalesOpportunityReasonSetup method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityReasonsSetupService~UpdateSalesOpportunityReasonSetup.html
