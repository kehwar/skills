description: 'ProductTrees is a business object that represents a completed product comprising parts and raw materials, which is described by means of a bill of materials. This object is part of the Inventory module. This object enables you to: - Add an item to the product tree. Retrieve an item by its keys from the product tree. Update an item in the product tree. Remove an item from the product tree. Save the object in XML format. Source table: OITT .'
remarks: 'Mandatory fields in SAP Business One: TreeCode and TreeType . To display the form in the application: - Select Production --> Define Bill of Materials .'
