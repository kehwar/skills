name: AccountSegmentations
title: AccountSegmentations Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations.html
description: 'The AccountSegmentations object represents the account segments in the Financials module. The default segments are: Division , Region , and Department . When creating a new company, before defining any accounts, this object enables you to: - Add up to 10 segments. Retrieve a segment by its key. Update a segment. Save the object in XML format. After creating an account with segments, you can modify only the segment Name . Source table: OASG .'
remarks: 'Applicable only when the EnableAccountSegmentation property of the CompanyInfo object is set to Y. Account segmentation is used mainly in USA. To display the form in the application: - Select Administration --> Setup -->Financials -->Account Segmentation .'
methods:
- name: Add
  description: Adds an account segment (up to 10).
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Browser.html
- name: Categories
  description: The category of the account segmentation.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Categories.html
- name: Name
  description: 'Sets or returns the name of the account segmentation. Field name: Name . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Name.html
  length: 100
- name: Numerator
  description: 'Returns the identification key of the account segmentation as assigned by SAP Business One when adding an account segmentation. Field name: AbsId .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Numerator.html
  field_name: AbsId
- name: Size
  description: 'Sets or returns the number of characters assigned for the account segment. Field name: Size .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Size.html
- name: Type
  description: 'Sets or returns a valid value that determines wether or not the account segment is alphanumeric or numeric. Field name: Type .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~Type.html
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AccountSegmentations~UserFields.html
