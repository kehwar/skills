  field_name: OrdDprAcc
  length: 15
- name: AccumulatedSpecialDepr
  description: 'The account for the accumulated special depreciation of fixed assets. Field name: SpDprAcc . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FAAccountDetermination~AccumulatedSpecialDepr.html
  field_name: SpDprAcc
  length: 15
- name: AccumulatedUnplannedDepr
  description: 'The account for the accumulated unplanned depreciation of fixed assets. Field name: UnpDprAcc . Length: 15 characters.'
