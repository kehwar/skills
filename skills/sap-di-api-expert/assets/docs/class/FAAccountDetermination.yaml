  field_name: ReNBVeAct
  length: 15
- name: LeavewithRevenueNBVGross
  description: 'The revenue account for recording the net book value of an asset during retirement. When an asset with the gross posting method retires with profits, the account records the net book value of the asset during retirement. Field name: ReNBVrAct . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FAAccountDetermination~LeavewithRevenueNBVGross.html
  field_name: ReNBVrAct
