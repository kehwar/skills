- name: AssetBalanceSheetAccount
  description: 'The account for the acquisition and production costs of fixed assets. Field name: BalanceAct . Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FAAccountDetermination~AssetBalanceSheetAccount.html
  field_name: BalanceAct
  length: 15
- name: ClearingAccountAcquisition
