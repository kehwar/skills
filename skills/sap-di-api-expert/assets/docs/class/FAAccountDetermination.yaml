- name: LeavewithExpenseNBVGross
  description: 'The expense account for recording the net book value of an asset during retirement. When an asset with the gross posting method retires with losses, the account records the net book value of the asset during retirement. Field name: ReNBVeAct. Length: 15 characters.'
