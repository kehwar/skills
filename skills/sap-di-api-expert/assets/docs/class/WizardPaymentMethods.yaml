name: WizardPaymentMethods
title: WizardPaymentMethods Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WizardPaymentMethods.html
description: 'The WizardPaymentMethods object enables to define payment methods, such as check, bank transfer, or bill-of-exchange. Source table: OPYM .'
remarks: 'The payment method then can be assigned to each business partner. During the payment run process (Payment Wizard), the payment method selected for a business partner will affect the way the system clears invoices. To display the form in the application: - Select Administration --> Setup --> Banking --> Payment Methods .'
