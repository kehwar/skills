  field_name: MaxChoose
- name: MinimumAmountForAnnualList
  description: 'Sets the minimum amount above which a document is included in the annual sales report. This report is used for VAT declaration regarding customers only. The report covers all the customers who have federal tax ID that starts with a Belgium ISO code, and all the sales transactions that are VAT liable such as A/R invoices, A/R credit memos, down payments and manual journal entries created for sales purposes. Applicable for Belgium. Field name: MinAmntAL .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~MinimumAmountForAnnualList.html
  field_name: MinAmntAL
- name: MinimumAmountForAppndixOP
  description: 'Sets the minimum amount above which a document is included in the annual sales report. This report is used for VAT declaration regarding customers only. The report covers all the customers who have federal tax ID that starts with a Belgium ISO code, and all the sales transactions that are VAT liable such as A/R invoices, A/R credit memos, down payments and manual journal entries created for sales purposes. Applicable for Belgium. Field name: MinAmntAL .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~MinimumAmountForAppndixOP.html
  field_name: MinAmntAL
- name: MinimumBaseAmountPerDoc
  description: 'Determines whether or not to enable generatiion of reports that include only documents with minimum base amount. Applicable for Portugal. Field name: MinBaseDoc .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~MinimumBaseAmountPerDoc.html
  field_name: MinBaseDoc
- name: PercentOfTotalAcquisition
  description: 'Determines whether or not to enable generatiion of reports that include only documents with minimum base amount. Applicable for Portugal. Field name: MinBaseDoc .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~PercentOfTotalAcquisition.html
  field_name: MinBaseDoc
- name: SRIManagementSystem
  description: 'Determines the default management method for serial numbers and batches. The options are: A - On Every Transaction. The user must assign serial or batch numbers on every inventory transaction. R - On Release Only. The user must assign serial or batch numbers only on release (it is optional for other transactions). Field name: SriMngSys .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~SRIManagementSystem.html
  field_name: SriMngSys
- name: TaxCalculationSystem
  description: 'Returns a valid value that determines the type of tax calculation system to be used by the Tax Calculation Engine . Field name: TaxSysType ).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~TaxCalculationSystem.html
  field_name: TaxSysType
- name: Version
  description: 'Returns the version of SAP Business One application used by the company. Field name: Version .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~Version.html
