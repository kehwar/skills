  field_name: CompnyName
  length: 100
- name: DataOwnershipIndication
  description: 'Determines whether or not to block documents that would cause negative inventory level. Field name: BlockZeroQ .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~DataOwnershipIndication.html
  field_name: BlockZeroQ
- name: DefaultDaysForOrdCanc
  description: 'Sets the default number of days before cancelling a sales order. After this date the goods are not to be eccepted by the customer. The default value is 30 days after the Delivery Date. Field name: DaysOrdCnc .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~DefaultDaysForOrdCanc.html
  field_name: DaysOrdCnc
