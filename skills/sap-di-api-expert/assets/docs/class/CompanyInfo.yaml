  description: 'Determines whether or not to enable bill-of-exchange payment method. Applicable for Spain, Italy, France, and Portugal. Field name: EnableBOE .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~EnableBillOfExchange.html
