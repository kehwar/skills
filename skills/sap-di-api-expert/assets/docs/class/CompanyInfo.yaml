- name: EnableCheckQuantityInRDR
  description: 'Determines whether or not to check automatically the availabllity of item quantities before adding the quantity in sales orders. The default setting is Y. In case the available quantity is less than the quantity specified in the sales order, the system displays several options. Field name: ChkQunty .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~EnableCheckQuantityInRDR.html
