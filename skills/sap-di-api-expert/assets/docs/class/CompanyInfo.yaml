  description: property Localization
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~Localization.html
- name: MaxNumberOfDocumentsInPmt
  description: 'Sets the maximum number of invoices for outgoing payments by check. Field name: MxDcsInPmt .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~MaxNumberOfDocumentsInPmt.html
