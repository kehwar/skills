  field_name: BISRBnkCd
- name: BISRBranch
  description: 'Sets the branch number of the of the company house bank (BISR bank - applicable for Switzerland). This flag is valid only when EnbPayRef is set to Y. Field name: BISRBranch .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~BISRBranch.html
