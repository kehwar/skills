  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~DisplayTransactionsByDflt.html
  field_name: DispTrByDf
- name: EnableAccountSegmentation
  description: 'Determines whether or not to enable account segmentation. Field name: EnbSgmnAct .'
