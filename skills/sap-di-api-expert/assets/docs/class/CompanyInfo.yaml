  field_name: CalcVatGrp
- name: IEPSPayer
  description: 'Determines whether or not the company is liable to IEPS Payer (indirect tax). Applicable for Mexico, Costa Rica, and Guatemala. Companies defined as liable for IEPS Payer must maintain special IEPS posting, printing forms and declaration for authorities in all A/R documents. Note: For Mexico only, when this filed is set to Y, the IEPS Payer option is available also in the Item Master Data -->General tab. Field name: IepsPayer .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~IEPSPayer.html
  field_name: IepsPayer
- name: LanguageCode
  description: property LanguageCode
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~LanguageCode.html
