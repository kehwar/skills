  description: 'Sets the default stamp tax code for incoming payments. Applicable for Portugal. Field name: stampTax .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CompanyInfo~DefaultStampTax.html
  field_name: stampTax
- name: DisplayTransactionsByDflt
