name: DistributionRuleLine
title: DistributionRuleLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine.html
description: 'Specifies a profit center to which to assign part of any cost or expense that is tied to a distribution rule. Source table: OCR1 All properties are mandatory.'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~ToXMLString.html
properties:
- name: CenterCode
  description: 'The profit center to which to assign part of any cost or expense that is tied to a distribution rule. Field name: PrcCode . This is a foreign key to the ProfitCenter object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~CenterCode.html
  field_name: PrcCode
- name: Effectivefrom
  description: 'The date from which the distribution rule is in effect. Field name: ValidFrom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~Effectivefrom.html
  field_name: ValidFrom
- name: TotalInCenter
  description: 'Represents the percentage of the cost or expense to assign to this profit center. The actual percentage is calculated by taking this property and dividing by the TotalFactor property in the parent object, and multiplying by 100. Field name: PrcAmount .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DistributionRuleLine~TotalInCenter.html
  field_name: PrcAmount
