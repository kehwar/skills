name: ResourceDailyCapacity
title: ResourceDailyCapacity Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ResourceDailyCapacity.html
description: 'You can plan daily internal capacity which you can later set as default values in the Resources --> Set Daily Internal Capacity window. Source table: RSC6 .'
remarks: "From the SAP Business One Main Menu , choose Resources â\x86\x92 Resource Master Data , and choose the Planning Data tab. To set or update daily internal capacity, from the SAP Business One Main Menu , choose Resources Set Daily Internal Capacities . You can access this window from the Resource Capacity window by choosing the Set Daily Internal Capacities button. In this case, all the selection criteria fields inherit the values from the Resource Capacity window."
