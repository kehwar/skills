name: BlanketAgreement
title: BlanketAgreement Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BlanketAgreement.html
description: 'A blanket agreement is a longer-term arrangement between a purchasing organization and a vendor, or a sales organization and a customer, for the supply of items or provision of services over a period of time based on predefined terms and conditions. If an approved and valid blanket agreement exists with a customer or vendor, SAP Business One automatically links sales and purchasing documents with the blanket agreement. As such, the prices agreed on with the business partners are automatically copied into the sales and purchasing document. You can also choose to remove the link and create a sales or purchasing document that is not governed by a blanket agreement. Source table: OOAT .'
