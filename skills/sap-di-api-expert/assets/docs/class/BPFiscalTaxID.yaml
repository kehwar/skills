name: BPFiscalTaxID
title: BPFiscalTaxID Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPFiscalTaxID.html
description: 'BPFiscalTaxID is a child object of the BusinessPartners and indicates the Brazilian Fiscal IDs info for each business partner. You can retrieve or set this object by using the FiscalTaxID property of the BusinessPartners object. This object enables you to: - Add the Fiscal IDs of the business partner. - Define the Fiscal TAX IDs for Business Partner Master Data. Source table: CRD7'
remarks: This Object is specific to Cluster 2B (Country specific property for Brazil only).
methods:
- name: Add
  description: Adds a new record to the CRD7 table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPFiscalTaxID~Add.html
- name: SetCurrentLine
