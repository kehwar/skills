  field_name: AcctNum
- name: Bank
  description: 'The house bank code of the deposit. Field name: BankCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CheckLine~Bank.html
  field_name: BankCode
- name: Branch
  description: 'The house bank branch of the deposit. Field name: Branch .'
