name: KnowledgeBaseSolutions
title: KnowledgeBaseSolutions Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions.html
description: 'KnowledgeBaseSolutions is a business object that represents the knowledge base solutions in the Service module. This object enables you to: - Add a solution to the knowledge base. Retrieve a solution from the knowledge base by its key. Update a solution in the knowledge base. Remove a solution from the knowledge base. Save the object in XML format. Source table: OSLT .'
remarks: 'Mandatory field in SAP Business One: Solution . To display the form in the application: - Select Service --> Knowledgebase Solutions .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Add.html
- name: Close
  description: Not supported.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Close.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~GetByKey.html
- name: Remove
  description: Deletes a record from the object table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Update.html
properties:
- name: AttachmentEntry
  description: 'Sets or returns the identification key of the attachment file, as assigned by SAP Business One when adding an Attachment Entry . Field name: AtcEntry . Sets or returns the identification key of the attachment file, as assigned by SAP Business One when adding an Attachment Entry to alert message. Field name: AtcEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~AttachmentEntry.html
  field_name: AtcEntry
- name: Attachments
  description: Returns the Attachments object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Attachments.html
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Browser.html
- name: Cause
  description: 'Sets or returns the origin of the problem. Field name: Cause . Length: 254 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Cause.html
  length: 254
- name: CreatedBy
  description: 'Returns the name or title of the employee who created the solution. Field name: CreatedBy . This is a foreign key to the Users object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~CreatedBy.html
- name: CreationDate
  description: 'Returns the creation date of the solution. Field name: DateCreate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~CreationDate.html
  field_name: DateCreate
- name: Description
  description: 'Sets or returns a memo type string that specifies additional details for the problem cause. Field name: Descriptio . Length: 64,000 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Description.html
  field_name: Descriptio
- name: ItemCode
  description: 'Sets or returns the code (unique) of the item used for solving the problem. Field name: ItemCode . Length: 20 characters. This is a foreign key to the Items object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~ItemCode.html
  length: 20
- name: LastUpdateDate
  description: 'Returns the last date when the solution was updated. Field name: DateUpdate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~LastUpdateDate.html
  field_name: DateUpdate
- name: LastUpdatedBy
  description: 'Returns the name or title of the employee who last updated the solution in the knowledge base. Field name: UpdateBy . This is a foreign key to the Users object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~LastUpdatedBy.html
  field_name: UpdateBy
- name: Owner
  description: 'Returns the name or title of the employee who is the owner of solution in the knowledge base. Field name: UpdateBy . This is a foreign key to the Users object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Owner.html
  field_name: UpdateBy
- name: Solution
  description: 'Sets or returns the description of the solution to the problem. Field name: Subject . Length: 254 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Solution.html
  field_name: Subject
  length: 254
- name: SolutionCode
  description: 'Returns the solution number. Field name: SltCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~SolutionCode.html
  field_name: SltCode
- name: Status
  description: 'Sets or returns the status of the solution (for example: published, internal, or review). Field name: StatusNum . This is a foreign key to the Service Call Solution Statuses table ( OSST ), not exposed through the DI API).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Status.html
  field_name: StatusNum
- name: Symptom
  description: 'Sets or returns the indications of the problem. Length: 254 characters. Field name: Symptom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~Symptom.html
  length: 254
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~KnowledgeBaseSolutions~UserFields.html
