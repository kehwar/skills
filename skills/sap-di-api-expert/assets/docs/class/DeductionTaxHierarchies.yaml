name: DeductionTaxHierarchies
title: DeductionTaxHierarchies Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DeductionTaxHierarchies.html
description: 'The DeductionTaxHierarchies object enables to define taxation levels to withhold from payments to vendors. This object is part of the Business Partners module. Source table: ODDT .'
remarks: 'Country-specific for Israel. Mandatory properties: BPCode , HierarchyCode , ValidFrom , and ValidUntil . To display the form in the application: - Select Business Partners -->Business Partner Master Data -->Accounting tab -->Tax tab . Click the Hierarchies button.'
