name: Payments
title: Payments Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments.html
description: 'Payments is a business object that represents payment methods in the Banking module. This object defines the incoming payments from customers and outgoing payments to vendors. Available payment methods are cash, credit cards, checks, or bank transfers. Source tables: ORCT (incoming payments) and OVPM (outgoing payments).'
remarks: 'Mandatory fields in SAP Business One: CardCode , CashSum , TransferAccount , and TransferSum . To display the form in the application: - For the ORCT table, select Banking --> Incoming Payments --> Incoming Payments . For the OVPM table, select Banking --> Outgoing Payments --> Payments to Vendors .'
