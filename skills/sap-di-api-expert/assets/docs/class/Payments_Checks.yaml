name: Payments_Checks
title: Payments_Checks Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Checks.html
description: 'Represents checks that are tied to an outgoing payment document. Checks that are not tied to a document are represented by the ChecksforPayment object. Source tables: RCT1 (incoming payments) and VPM1 (outgoing payments).'
remarks: 'Mandatory fields in SAP Business One: BankCode and CheckSum . To display the form in the application: - For RCT1 table, select Sales - A/R --> A/R Invoice . - or - For VPM1 table, select Purchasing - A/P --> A/P Invoice . On the toolbar, click the Payment Means icon (or press CTRL+Y). Select the Check tab.'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Checks~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Checks~SetCurrentLine.html
