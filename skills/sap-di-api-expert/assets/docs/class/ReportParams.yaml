name: ReportParams
title: ReportParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams.html
description: 'Indicates which reports to retrieve, for example in the GetDefaultReport method of the ReportLayoutsService . ReportParams can specify reports based on the following parameters: - Business partner for whom the report was created Report code User who created the report'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~ToXMLString.html
properties:
- name: CardCode
  description: 'The business partner to which the report layout is assigned. If blank, the report layout is assigned to all business partners. Field name: CardCode Length: 15 characters This is a foreign key to the BusinessPartners object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~CardCode.html
  length: 15
- name: ReportCode
  description: 'The document type for which the report layout is assigned. Field name: DoumntDode Length: 4 characters'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~ReportCode.html
  field_name: DoumntDode
  length: 4
- name: UserID
  description: 'The user to whom the report layout is assigned. If blank, the report layout is assigned to all users. Field name: UserId Length: 11 characters Returns the identification key of the active user who operates the system.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportParams~UserID.html
  field_name: UserId
  length: 11
