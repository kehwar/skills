- name: Name
  description: 'Sets or returns the currency name (e.g. Canadian Dollar). Field name: CurrName . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~Name.html
  field_name: CurrName
  length: 20
- name: PluralEnglishHundredthName
  description: 'Sets or returns the English plural name of the decimal unit (e.g. Cents). Applicable for cluster B only. Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~PluralEnglishHundredthName.html
  length: 20
- name: PluralEnglishName
  description: 'Sets or returns the English plural name of the currency (e.g. Canadian Dollars). Applicable for cluster B only. Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~PluralEnglishName.html
  length: 20
- name: PluralHundredthName
  description: 'Sets or returns the plural name of the decimal unit (e.g. Cents) on printed checks. Applicable for cluster B only. Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~PluralHundredthName.html
