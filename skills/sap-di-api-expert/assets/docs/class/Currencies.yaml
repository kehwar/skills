  length: 20
- name: Rounding
  description: Sets or returns a valid value that determines the rounding method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~Rounding.html
- name: RoundingInPayment
  description: Sets or returns a valid value that determines whether or not to round the total in payments.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Currencies~RoundingInPayment.html
