name: StockTaking
title: StockTaking Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking.html
description: 'This function is abandoned in SAP Business One 9.0. If you use this object, an ATL Error occurs. StockTaking is a business object that is used to take items from a warehouse, or to put items into a warehouse. Source table: OITW .'
remarks: 'Mandatory fields in SAP Business One: ItemCode and WarehouseCode . To display the form in the application: - Select Inventory --> Inventory Transactions --> Beginning quantities and cycle counting . In Stock Posting tab select your warehouse and then click OK .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~GetByKey.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~SaveXML.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~Browser.html
- name: Counted
  description: 'Sets or returns the number of items in stock to take. Field name: Counted .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~Counted.html
- name: ItemCode
  description: 'Sets or returns the item code in the inventory. Field name: ItemCode . Length: 20 characters. This is a foreign key to the Items object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~ItemCode.html
  length: 20
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~UserFields.html
- name: WarehouseCode
  description: 'Sets or returns the warehouse code. Field name: WhsCode . Length: 8 characters. This is a foreign key to the Warehouses object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTaking~WarehouseCode.html
  field_name: WhsCode
  length: 8
