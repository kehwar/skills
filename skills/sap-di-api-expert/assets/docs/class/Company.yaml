properties:
- name: AccessToken
  description: When you enable Identity and Authentication Management as of SAP Business One 10.0 FP 2208, you can obtain an access token from the authorization server and use the access token to access some server resources.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~AccessToken.html
- name: AddonIdentifier
  description: Sets or returns a string identifier that your add-on must use to connect to SAP Business One database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~AddonIdentifier.html
- name: Application
  description: To connect with SAP Business One, you can set this property to a SAPbouiCOM.Application object, and then call the Connect method without specifying any other connection properties -- the properties are taken from the UI API Application object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~Application.html
- name: AttachMentPath
  description: Returns the path to all the company's saved mail attachments and all contact related files.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~AttachMentPath.html
- name: BitMapPath
  description: Returns the path to all the picture files of the company, which are related to the Picture property of Items object, Picture property of BusinessPartners object, and documents.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~BitMapPath.html
- name: CompanyDB
  description: Sets or returns the name of the company SQL database .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~CompanyDB.html
- name: CompanyID
  description: Identifies a unique company.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~CompanyID.html
- name: CompanyName
  description: Returns the company name as defined in the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~CompanyName.html
- name: Connected
  description: Returns a Boolean value that specifies whether or not the Company object is connected to the database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~Connected.html
- name: DbPassword
  description: Sets or returns the password for establishing a connection to the database server. The field is not mandatory, as the database credentials are stored in the System Landscape Directory (SLD) server and you can use these values instead.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~DbPassword.html
- name: DbServerType
  description: The database type.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~DbServerType.html
- name: DbUserName
  description: Sets or returns the user name for establishing a connection to the database server. The field is not mandatory, as the database credentials are stored in the System Landscape Directory (SLD) server and you can use these values instead.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~DbUserName.html
- name: DTCTransactionObject
  description: 'This interface supports Distributed Transactions for MS-SQL database that are controlled by MS-DTC engine (Microsoft Distributed Transaction Coordinator). DTC is a system service that coordinates transactions so that work can be committed as an atomic transaction even if it spans multiple resource managers on multiple computers, regardless of failures. This interface is applicable for the following environment: MS-SQL database server C/C++ interface ODBC connection type DI API only (and not by DI Server)'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~DTCTransactionObject.html
- name: ExcelDocsPath
  description: Returns the path to the Microsoft Excel documents exported from the SAP Business One application.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~ExcelDocsPath.html
- name: InTransaction
  description: Returns a Boolean value that specifies whether or not the transaction is active.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~InTransaction.html
- name: language
  description: Sets or returns the resource language of the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~language.html
- name: LicenseServer
  description: Deprecated in DI API 9.2 PL05. Please use SLDServer instead. The DI API will continue to support this property for backward compatibility. The license server name and port for connecting to the company database. The value is in the format myServer:30000 . If no value is given, the default license server and port are used. If a server is given but no port is given, 30000 is used for the port.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~LicenseServer.html
- name: MinimalSupportedVersion
  description: Returns the minimal version of the Company database that the Add-on supports.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~MinimalSupportedVersion.html
- name: Password
  description: Sets or returns the SAP Business One password issued to the user.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~Password.html
- name: SecurityCode
  description: property SecurityCode
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~SecurityCode.html
- name: Server
  description: Sets or returns the SQL server to which the object connects.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~Server.html
- name: SLDServer
  description: Set the System Landscape Directory (SLD) server address to connect to the company database and to retrieve the real license address from the SLD server.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~SLDServer.html
- name: UserName
  description: Sets or returns the user ID, which is used for log on to the SAP Business One application.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~UserName.html
- name: UserSignature
  description: Returns the identification key of the active user who operates the system.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~UserSignature.html
- name: UserTables
  description: Returns the UserTables object, which is the interface to the tables defined by the user. This object allows you to access to the user tables as if they were regular business objects.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~UserTables.html
- name: UseTrusted
  description: Sets or returns a Boolean value that specifies whether the Company object uses NT authentication, or the internal SQL Server user ObsCommon, to establish a connection with the SQL Server.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~UseTrusted.html
- name: Version
  description: Returns the version of the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~Version.html
- name: WordDocsPath
  description: Returns the path to the Microsoft Word documents exported from the SAP Business One application. This directory also contains Microsoft Word templates, which are used for exporting data to Word documents.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~WordDocsPath.html
- name: XMLAsString
  description: Sets or returns a Boolean value that determines whether the XML data will be saved as a file or transferred as a string.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~XMLAsString.html
- name: XmlExportType
  description: Sets or returns a valid value of BoXmlExportTypes that specifies the types for exporting data from the database to XML format.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~XmlExportType.html
- name: XmlFiltered
  description: To improve security, you can set the property to true and call the AddTrustedEntity, DeleteTrustedEntity, and GetTrustedEntitiesAllowedList to prevent XML injection.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~XmlFiltered.html
