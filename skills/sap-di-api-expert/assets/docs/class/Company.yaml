name: Company
title: Company Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company.html
description: Company is the primary DI API object that represents a single SAP Business One company database. This object enables you to connect to the company database and to create business objects to use with the company database.
remarks: The Company object is the only object of the DI API that you can create directly (for example, with New in Visual Basic). You can then use the Company object to create all other DI API objects. To enable your add-on to support the side-by-side model, see Versions Compatibility .
methods:
- name: AddTrustedEntity
  description: Adds a trusted entity.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~AddTrustedEntity.html
- name: AuthenticateUser
  description: 'Checks whether a pair of username and password exist and match in the current SAP Business One company . Note: this method is for superuser only.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~AuthenticateUser.html
- name: ChangePassword
  description: Changes the password of the actual user connected to SAP Business One. The system verifies whether the new password complies to the company password policy and if not, the system returns an error.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Company~ChangePassword.html
