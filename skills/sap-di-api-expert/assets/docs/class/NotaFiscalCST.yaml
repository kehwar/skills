properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~Browser.html
- name: Code
  description: 'The CST code. Field name: CODE Length: 4 characters'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~Code.html
  field_name: CODE
  length: 4
- name: CSTCodeOutgoing
  description: 'The corresponding outgoing CST code for this CST (incoming) code. The size of the value can be one of the following: 2 characters, if the TaxCategory field is IPI (-4), PIS (-8), or COFINS (-9) 4 characters, if the TaxCategory field is ICMS (-6) 20 characters, if the TaxCategory field is set to any other value Field name: CodeOut'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~CSTCodeOutgoing.html
  field_name: CodeOut
- name: DescriptionOutgoing
  description: 'A description for the outgoing CST code specified in the CSTCodeOutgoing property. Field name: OutDesc'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~DescriptionOutgoing.html
  field_name: OutDesc
- name: Situation
  description: 'The description or tributary situation. Field name: Situation Length: 16 characters'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~Situation.html
  length: 16
- name: TaxCategory
  description: 'The tax category for the CST code. Field name: Category This field is a foreign key to the ONFT table.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST~TaxCategory.html
  field_name: Category
- name: UserFields
