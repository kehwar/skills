url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~NotaFiscalCST.html
description: 'Represents CST codes for Nota Fiscal documents. Source table: OTSC'
remarks: 'For Brazil only. To display the form in the application: - Select Administration > Definitions > Financials > Tax > Nota Fiscal > Define CST Code .'
