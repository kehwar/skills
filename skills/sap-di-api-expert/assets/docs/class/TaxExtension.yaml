name: TaxExtension
title: TaxExtension Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TaxExtension.html
description: 'TaxExtension is a child object of the Documents object. It stores fiscal IDs of marketing documents. Every marketing document has a set of fiscal IDs. The TaxExtension object is applicable for cluster B (country-specific for Brazil and India). Source tables: CPI12 , CPV12 , CSI12 , CSV12 , DLN12 , DRF12 , IGE12 , IGN12 , INV12 , PCH12 , PDN12 , POR12 , QUT12 , RDN12 , RDR12 , RIN12 , RPC12 , RPD12 , and WTR12 .'
remarks: 'To display the form in the application:'
