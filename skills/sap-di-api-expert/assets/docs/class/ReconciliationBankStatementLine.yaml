name: ReconciliationBankStatementLine
title: ReconciliationBankStatementLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine.html
description: 'Represents open transactions to be reconciled in external bank statement. ReconciliationBankStatementLine is a child object of the ExternalReconciliation object. Source table: OBNK .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~ToXMLString.html
properties:
- name: amount
  description: 'Original amount posted in the specific row of the transaction. Field name: DebAmount .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~amount.html
  field_name: DebAmount
- name: BankStatementAccountCode
  description: 'The account number. Field name: BnkAcctCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~BankStatementAccountCode.html
  field_name: BnkAcctCode
- name: Date
  description: 'Due date of the transaction involved in the selected reconciliation. Field name: DueDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~Date.html
  field_name: DueDate
- name: Details
  description: 'Displays details as they appear in the Details field for the transaction in the Process External Bank Statement window. Field name: Memo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~Details.html
  field_name: Memo
- name: Ref1
  description: 'Displays the reference number as it appears in the Reference field for the transaction in the Process External Bank Statement window. Field name: Ref .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~Ref1.html
  field_name: Ref
- name: Sequence
  description: 'The assigned sequence number. Field name: Sequence .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReconciliationBankStatementLine~Sequence.html
