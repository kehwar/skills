name: BillOfExchangeTransaction
title: BillOfExchangeTransaction Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BillOfExchangeTransaction.html
description: 'BillOfExchangeTransaction is a business object that represents the Bill Of Exchange Transaction table in the Banking module. Bill Of Exchange is a commercial document used as a payment method in Spain, Portugal, Italy, and France. Use this object for Bill Of Exchange documents that their status was changed to Generated . Each status change of a Bill-of-exchange creates a transaction. This object enables you to: - Add a Bill Of Exchange Transaction. Retrieve a Bill Of Exchange Transaction. Save the Bill Of Exchange Transaction in XML format. Source table: OBOT .'
remarks: 'Mandatory fields is SAP Business One: StatusFrom and StatusTo . To display the form in the application: - Select Banking --> Bill of Exchange --> Bill of Exchange Transactions .'
