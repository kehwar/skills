name: SalesOpportunities
title: SalesOpportunities Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunities.html
description: 'SalesOpportunities is a business object that represents the sales opportunities data in SAP Business One. Sales opportunities include potential sale volumes that may arise from business with customers and interested parties. This object enables you to: - Add a sales opportunity. Retrieve a sales opportunity by its key. Update a sales opportunity with the progress of the sales activities and negotiations. Remove a sales opportunity. Save the object in XML format. Source table: OOPR .'
remarks: 'Mandatory fields in SAP Business One: CardCode and StartDate . To display the form in the application: - Select Sales Opportunities --> Sales Opportunity .'
