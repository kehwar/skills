name: Document_SpecialLines
title: Document_SpecialLines Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines.html
description: 'This object represents text and subtotal lines in marketing documents. Source table: INV10 and IN10V (a virtual table for storing calculated values).'
remarks: In text line, you can add remarks. In subtotal line, you can calculate subtotal of previous lines. Text and subtotal lines cannot be drawn from the base document.
methods:
- name: Add
  description: Adds a new text or subtotal line to the document.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~Add.html
- name: Delete
  description: Deletes an existing text or subtotal line in the document.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~Delete.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~SetCurrentLine.html
properties:
- name: AfterLineNumber
  description: 'Returns or sets the line number after which the text or subtotal line will appear. This property is mandatory. You must set this property in incremental order. Table: INV10. Field name: AftLineNum.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~AfterLineNumber.html
  field_name: AftLineNum
- name: Count
  description: Returns the number of special lines in the document.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~Count.html
- name: Freight1
  description: 'Returns a calculated value of the 1st freight expense in local currency. Source table: IN10V (virtual table).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~Freight1.html
- name: Freight1FC
  description: 'Returns a calculated value of the 1st freight expense in foreign currency. Source table: IN10V (virtual table).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~Freight1FC.html
- name: Freight1SC
  description: 'Returns a calculated value of the 1st freight expense in system currency. Source table: IN10V (virtual table).'
