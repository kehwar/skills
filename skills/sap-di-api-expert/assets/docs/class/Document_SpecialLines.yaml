  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~LineType.html
- name: OrderNumber
  description: Returns the order of the text or subtotal line. The order of the line is specified by the order you have added the line in the DI API.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Document_SpecialLines~OrderNumber.html
