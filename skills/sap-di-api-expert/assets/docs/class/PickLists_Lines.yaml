  field_name: AbsEntry
- name: BaseObjectType
  description: 'Sets or returns the type of object on which the pick lists entry is based. Field name: BaseObject .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PickLists_Lines~BaseObjectType.html
