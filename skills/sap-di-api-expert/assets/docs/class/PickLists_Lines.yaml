name: PickLists_Lines
title: PickLists_Lines Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PickLists_Lines.html
description: 'The PickLists_Lines is a child object of the PickLists object. Each line represents an order and its picking details in the pick list. Source table: PKL1 .'
remarks: 'To display the form in the application: - Select Inventory --> Pick and Pack --> Pick List .'
methods:
- name: Add
  description: Adds a new record to the PKL1 table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PickLists_Lines~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PickLists_Lines~SetCurrentLine.html
properties:
