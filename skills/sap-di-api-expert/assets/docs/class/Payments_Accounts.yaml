name: Payments_Accounts
title: Payments_Accounts Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Accounts.html
description: 'Payments_Accounts is a child object of the Payments object and represents the payments through account transfers in the Banking module. Source tables: RCT4 (incoming payments) and VPM4 (outgoing payments).'
remarks: 'Mandatory fields in SAP Business One: AccountCode and SumPaid . For account segmentation add the string _SYS00 . To display the form in the application: - For RCT4 table, select Banking --> Incoming Payments --> Incoming Payments . - or - For VPM4 table, select Banking --> Outgoing Payments --> Payments to Vendors . - Select Account document type (instead of Customer or Vendor ).'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Accounts~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Payments_Accounts~SetCurrentLine.html
