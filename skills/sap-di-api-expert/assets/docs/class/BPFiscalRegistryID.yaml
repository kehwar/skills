name: BPFiscalRegistryID
title: BPFiscalRegistryID Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BPFiscalRegistryID.html
description: 'BPFiscalRegistryID is a data structure related to the BusinessPartnersService . BPFiscalRegistryID describes the type of the company''s business activity (this information is required in some Brazilian legal reports). Moreover, government use the information to calculate the percentage of the companies related to a certain economic activity. This object enables you to add the Fiscal Registry ID for companies or business partners. Source table: OCNA .'
remarks: '- This Object is specific to Cluster 2B (Country specific property for Brazil only). - The Term 4SS refers to the document repository , RDF model and related services. 4SS stands for 4 Suite Server , appears in some documents and throughout the software.'
