name: AssetClass
title: AssetClass Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass.html
description: 'With SAP Business One, you can use asset classes to classify fixed assets according to business and legal requirements. For each asset class, you can assign various depreciation areas and depreciation types. After you assign an asset class to an asset, the depreciation areas and depreciation types are taken to the asset master data as defaults. Source table: OACS .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~ToXMLString.html
properties:
- name: AssetClassCollection
  description: Represents the line entries of an asset class.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~AssetClassCollection.html
- name: AssetType
  description: 'The type of the asset. Field name: AssetType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~AssetType.html
- name: AttributeGroup
  description: 'The attribute group that you want to assign to the asset class. Field name: AttrGrp .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~AttributeGroup.html
  field_name: AttrGrp
- name: BPLID
  description: 'Represents the branch ID (in Brazilian localization); represents the business place ID (in Korean localization). Field name: BPLId .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~BPLID.html
  field_name: BPLId
- name: Code
  description: 'The unique code for the asset class. Field name: Code . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~Code.html
  length: 20
- name: Description
  description: 'The description of the asset class. Field name: Name . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~Description.html
  field_name: Name
  length: 100
- name: ValueLimitFrom
  description: 'The lower limit for low value assets. Field name: LimitFrom .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~ValueLimitFrom.html
  field_name: LimitFrom
- name: ValueLimitTo
  description: 'The upper limit for low value assets. Field name: LimitTo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetClass~ValueLimitTo.html
  field_name: LimitTo
