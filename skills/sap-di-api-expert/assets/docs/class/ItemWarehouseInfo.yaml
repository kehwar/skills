kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemWarehouseInfo.html
description: 'ItemWarehouseInfo is a child object of the Items object that represents the items in the warehouse. This object is part of the Inventory and Production module. This object enables you to add an item to the warehouse. Source table: OITW .'
remarks: 'Mandatory fields in SAP Business One: WarehouseCode and ItemCode (Items object). To display the form in the application: - Select Inventory --> Item Master Data . Select Inventory Data tab.'
