name: EmployeeAbsenceInfo
title: EmployeeAbsenceInfo Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeAbsenceInfo.html
description: 'EmployeeAbsenceInfo is a child object of the EmployeesInfo object and represents the employee absence information. Source table: HEM1 .'
remarks: 'To display the form in the application: - Select Human Resources --> Employee Master Data - Select the Administration tab . - Click Absence .'
methods:
