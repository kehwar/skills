fields:
- field: Code
  description: Package Code
  type: Int
  size: 11
- field: Name
  description: Package Name
  type: nVarChar
  size: 20
- field: CategoryId
  description: Category ID
  type: Int
  size: 11
  related: OQCN
- field: DestPath
  description: Dest. Path
  type: Text
  size: 16
- field: Extantion
  description: Exported
  type: nVarChar
  size: 5
