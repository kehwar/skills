    label: 'Yes'
  - key: N
    label: 'No'
- field: NewRecs
  description: Save
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: Summary
  description: Summary
  type: Text
  size: 16
indexes:
- key: PRIMARY
