    label: Failed
- field: Remarks
  description: Remarks
  type: nVarChar
  size: 254
- field: FiscalYear
  description: Migration Data to Fiscal Year
  type: nVarChar
  size: 10
indexes:
- key: PRIMARY
  unique: true
  fields:
  - WizardId
