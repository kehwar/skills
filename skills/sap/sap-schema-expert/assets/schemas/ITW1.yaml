table: ITW1
description: Item Count Alert
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Inventory_and_Production/ITW1.htm
fields:
- field: ItemCode
  description: Item No.
  type: nVarChar
  size: 50
  related: OITM
- field: WhsCode
  description: Warehouse Code
  type: nVarChar
  size: 8
  related: OWHS
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: CycleCode
  description: Cycle Code
  type: Int
  size: 6
  related: OCYC
- field: Alert
  description: Alert
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: N
    label: 'No'
  - key: Y
    label: 'Yes'
- field: NextDate
  description: Next Counting Date
  type: Date
  size: 8
- field: Time
  description: Alert Time
  type: Int
  size: 6
- field: DestUser
  description: Destination User
  type: Int
  size: 6
  related: OUSR
- field: Alerted
  description: Alerted
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: BinAbs
  description: Bin Internal Number
  type: Int
  size: 11
  related: OBIN
  default: -1
indexes:
- key: PRIMARY
  unique: true
  fields:
  - ItemCode
  - WhsCode
  - BinAbs
