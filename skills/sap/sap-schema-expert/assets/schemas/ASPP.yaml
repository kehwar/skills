table: ASPP
description: Special Prices
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Inventory_and_Production/ASPP.htm
fields:
- field: ItemCode
  description: Item No.
  type: nVarChar
  size: 50
  related: OITM
- field: CardCode
  description: BP Code
  type: nVarChar
  size: 15
  related: OCRD
- field: Price
  description: Special Price
  type: Num
  size: 19.6
- field: Currency
  description: Price Currency
  type: nVarChar
  size: 3
- field: Discount
  description: Discount in %
  type: Num
  size: 19.6
- field: ListNum
  description: Price List No.
  type: Int
  size: 6
  related: OPLN
  default: 0
- field: AutoUpdt
  description: Auto Update
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: EXPAND
  description: Item Details
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: SrcPrice
  description: Source Price
  type: Int
  size: 6
  default: 0
  constraints:
  - key: '0'
    label: Unit Price - Pri. Crcy
  - key: '1'
    label: Unit Price - Add. Crcy 1
  - key: '2'
    label: Unit Price - Add. Crcy 2
- field: LogInstanc
  description: Log Instance
  type: Int
  size: 11
  default: 0
- field: UserSign2
  description: Updating User
  type: Int
  size: 6
  related: OUSR
- field: CreateDate
  description: Creation Date
  type: Date
  size: 8
- field: UpdateDate
  description: Update Date
  type: Date
  size: 8
- field: Valid
  description: Active
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: ValidFrom
  description: Active From
  type: Date
  size: 8
- field: ValidTo
  description: Active To
  type: Date
  size: 8
indexes:
- key: PRIMARY
  unique: true
  fields:
  - CardCode
  - ItemCode
  - LogInstanc
