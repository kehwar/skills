- field: RunType
  description: Run Type
  type: VarChar
  size: 1
  default: M
  constraints:
  - key: M
    label: Manual
  - key: C
    label: Automatic - Export - Confirmation Expected
  - key: E
    label: Automatic - Export - Confirmed/Not Confirmed
  - key: S
    label: Separate Accounting
indexes:
- key: PRIMARY
