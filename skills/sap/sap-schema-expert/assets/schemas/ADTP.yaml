table: ADTP
description: Fixed Assets Depreciation Types - History
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Finance/ADTP.htm
fields:
- field: Code
  description: Code
  type: nVarChar
  size: 15
- field: Descr
  description: Description
  type: nVarChar
  size: 100
- field: DprMeth
  description: Depreciation Method
  type: nVarChar
  size: 2
  default: 'NO'
  constraints:
  - key: 'NO'
    label: No Depreciation
  - key: SL
    label: Straight Line
  - key: SP
    label: Straight Line Period Control
  - key: DB
    label: Declining Balance
  - key: ML
    label: Multilevel
  - key: WO
    label: Immediate Write-Off
  - key: SD
    label: Special Depreciation
  - key: MD
    label: Manual Depreciation
  - key: CF
    label: Accelerated
- field: DprTo
  description: Minimum Depreciated Value
  type: Num
  size: 19.6
- field: Rounding
  description: Round Year End Book Value
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: InclSalv
  description: Include Salvage Value in Depr.
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: SalvPerc
  description: Percentage for Salvage Value
  type: Num
  size: 19.6
- field: PerAcq
  description: Period Control for Acquisition
