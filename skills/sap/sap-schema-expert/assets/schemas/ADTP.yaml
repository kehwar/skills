  size: 2
  default: PR
  constraints:
  - key: PR
    label: Pro Rata Temporis
  - key: YR
    label: Half Year Convention
  - key: EL
    label: After End of Useful Life
- field: AcqPRTyp
  description: Type of PRT for Acquisition
  type: nVarChar
  size: 3
  default: EDB
  constraints:
  - key: EDB
    label: Exact Daily Base
  - key: FCP
    label: First Day of Current Period
  - key: FNP
    label: First Day of Next Period
