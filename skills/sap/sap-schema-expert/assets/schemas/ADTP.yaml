  - key: I
    label: Interface
  - key: U
    label: Update
  - key: M
    label: Import
  - key: O
    label: DI API
  - key: S
    label: Service Layer
  - key: W
    label: Web Client
  - key: A
    label: Doc. Generation Wizard
