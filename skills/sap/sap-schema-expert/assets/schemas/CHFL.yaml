table: CHFL
description: Choose from List Format
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/CHFL.htm
fields:
- field: ObjName
  description: Object Name
  type: nVarChar
  size: 20
- field: FldIndex
  description: Field Index
  type: Int
  size: 6
- field: FldNum
  description: Field No.
  type: nVarChar
  size: 60
- field: DispName
  description: Displayed Name
  type: nVarChar
  size: 30
- field: GroupBy
  description: Group By
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: Visible
  description: Visible
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: DispDesc
  description: Show Type
  type: VarChar
  size: 1
  default: Y
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: SortOrder
  description: Sort Order
  type: VarChar
  size: 1
  default: A
  constraints:
  - key: A
    label: Ascending
  - key: D
    label: Descending
- field: VisIndex
  description: Visual Index
  type: Int
  size: 6
  default: 0
indexes:
- key: PRIMARY
  unique: true
  fields:
  - ObjName
  - FldIndex
