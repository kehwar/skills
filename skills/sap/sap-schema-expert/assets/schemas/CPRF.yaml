table: CPRF
description: Column Preferences
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/CPRF.htm
fields:
- field: FormID
  description: Form ID
  type: nVarChar
  size: 20
- field: ItemID
  description: Item Number
  type: nVarChar
  size: 50
- field: ColID
  description: Column
  type: nVarChar
  size: 60
- field: Width
  description: Width
  type: Int
  size: 11
- field: VisInForm
  description: Visible in Form
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: VisualIndx
  description: Tabs Layout
  type: Int
  size: 11
- field: EditInForm
  description: Editable in Form
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: VisInExpnd
  description: Visible in Expanded
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: ExpandIndx
  description: Expanded Index
  type: Int
  size: 11
- field: EditInEXP
  description: Editable in Expanded
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: Folded
  description: Folder
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: UserSign
  description: User Signature
  type: Int
  size: 6
  related: OUSR
- field: ExtDisable
  description: Externally Disabled
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: N
    label: 'No'
  - key: Y
    label: 'Yes'
- field: ExtInvsbl
  description: Externally Invisible
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: N
    label: 'No'
  - key: Y
    label: 'Yes'
- field: TPLId
  description: Template ID
  type: Int
  size: 6
  related: UICU
  default: 0
- field: TableName
  description: Table Name
  type: nVarChar
  size: 20
- field: ItemUID
  description: ItemUID
  type: nVarChar
  size: 32
indexes:
- key: PRIMARY
  unique: true
  fields:
  - UserSign
  - FormID
  - ItemID
  - ColID
  - TPLId
