table: OIBQ
description: Item - Bin Accumulator
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Inventory_and_Production/OIBQ.htm
fields:
- field: AbsEntry
  description: Internal Number
  type: Int
  size: 11
- field: ItemCode
  description: Item Code
  type: nVarChar
  size: 50
  related: OITM
- field: BinAbs
  description: Bin Internal Number
  type: Int
  size: 11
  related: OBIN
- field: OnHandQty
  description: On-Hand Quantity
  type: Num
  size: 19.6
- field: WhsCode
  description: Warehouse Code
  type: nVarChar
  size: 8
  related: OWHS
- field: Freezed
  description: Item Frozen in Bin Location
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
- field: FreezeDoc
  description: Inventory Count Doc. Frozen By
  type: Int
  size: 11
  related: OINC
indexes:
- key: PRIMARY
  unique: true
  fields:
  - AbsEntry
- key: BUSINESS_K
  unique: true
  fields:
  - ItemCode
  - BinAbs
- key: BIN_ABS
  unique: false
  fields:
  - BinAbs
