table: MAP1
description: Input and Output of Mapping
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Administration/MAP1.htm
fields:
- field: MapID
  description: Mapping ID
  type: Int
  size: 11
  related: OMAP
- field: Code
  description: Code
  type: Int
  size: 11
- field: Type
  description: Type
  type: nVarChar
  size: 10
  default: NA
  constraints:
  - key: CRYSTAL
    label: Crystal Report
  - key: XML
    label: XML File
  - key: NA
    label: Not Avalible
  - key: TXT
    label: Text File
  - key: CSV
    label: CSV File
- field: RuleType
  description: Rule Type
  type: nVarChar
  size: 10
  default: NA
  constraints:
  - key: XSLT
    label: XSLT Rule
  - key: NA
    label: Not Avalible
  - key: REGEX
    label: Reguler expression
- field: RuleRef
  description: Rule Reference ID
  type: nVarChar
  size: 50
- field: RefID
  description: Reference ID
  type: nVarChar
  size: 50
- field: RuleVer
  description: Rule Version
  type: nVarChar
  size: 5
- field: IsFinal
  description: Is Final Result
  type: VarChar
  size: 1
  default: N
  constraints:
  - key: Y
    label: 'Yes'
  - key: N
    label: 'No'
indexes:
- key: PRIMARY
  unique: true
  fields:
  - MapID
  - Code
