table: WDD2
description: Documents for Approval - Terms
source: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/Marketing_Documents/WDD2.htm
fields:
- field: WddCode
  description: Internal ID
  type: Int
  size: 11
- field: CondId
  description: Condition No.
  type: Int
  size: 11
  constraints:
  - key: '1'
    label: Deviation from Credit Limit
  - key: '2'
    label: Deviation from Commitment
  - key: '3'
    label: Gross Profit %
  - key: '4'
    label: Discount %
  - key: '5'
    label: Deviation from Budget
  - key: '6'
    label: Total Document
- field: opCode
  description: Ratio
  type: Int
  size: 6
  constraints:
  - key: '1'
    label: Greater than
  - key: '2'
    label: Greater or Equal
  - key: '3'
    label: Less than
  - key: '4'
    label: Less or Equal
  - key: '5'
    label: Equal
  - key: '6'
    label: Does not Equal
- field: opValue
  description: Value
  type: nVarChar
  size: 40
indexes:
- key: PRIMARY
  unique: true
  fields:
  - WddCode
  - CondId
