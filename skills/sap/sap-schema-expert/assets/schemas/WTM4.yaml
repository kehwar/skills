- field: opValue
  description: Value
  type: nVarChar
  size: 90
- field: DecSep
  description: Decimal Separator
  type: VarChar
  size: 1
- field: ThousSep
  description: Thousandths Separator
  type: VarChar
  size: 1
indexes:
- key: PRIMARY
  unique: true
  fields:
  - WtmCode
  - CondId
