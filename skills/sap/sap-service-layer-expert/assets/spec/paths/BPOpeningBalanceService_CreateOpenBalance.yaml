post:
  tags:
  - BPOpeningBalanceService
  summary: POST BPOpeningBalanceService_CreateOpenBalance
  description: Invoke the method 'CreateOpenBalance' on this service by specifying the payload 'OpenningBalanceAccount,BPCodes'
    in the JSON format.
  operationId: post_BPOpeningBalanceService_CreateOpenBalance
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            BPCodes:
              type: array
              items:
                type: object
                properties:
                  Code:
                    type: string
                    example: C01
                  Debit:
                    type: string
                    example: '1000'
            OpenningBalanceAccount:
              type: object
              properties:
                Details:
                  type: string
                  example: Transfer balance to BP
                OpenBalanceAccount:
                  type: string
                  example: '999100'
        example:
          BPCodes:
          - Code: C01
            Debit: '1000'
          - Code: V01
            Debit: '1000'
          OpenningBalanceAccount:
            Details: Transfer balance to BP
            OpenBalanceAccount: '999100'
  x-example-url: POST https://localhost:50000/b1s/v2/BPOpeningBalanceService_CreateOpenBalance
  x-resource-description: This API enables you to invoke the interfaces defined on 'BPOpeningBalanceService'.
