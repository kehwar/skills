post:
  tags:
  - QueryService
  summary: POST QueryService_PostQuery
  description: Invoke the method 'PostQuery' on this service. To fully comply with OData, Service Layer exposes a new query
    service for the row level filter, which is implemented based on the $crossjoin capabilities by separating the QueryPath
    and QueryOption in the query URL.
  operationId: post_QueryService_PostQuery
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            QueryOption:
              type: string
              example: $expand=Orders($select=DocEntry, DocNum),Orders/DocumentLines($select=ItemCode,LineNum)&$filter=Orders/DocEntry
                eq Orders/DocumentLines/DocEntry and Orders/DocEntry ge 3 and Orders/DocumentLines/LineNum eq 0
            QueryPath:
              type: string
              example: $crossjoin(Orders,Orders/DocumentLines)
        example:
          QueryOption: $expand=Orders($select=DocEntry, DocNum),Orders/DocumentLines($select=ItemCode,LineNum)&$filter=Orders/DocEntry
            eq Orders/DocumentLines/DocEntry and Orders/DocEntry ge 3 and Orders/DocumentLines/LineNum eq 0
          QueryPath: $crossjoin(Orders,Orders/DocumentLines)
  x-example-url: POST https://localhost:50000/b1s/v2/QueryService_PostQuery
  x-resource-description: This API enables you to invoke the interfaces defined on 'QueryService'.
