post:
  tags:
  - ReturnRequest
  summary: POST ReturnRequest
  description: Create an instance of 'ReturnRequest' with the given payload of type 'Document' in JSON format.
  operationId: post_ReturnRequest
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
