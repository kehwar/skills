post:
  tags:
  - CreditNotes
  summary: POST CreditNotes
  description: Create an instance of 'CreditNotes' with the given payload of type 'Document' in JSON format.
  operationId: post_CreditNotes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            CardCode:
              type: string
              example: c001
            DocumentLines:
              type: array
              items:
                type: object
                properties:
                  ItemCode:
                    type: string
                    example: i001
                  Price:
                    type: integer
                    example: 100
                  Quantity:
                    type: integer
                    example: 1
                  TaxCode:
                    type: string
                    example: T1
        example:
          CardCode: c001
          DocumentLines:
          - ItemCode: i001
            Price: 100
            Quantity: 1
            TaxCode: T1
  x-example-url: POST https://localhost:50000/b1s/v2/CreditNotes
  x-resource-description: This entity enables you to manipulate 'CreditNotes'. It is the clearing document for invoices and
    returns. If the goods were delivered to the customer and an invoice has already been created, you can partially or completely
    reverse the transaction by creating a credit note.
