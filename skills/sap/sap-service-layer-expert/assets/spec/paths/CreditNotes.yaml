get:
  tags:
  - CreditNotes
  summary: GET CreditNotes
  description: Retrieve a collection of 'CreditNotes' with all or some selected properties in the given order by specifying
    the given filter condition.
  operationId: get_CreditNotes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
