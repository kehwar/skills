post:
  tags:
  - DepreciationTypes
  summary: POST DepreciationTypes
  description: Create an instance of 'DepreciationTypes' with the given payload of type 'DepreciationType' in JSON format.
  operationId: post_DepreciationTypes
  responses:
    '200':
      description: Success
    '204':
      description: No content (update/delete)
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '404':
      description: Not found
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            AcquisitionPeriodControl:
              type: string
              example: apcProRataTemporis
            AcquisitionProRataType:
              type: string
              example: aprtExactlyDailyBase
            CalculationBase:
              type: string
              example: cbYearly
            Code:
              type: string
              example: test
            DepreciationMethod:
              type: string
              example: dmNoDepreciation
            Description:
              type: string
              example: Test DepreciationTypes
            IncludeSalvageInDepreciation:
              type: string
              example: tNO
            MinimumDepreciatedValue:
              type: integer
              example: 0
            PercentageOfDepreciationReversedInRetirementYear:
              type: integer
              example: 0
            RetirementPeriodControl:
              type: string
              example: rpcProRataTemporis
            RetirementProRataType:
              type: string
              example: rprtExactlyDailyBase
            RoundYearEndBookValue:
              type: string
              example: tYES
            SalvagePercentage:
              type: integer
              example: 0
            StraightLineCalculationMethod:
              type: string
              example: slcmAuquisitionValueDividedByTotalUsefulLife
            StraightLinePercentage:
              type: integer
              example: 0
            StraightLinePeriodControlDepreciationPeriods:
              type: string
              example: slpcdpStandard
            StraightLinePeriodControlFactor:
              type: integer
              example: 1
            SubsequentAcquisitionPeriodControl:
              type: string
              example: sapcProRataTemporis
            SubsequentAcquisitionProRataType:
              type: string
              example: saprtExactlyDailyBase
            ValidFrom:
              type: string
              example: '1900-01-01'
            ValidTo:
              type: string
              example: '2099-12-31'
        example:
          AcquisitionPeriodControl: apcProRataTemporis
          AcquisitionProRataType: aprtExactlyDailyBase
          CalculationBase: cbYearly
          Code: test
          DepreciationMethod: dmNoDepreciation
          Description: Test DepreciationTypes
          IncludeSalvageInDepreciation: tNO
          MinimumDepreciatedValue: 0
          PercentageOfDepreciationReversedInRetirementYear: 0
          RetirementPeriodControl: rpcProRataTemporis
          RetirementProRataType: rprtExactlyDailyBase
          RoundYearEndBookValue: tYES
          SalvagePercentage: 0
          StraightLineCalculationMethod: slcmAuquisitionValueDividedByTotalUsefulLife
          StraightLinePercentage: 0
          StraightLinePeriodControlDepreciationPeriods: slpcdpStandard
          StraightLinePeriodControlFactor: 1
          SubsequentAcquisitionPeriodControl: sapcProRataTemporis
          SubsequentAcquisitionProRataType: saprtExactlyDailyBase
          ValidFrom: '1900-01-01'
          ValidTo: '2099-12-31'
  x-example-url: POST https://localhost:50000/b1s/v2/DepreciationTypes
  x-resource-description: This entity enables you to manipulate 'DepreciationTypes'.
