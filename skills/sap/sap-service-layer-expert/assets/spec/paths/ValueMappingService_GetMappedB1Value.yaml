      application/json:
        schema:
          type: object
          properties:
            ObjectId:
              type: integer
              example: 37
            VM_ThirdPartyValuesData:
              type: object
              properties:
                ThirdPartySystemId:
                  type: integer
                  example: 1
                ThirdPartyValue:
                  type: string
                  example: AED
