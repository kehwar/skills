name: BoUTBTableType
title: BoUTBTableType Enumeration
kind: enum
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Enumerations~BoUTBTableType_EN.html
description: Specifies the table types for user defined tables.
remarks: For each user table type, SAP Business One provides a default table. You can add user fields to the default user fields but not remove them. For the default fields provided for each table type, see User Defined Object documentation.
