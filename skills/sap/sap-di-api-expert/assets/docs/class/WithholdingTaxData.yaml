name: WithholdingTaxData
title: WithholdingTaxData Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WithholdingTaxData.html
description: 'WithholdingTaxData is a child object of Documents object and represents the Withholding tax table related to the document. Source tables: INV5 , RIN5 , RDN5 , RDN5 , PCH5 , RPC5 , DPI5 , DPO5 , DRF5 . The WithholdingTaxData object is relevant only to the following document types: - Documents(oInvoices), Documents(oCorrectionInvoice), Documents(oCorrectionInvoiceReversal) - OINV Documents(oCreditNotes) - ORIN Documents(oReturns) - ORDN Documents(oPurchaseInvoices), Documents(oCorrectionPurchaseInvoice), Documents(oCorrectionPurchaseInvoiceReversal) - OPCH Documents(oPurchaseCreditNotes) - ORPC Documents(oDownPaymentsInput) - ODPI (not exposed through the DI API) Documents(oDownPaymentsOutput) - ODPO (not exposed through the DI API) Documents(oDrafts) - ODRF'
remarks: 'The data for the Withholding tax table consists on WithholdingTaxCodes definitions. To define withholding tax codes in the application: - Select Administration --> Setup --> Financials --> Tax --> Withholding Tax . To display the form in the application: - Select a document (for example, select Sales - A/R --> A/R Invoice ). From the main menu, select Go to --> WT Table .'
