name: ShippingTypes
title: ShippingTypes Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes.html
description: 'The ShippingTypes object enables to define transportation methods (for example, air cargo and courier) to carry out deliveries. A shipping type can be assigned to a document, item master data, and business partner master data. Source table: OSHP .'
remarks: 'To display the form in the application: - Select Administration --> Setup --> Inventory --> Shipping Types .'
methods:
- name: Add
  description: Adds a shipping type definition.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~GetByKey.html
- name: Remove
  description: Deletes a record from the object table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Browser.html
- name: Code
  description: 'Returns the code of the shipping type (primary key). Field name: TrnspCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Code.html
  field_name: TrnspCode
- name: Name
  description: 'Sets or returns the name of the shipping type. Field name: TrnspName . Length: 40 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~Name.html
  field_name: TrnspName
  length: 40
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ShippingTypes~UserFields.html
- name: Website
  description: 'Sets or returns the web site address for the shipping company. Field name: WebSite . Length: 50 characters.'
