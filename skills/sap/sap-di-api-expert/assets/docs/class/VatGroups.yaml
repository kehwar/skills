name: VatGroups
title: VatGroups Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~VatGroups.html
description: 'The VatGroups object enables to define tax groups that can be assigned to business partners and items in sales and purchase documents. Source table: OVTG .'
remarks: 'Country-specific for Europe. Mandatory properties: Code and Effectivefrom (VatGroups_Lines). To display the form in the application: - Select Administration --> Setup --> Financials --> Tax --> Tax Groups .'
