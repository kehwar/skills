name: SpecificWTHAmountsService
title: SpecificWTHAmountsService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService.html
description: 'The SpecificWTHAmountsService service enables you to add, look up, update and remove specific WTax amounts. Source table: OSWA .'
remarks: Italy only. In Business Partner, select Vendor for Business Partner Type , choose Accounting --> Tax , select the Subject to Withholding Tax checkbox, and choose the button next to Specific Wtax Amounts Setup .
methods:
- name: Add
  description: Adds a specific WTax amounts.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~Add.html
- name: Delete
  description: Deletes an existing specific WTax amounts.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~Delete.html
- name: Get
  description: Retrieves a specific WTax amounts. The specific WTax amounts is specified by its key, which is contained in the SpecificWTHAmountsParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the SpecificWTHAmountsService .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates an object from an XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates an object from XML.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~GetDataInterfaceFromXMLString.html
- name: GetList
  description: Returns the SpecificWTHAmountsParamsCollection data collection that identifies all specific WTax amounts.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~GetList.html
- name: Update
  description: The data for the specific WTax amounts, including the key of the specific WTax amounts to be updated, is contained in the SpecificWTHAmounts object passed to the method. To update a specific WTax amounts, you must first retrieve it using the Get method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecificWTHAmountsService~Update.html
