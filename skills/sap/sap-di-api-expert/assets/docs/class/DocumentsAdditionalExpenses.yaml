name: DocumentsAdditionalExpenses
title: DocumentsAdditionalExpenses Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DocumentsAdditionalExpenses.html
description: 'DocumentsAdditionalExpenses is a child object of Documents object and represents the documents of additional expenses in the Marketing Documents module. The source table for each document is according to the document type as follows: INV3 , RIN3 , DLN3 , RDN3 , RDR3 , QUT3 , PCH3 , RPC3 , PDN3 , RPD3 , POR3 , and DRF3 .'
remarks: 'Mandatory fields in SAP Business One: ExpenseCode and of Name of AdditionalExpenses object. For each type of additional expense you can add one row that summarizes all expenses of that type. To display the form in the application, first define expenses in documents as follows: Then, - For INV3 table, select Sales - A/R --> A/R Invoice . Click Add. Expenses . For RIN3 table, select Sales - A/R --> A/R Credit Memo . Click Add. Expenses . For DLN3 table, select Sales - A/R --> Delivery . Click Add. Expenses . For RDN3 table, select Sales - A/R --> Returns . Click Add. Expenses . For RDR3 table, select Sales - A/R --> Order . Click Add. Expenses . For QUT3 table, select Sales - A/R --> Quotation . Click Add. Expenses . For PCH3 table, select Purchasing - A/P --> A/P Invoice . Click Add. Expenses . For RPC3 table, select Purchasing - A/P --> A/P Credit Memo . Click Add. Expenses . For PDN3 table, select Purchasing - A/P --> Goods Receipt PO . Click Add. Expenses . For RPD3 table, select Purchasing - A/P --> Goods Returns . Click Add. Expenses . For POR3 table, select Purchasing - A/P --> A/R Invoice . Click Add. Expenses . For DRF3 table, select Sales - A/R (or Purchasing - A/P ) --> Document Draft . Set your selection criteria, and click OK . Click Add. Expenses .'
