name: ElectronicFileFormat
title: ElectronicFileFormat Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat.html
description: 'Represents the generic electronic file formats in SAP Business One. Source table: OLLF .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~ToXMLString.html
properties:
- name: Description
  description: 'The description for the electronic file format. Field name: Descr .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~Description.html
  field_name: Descr
- name: FormatID
  description: 'The format ID. This is a foreign key to the File Format table ( OFRM ). Field name: FrmId .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~FormatID.html
  field_name: FrmId
- name: MenuName
  description: 'The menu entry name for the electronic file format that to be displayed in the SAP Business One. Field name: MenuName .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~MenuName.html
- name: MenuPath
  description: 'The menu path in SAP Business One for accessing the electronic file format. Field name: MenuPath .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~MenuPath.html
- name: Name
  description: 'The name of the electronic file format. Field name: Name .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~Name.html
- name: OutputFilePath
  description: 'The destination file path for the generated electronic file. Field name: ParamPrms .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~OutputFilePath.html
  field_name: ParamPrms
- name: SchemaVersion
  description: 'The version of the electronic file schema. Field name: SchVersion .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~SchemaVersion.html
  field_name: SchVersion
- name: Version
  description: 'The version of the electronic file format. Field name: Version .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ElectronicFileFormat~Version.html
