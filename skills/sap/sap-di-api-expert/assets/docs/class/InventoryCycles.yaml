name: InventoryCycles
title: InventoryCycles Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~InventoryCycles.html
description: 'The InventoryCycles object enables to setup cycles of inventory counts and order intervals. Inventory cycles setup enables to track inventory counts by issuing an alert each time a count is due. It also is used for planning the order intervals. Source table: OCYC .'
remarks: 'To display the form in the application: - Select Administration -->Setup -->Inventory -->Inventory Cycles . To display the Inventory Cycles Setup for order interval: - Select Inventory -->Item Master Data -->Planning Data tab . - From the Order Interval field, select Define New .'
