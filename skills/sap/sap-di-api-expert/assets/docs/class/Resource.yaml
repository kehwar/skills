name: Resource
title: Resource Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Resource.html
description: 'A resource is defined as a commodity, machine, labor, or other asset used to produce goods and services. As opposed to items, resources have capacity available throughout a period of time which can be consumed in a production process. Resources (resource capacity) can therefore be assigned to production orders. Resource capacity is always viewed within a period of time called "capacity period". Consumption of resources in a production process contributes to the overall production costs and can be split into underlying cost elements for further accounting purposes. Source table: ORSC .'
remarks: "From the SAP Business One Main Menu , choose Resources â\x86\x92 Resource Master Data ."
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Resource~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Resource~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Resource~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Resource~ToXMLFile.html
- name: ToXMLString
