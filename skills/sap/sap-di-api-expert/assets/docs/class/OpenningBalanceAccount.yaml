description: OpenningBalanceAccount is a data structure related to the AccountsService and BusinessPartnersService . The data is stored temporarily in a virtual table.
remarks: 'Mandatory property: OpenBalanceAccount . To display the form related to the data structure: - Select Administration --> System Initialization --> Openning Balances --> G/L Accounts Openning Balance. - Select Administration --> System Initialization --> Openning Balances --> Business Partners Openning Balance.'
