name: BudgetDistribution
title: BudgetDistribution Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BudgetDistribution.html
description: 'BudgetDistribution is a business object that represents the budget distribution methods used by the budget management in the Finance module. This object enables you to: - Add a budget distribution method. Retrieve a budget distribution method by its key. Update a budget distribution method. Save the object in XML format. Source table: OBGD .'
remarks: 'To initialize the budget management: - Select Administration --> System Initialization --> General Settings . In the Budget tab, select Budget Initialization . Set the budget initialization parameters and click OK. To display the form in the application: - Select Financials --> Budget --> Define Budget Distribution Method .'
