name: ExternalReconciliation
title: ExternalReconciliation Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation.html
description: 'Represents external reconciliation, which is the comparison of open transactions within SAP Business One with an external account statement. Source table: OMTH .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ToXMLString.html
properties:
- name: AccountCode
  description: 'The G/L account or business partner code for which the reconciliation is performed. Field name: MthAcctCod .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~AccountCode.html
  field_name: MthAcctCod
- name: amount
  description: 'The reconciliation amount. Field name: Totals .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~amount.html
  field_name: Totals
- name: CreationDate
  description: 'Date on which the reconciliation was performed. Field name: CreateDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~CreationDate.html
  field_name: CreateDate
- name: CurrencyType
  description: 'The currency of the reconciliation. Field name: CurrType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~CurrencyType.html
  field_name: CurrType
- name: ReconciliationAccountType
  description: 'The account type for which the reconciliation is performed. Field name: IsCard .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ReconciliationAccountType.html
  field_name: IsCard
- name: ReconciliationBankStatementLines
  description: The reconciliation bank statement line.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ReconciliationBankStatementLines.html
- name: ReconciliationDate
  description: 'The reconciliation date. Field name: MatchDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ReconciliationDate.html
  field_name: MatchDate
- name: ReconciliationJournalEntryLines
