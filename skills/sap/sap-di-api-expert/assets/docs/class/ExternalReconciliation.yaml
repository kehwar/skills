- name: ReconciliationNo
  description: 'The reconciliation number. Field name: MatchNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ReconciliationNo.html
  field_name: MatchNum
- name: ReconciliationType
  description: 'The reconciliation type. Field name: MatchType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ExternalReconciliation~ReconciliationType.html
