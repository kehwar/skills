name: EmployeeTransfer
title: EmployeeTransfer Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer.html
description: 'Represents the employee transfer record to the payroll provider. Source table: OHET .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~ToXMLString.html
properties:
- name: Comment
  description: 'Any comment. For example, B1iSN would report error details here. Field name: Comment .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~Comment.html
- name: EmployeeTransferDetails
  description: Returns the EmployeeTransferDetails object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~EmployeeTransferDetails.html
- name: Status
  description: 'The status of the employee transfer. When you add a new transfer, SAP Business One sets the status to New. B1iSN updates the status during the processing. Field name: Status .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~Status.html
- name: TransEndDate
  description: 'Represents the date on which the data was sent or exported successfully. Field name: TransEnd .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~TransEndDate.html
  field_name: TransEnd
- name: TransEndTime
  description: 'Represents the time at which the data was sent or exported successfully. Field name: EndTime .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~TransEndTime.html
  field_name: EndTime
- name: TransferID
  description: 'The unique ID of the transfer process; unique per company DB. Field name: TransferID . Length: 11 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~TransferID.html
  length: 11
- name: TransStartDate
  description: 'Represents the transfer start date. Field name: TransStart .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~TransStartDate.html
  field_name: TransStart
- name: TransStartTime
  description: 'Represents the transfer start time. Field name: StartTime .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeTransfer~TransStartTime.html
  field_name: StartTime
