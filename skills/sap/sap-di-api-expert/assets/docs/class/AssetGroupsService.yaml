name: AssetGroupsService
title: AssetGroupsService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService.html
description: 'The AssetGroupsService service enables you to add, look up, update, and remove asset groups. Source table: OAGS .'
remarks: To open the Asset Groups - Setup window, in the Asset Master Data window - Fixed Assets tab - Overview Subtab - Asset Group field, select Define New from the dropdown list.
methods:
- name: Add
  description: Adds an asset group.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~Add.html
- name: Delete
  description: Deletes an existing asset group.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~Delete.html
- name: Get
  description: Retrieves an asset group. The asset group is specified by its key, which is contained in the AssetGroupParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the AssetGroupsService .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates an object from an XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates an object from XML.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~GetDataInterfaceFromXMLString.html
- name: GetList
  description: Returns the AssetGroupParamsCollection data collection that identifies all asset groups.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~GetList.html
- name: Update
  description: Updates an existing asset group. The data for the asset group, including the key of the asset group to be updated, is contained in the AssetGroup object passed to the method. To update an asset group, you must first retrieve it using the Get method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetGroupsService~Update.html
