url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~StockTransfer_Lines.html
description: 'StockTransfer_Lines is a child object of the StockTransfer object that represents the line entries of each stock transfer. Each line contains detailed information about the way items are transferred from one warehouse to the other. Source table: WTR1 .'
remarks: 'Mandatory fields in SAP Business One: ItemCode and WarehouseCode . To display the form in the application: - Select Inventory --> Inventory Transactions --> Inventory Transfer .'
