description: Holds the keys to rows in database tables linked to a UDO data. This object is used to pass keys to and from GeneralService methods. Because it cannot be known the names of the properties that contain the key, properties of the GeneralDataParams object are set and retrieved with the generic SetProperty and GetProperty methods
