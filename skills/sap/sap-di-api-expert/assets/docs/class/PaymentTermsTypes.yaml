name: PaymentTermsTypes
title: PaymentTermsTypes Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentTermsTypes.html
description: 'PaymentTermsTypes is a business object that represents the types of payment terms in the Banking module. The payment terms define typical agreements that apply to transactions with customers and vendors. This object enables you to: - Add a payment term type. Retrieve a payment term type by its key. Update a payment term type. Remove a payment term type. Save the object in XML format. Source table: OCTG .'
remarks: 'Mandatory field in SAP Business One: PaymentTermsGroupName . To display the form in the application: - Select Business Partners --> Business Partner Master Data . - Select Payment Terms tab. - Click the arrow to open the Define Payment Terms window.'
