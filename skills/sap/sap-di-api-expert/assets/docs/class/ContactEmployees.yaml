name: ContactEmployees
title: ContactEmployees Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ContactEmployees.html
description: 'ContactEmployees is a business object that represents the contact employees in the Business Partners module. This object enables you to add contact information of employees to the Business Partners master record. Source table: OCPR .'
remarks: 'Mandatory fields in SAP Business One: Name . To display the form in the application: - Select Business Partners --> Business Partner Master Data --> Contact Persons tab.'
methods:
- name: Add
  description: Adds a new contact employee.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ContactEmployees~Add.html
- name: Delete
  description: Deletes the current line. Returns a result value that indicates success or failure.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ContactEmployees~Delete.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ContactEmployees~SetCurrentLine.html
