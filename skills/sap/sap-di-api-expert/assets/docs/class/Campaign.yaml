  length: 20
- name: TargetGroupType
  description: property TargetGroupType
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Campaign~TargetGroupType.html
- name: UserFields
  description: Returns the UserFields object.
