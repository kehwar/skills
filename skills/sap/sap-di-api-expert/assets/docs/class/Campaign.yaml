  description: 'The group of targeting prospects for the campaign. Field name: TargetGrp . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Campaign~TargetGroup.html
