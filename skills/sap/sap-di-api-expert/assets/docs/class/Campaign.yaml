  description: 'The attachment to a campaign. You can attach as many files as needed. Field name: AtcEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Campaign~AttachementsEntry.html
  field_name: AtcEntry
- name: CampaignBusinessPartners
  description: View and maintain CampaignBusinessPartner .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Campaign~CampaignBusinessPartners.html
- name: CampaignItems
  description: View and maintain relevant CampaignItem .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Campaign~CampaignItems.html
- name: CampaignName
  description: 'The name for the campaign. Field name: Name . Length: 100 characters.'
