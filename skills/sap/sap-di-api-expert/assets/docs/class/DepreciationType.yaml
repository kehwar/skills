name: DepreciationType
title: DepreciationType Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType.html
description: 'In SAP Business One, you can use depreciation types to define different depreciation calculation methods for your fixed assets. After you create a depreciation type, you can assign it to a specific depreciation area of an asset class. Then, by assigning the asset class to a fixed asset, the depreciation calculation methods are finally applied to the asset. In general, SAP Business One lets you use the following depreciation methods: - Straight Line Method - Straight Line Period Control Method - Declining Balance Method - Multilevel Method - Immediate Write-Off Method - Special Depreciation Method - Manual Depreciation Method - Accelerated Method: Czech Republic and Slovakia Source table: ODTP .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DepreciationType~ToXMLString.html
