name: CreditCardPayments
title: CreditCardPayments Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments.html
description: 'The CreditCardPayments object enables to define dates for incoming payments from the credit card company. Source table: OCDT .'
remarks: 'Mandatory fields in SAP Business One: DueDateCode . To display the form in the application: - Select Administration --> Setup --> Banking --> Credit Card Payment .'
methods:
- name: Add
  description: Adds a credit card due date payments definition.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
