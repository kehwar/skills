  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~Browser.html
- name: DueDateCode
  description: 'Sets or returns the code of the credit card due date payments. Field name: Code . Mandatory property. Length: 8 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~DueDateCode.html
  field_name: Code
  length: 8
- name: DueDateName
  description: 'Sets or returns the name of the credit card due date payments. Field name: Name . Length: 30 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~DueDateName.html
  field_name: Name
  length: 30
- name: DueDatesType
  description: 'Determines whether the payment due dates are based on ddtAfterTimePeriod (after number of days and months) or ddtByDates (voucher date of receipt). Field name: TERM_TYPE .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~DueDatesType.html
  field_name: TERM_TYPE
- name: FromDay1
  description: 'Sets or returns the beginning day of the first period of voucher receipt. Field name: Day_From1 .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~FromDay1.html
  field_name: Day_From1
- name: FromDay2
  description: 'Sets or returns the begining day of the second period of voucher receipt. Field name: Day_From2 .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~FromDay2.html
  field_name: Day_From2
- name: FromDay3
  description: 'Sets or returns the begining day of the third period of voucher receipt. Field name: Day_From3 .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCardPayments~FromDay3.html
  field_name: Day_From3
- name: FromDay4
  description: 'Sets or returns the begining day of the fourth period of voucher receipt. Field name: Day_From4 .'
