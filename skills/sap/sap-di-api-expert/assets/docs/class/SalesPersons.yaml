name: SalesPersons
title: SalesPersons Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons.html
description: 'The SalesPersons object enables to define sales employees and their commision percentage. Source table: OSLP .'
remarks: 'Mandatory fields in SAP Business One: SalesEmployeeName . To display the form in the application: - Select Administration -->Setup -->General -->Sales Employees .'
methods:
- name: Add
  description: Adds a sales person employee.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~GetByKey.html
- name: Remove
  description: Deletes the current record.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Update.html
properties:
- name: Active
  description: 'Determines whether the sales employee is active or not. Field name: Active .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Active.html
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Browser.html
- name: CommissionForSalesEmployee
  description: 'Sets or returns the commission percentage for the sales employee. Field name: Commission .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~CommissionForSalesEmployee.html
  field_name: Commission
- name: CommissionGroup
  description: 'Sets or returns commission group code, which is relevant to the sales employee. This is a foreign key to the CommissionGroups object. Sets or returns the commission percentage for the sales employee. Field name: GroupCode . This is a foreign key to the CommissionGroups object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~CommissionGroup.html
  field_name: GroupCode
- name: eMail
  description: 'Sets or returns the Email of the sales employee. Length: 100 characters. Field name: Email .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~eMail.html
  field_name: Email
  length: 100
- name: EmployeeID
  description: 'Returns the employee ID code. Field name: EmpID . This is a foreign key to the EmployeesInfo object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~EmployeeID.html
  field_name: EmpID
- name: Fax
  description: 'Sets or returns the fax number of the sales employee. Length: 50 characters. Field name: Fax .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Fax.html
  length: 50
- name: Locked
  description: 'Returns whether or not the sales person definition is locked for update. Field name: Locked .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Locked.html
- name: Mobile
  description: 'Sets or returns the mobile number of the sales employee. Length: 50 characters. Field name: Mobil.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Mobile.html
  field_name: Mobil
  length: 50
- name: Remarks
  description: 'Sets or returns the remarks related to the sales employee. Length: 50 characters. Field name: Memo .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Remarks.html
  field_name: Memo
  length: 50
- name: SalesEmployeeCode
  description: 'Returns the primary key of the sales employee as assigned by the system. Field name: SlpCode .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~SalesEmployeeCode.html
  field_name: SlpCode
- name: SalesEmployeeName
  description: 'Sets or returns the name of the sales employee. Mandatory property. Field name: SlpName . Length: 155 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~SalesEmployeeName.html
  field_name: SlpName
  length: 155
- name: Telephone
  description: 'Sets or returns the telephone number of the sales employee. Length: 50 characters. Field name: Telephone.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~Telephone.html
  length: 50
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesPersons~UserFields.html
