- name: Delete
  description: Deletes an existing partner.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PartnersSetupsService~Delete.html
- name: Get
  description: Retrieves a partner. The partner is specified by its key, which is contained in the PartnersSetupParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PartnersSetupsService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the PartnersSetupsService .
