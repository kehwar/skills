name: PartnersSetupsService
title: PartnersSetupsService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PartnersSetupsService.html
description: 'The PartnersSetupsService service enables you to add, look up, update, and remove partners. Source table: OPRT .'
remarks: To open the Partners - Setup window, from the SAP Business One Main Menu , choose Administration --> Setup --> Sales Opportunities --> Partners .
methods:
