name: SpecialPrices
title: SpecialPrices Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SpecialPrices.html
description: 'Represents a discount for a specific item in a specific price list. The discount can apply to a specific business partner or for all business partners. - Specific Partners: To view discounts for specific business partners, select Inventory --> Price Lists --> Special Prices --> Special Prices for Business Partners. - All Business Partners: To view discounts for all business partners, select Inventory --> Price Lists --> Period and Volume Discounts. In previous versions, this was called Hierarchies and Expansions . For a specific business partner, the item and business partner must be unique; for all business partners, the item and price list must be unique. Source table: OSPP Mandatory fields: ItemCode'
remarks: 'For marketing documents, the system checks for special prices in the following order: - Special prices (this object) for the specified business partner - Discount groups ( DiscountGroups ) for the specified business partner and item - Special prices (this object) for all business partners If no special prices are found, the price is set by the default price list for the business partner.'
