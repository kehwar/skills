name: ChooseFromList
title: ChooseFromList Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChooseFromList.html
description: 'The ChooseFromList object enables to set the display of the Choose From List for a specified object. Source table: OCHF .'
remarks: 'Mandatory field in SAP Business One: ObjectName . For example, to display the Choose From List Settings form of business partners (object name: OCRD): - Select a document, click the Customer field and then press the Tab key. The BP List window opens. From the main menu, select Tools --> Form Settings .'
methods:
- name: Add
  description: Adds a Choose from List Settings for a specified object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChooseFromList~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChooseFromList~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChooseFromList~GetByKey.html
- name: Remove
