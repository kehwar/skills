- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ActivityTypes~Browser.html
- name: Code
  description: 'Returns the key of the activity type. Field name: Code .'
