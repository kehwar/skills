name: ChangeLogDifferenceParams
title: ChangeLogDifferenceParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams.html
description: Holds the detailed change information about the selected instances.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~ToXMLString.html
properties:
- name: ArrayOffset
  description: 'The array table in which the changed data is located. Field name: OffSet .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~ArrayOffset.html
  field_name: OffSet
- name: ChangedField
  description: 'The field that was changed. Field name: FieldName .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~ChangedField.html
  field_name: FieldName
- name: Date
  description: 'The date on which the change was made. Field name: UpdateDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~Date.html
  field_name: UpdateDate
- name: LineNumber
  description: 'The document line to which you have made changes. Field name: LineNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~LineNumber.html
  field_name: LineNum
- name: NewValue
  description: 'Value of the field after the change. Field name: NewValue .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~NewValue.html
- name: OldValue
  description: 'Value of the field before the change. Field name: OldValue .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~OldValue.html
- name: UserName
  description: 'The name of the user who made this change. Field name: UserName .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ChangeLogDifferenceParams~UserName.html
