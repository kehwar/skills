name: ServiceContracts
title: ServiceContracts Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ServiceContracts.html
description: 'ServiceContracts is a business object that represents the service contracts table in the Service module of SAP Business One application. This object enables you to: - Add a service contract. Retrieve a service contract by its key. Update a service contract. Remove a service contract. Save the object in XML format. Source table: OCTR .'
remarks: 'Mandatory fields in SAP Business One: CustomerCode , EndDate , and ResolutionTime . To display the form in the application: - Select Service --> Service Contract .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ServiceContracts~Add.html
- name: Close
  description: Not supported.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ServiceContracts~Close.html
- name: GetAsXML
