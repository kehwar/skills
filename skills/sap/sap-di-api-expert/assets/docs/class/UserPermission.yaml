name: UserPermission
title: UserPermission Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission.html
description: 'UserPermission is a business object that enables to set the authorization of a specified user to a UserPermissionTree . Source table: USR3 .'
remarks: 'To display the form in the application: - Select Administration --> System Initialization --> Authorization --> General Authorization . See example of Authorizations Tree .'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~SetCurrentLine.html
properties:
- name: Count
  description: Returns the total rows in the table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~Count.html
- name: EffectivePermission
  description: property EffectivePermission
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~EffectivePermission.html
- name: Permission
  description: 'Sets or returns a valid value of BoPermission type that specifies the permission type assigned to the user. The available options are according to the setting of Options property. Field name: Permission .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~Permission.html
- name: PermissionID
  description: 'Sets or returns the identification key of the user permission in the tree, for which the permission is set.Length: 20 characters. Field name: PermId . This is a foreign key to the UserPermissionTree object, not exposed through the DI API).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~PermissionID.html
  field_name: PermId
  length: 20
- name: UserCode
  description: Returns the user code.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~UserCode.html
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~UserPermission~UserFields.html
