name: DunningTermLine
title: DunningTermLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine.html
description: 'Represents a criterion for sending out a dunning letter. For example, a dunning term can define dunning letters for 30, 60, and 90-day delinquent balances. The term would, therefore, contain three lines, one for each dunning letter. Source table: DUT1 Mandatory properties: Effectiveafter , LetterFormat'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~ToXMLString.html
properties:
- name: CalculateInterest
  description: 'Indicates whether to calculate interest for this dunning letter. The default is yes. Field name: CalcIntrst'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~CalculateInterest.html
  field_name: CalcIntrst
- name: Effectiveafter
  description: 'The number of days following the due date of delinquent balances when this dunning letter is to be sent. Field name: EffctAftr'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~Effectiveafter.html
  field_name: EffctAftr
- name: LetterFee
  description: 'The fee for sending this dunning letter. Field name: LetterFee'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~LetterFee.html
- name: LetterFeeCurrency
  description: 'The currency for the letter fee. Field name: FeeCurr'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~LetterFeeCurrency.html
  field_name: FeeCurr
- name: LetterFormat
  description: 'The letter format in the Print Layout Designer for use with this dunning letter. Field name: LetterFrmt'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~LetterFormat.html
  field_name: LetterFrmt
- name: LevelNum
  description: 'The dunning level for this dunning letter. Field name: LevelNum'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~LevelNum.html
- name: MininumBalance
  description: 'Specifies the minimum balance for producing this dunning letter. Field name: MinBalance'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~MininumBalance.html
  field_name: MinBalance
- name: MininumBalanceCurrency
  description: 'The currency for the minimum balance. Field name: MinBlnCurr'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTermLine~MininumBalanceCurrency.html
  field_name: MinBlnCurr
