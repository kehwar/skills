name: ItemsAttributeGroups
title: ItemsAttributeGroups Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemsAttributeGroups.html
description: 'ItemsAttributeGroups is a child object of the Items object. You can manage the attributes of an asset. Source table: ITM13 .'
remarks: To access the subtab, from the SAP Business One Main Menu , choose Financials --> Fixed Assets --> Asset Master Data . Select the Fixed Assets tab and then the Additional Information subtab.
