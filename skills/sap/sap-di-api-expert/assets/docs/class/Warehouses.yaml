name: Warehouses
title: Warehouses Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Warehouses.html
description: 'Warehouses is a business object that represents the warehouses information in the Inventory module. This object enables you to: - Add a warehouse. Retrieve a warehouse by its key. Update a warehouse details. Remove a warehouse. Save the object in XML format. Source table: OWHS .'
remarks: 'Mandatory field in SAP Business One: WarehouseCode . To display the form in the application: - Select Administration --> Setup --> Inventory --> Warehouses . The warehouse definition includes: - Warehouse type - Warehouse address - G/L accounts, which are defined in ChartOfAccounts , used in Item Master Data - Inventory Data in case GLMethod property is set to WH .'
