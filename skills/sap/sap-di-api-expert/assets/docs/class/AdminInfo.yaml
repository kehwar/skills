name: AdminInfo
title: AdminInfo Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AdminInfo.html
description: 'The AdminInfo is a data structure related to the CompanyService . It includes administration properties for system initialization (company details, document settings, and general settings), and various definitions, such as financials and banking. The properties default values vary according to the country localization. Source table: OADM .'
remarks: 'The AdminInfo fields appear in various forms of the Administration module. For example: - Administration --> Setup --> Banking Administration --> Setup --> Financials Administration --> Authorizations --> General Authorizations Administration --> System Initialization --> Company Details Administration --> System Initialization --> Document Settings'
