name: CreditCards
title: CreditCards Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards.html
description: 'The CreditCards object enables to define credit cards that the company can use for incoming and outgoing payments. Source table: OCRC .'
remarks: 'Mandatory fields in SAP Business One: CreditCardName and GLAccount . To display the form in the application: - Select Administration --> Setup --> Banking --> Credit Cards .'
methods:
- name: Add
  description: Adds a new credit card definition.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~GetByKey.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~Browser.html
- name: CompanyID
  description: 'Sets or returns the company number at the credit card company. Field name: CompanyId . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~CompanyID.html
  field_name: CompanyId
  length: 20
- name: CountryCode
  description: property CountryCode
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~CountryCode.html
- name: CreditCardCode
  description: 'Returns the credit card code as assigned by the application when defining a new credit card. Field name: CreditCard .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~CreditCardCode.html
  field_name: CreditCard
- name: CreditCardName
  description: 'Sets or returns the credit card name (credit card company). Field name: CardName . Mandatory property. Length: 30 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~CreditCardName.html
  field_name: CardName
  length: 30
- name: GLAccount
  description: 'Sets or returns the G/L account (from the ChartOfAccounts object) assigned to transactions made with the credit card. Field name: AcctCode . Mandatory property. Length: 15 characters. This is a foreign key to the ChartOfAccounts object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~GLAccount.html
  field_name: AcctCode
  length: 15
- name: Telephone
  description: 'Sets or returns the phone number of the credit card company. Field name: Phone . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~Telephone.html
  field_name: Phone
  length: 50
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditCards~UserFields.html
