name: CertificateSeries
title: CertificateSeries Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries.html
description: 'Represents a series for TDS (withholding tax) reports. Source table: OCSN .'
remarks: 'For India only. Mandatory properties: Code , Location , Section ; the Location and Section properties, together, must be unique.'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~ToXMLString.html
properties:
- name: AbsEntry
  description: 'The key for the certificate series. Field name: AbsId'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~AbsEntry.html
  field_name: AbsId
- name: Code
  description: 'The display name for the certificate series. Field name: Code'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~Code.html
- name: DefaultSeries
  description: 'The default series for TDS (Form 16A) reports. Field name: DfltSeries'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~DefaultSeries.html
  field_name: DfltSeries
- name: Location
  description: 'The location associated with the certificate series. Field name: Location This is a foreign key to the WarehouseLocations object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~Location.html
- name: Section
  description: 'The section associated with the certificate series. Field name: Section This is a foreign key to the Section object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~Section.html
- name: SeriesLines
  description: The series details. Currently, a certificate series can have only one series line in this property.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CertificateSeries~SeriesLines.html
