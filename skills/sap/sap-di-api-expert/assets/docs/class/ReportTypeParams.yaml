name: ReportTypeParams
title: ReportTypeParams Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams.html
description: Holds the key to an existing report type. This object is used to pass keys to and retrieve keys from ReportTypesService methods.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~ToXMLString.html
properties:
- name: AddonFormType
  description: 'The type of the add-on form. Field name: FRM_TYPE .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~AddonFormType.html
  field_name: FRM_TYPE
- name: AddonName
  description: 'The name of the add-on. Field name: ADD_NAME .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~AddonName.html
  field_name: ADD_NAME
- name: MenuID
  description: 'The menu ID. Field name: MNU_ID .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~MenuID.html
  field_name: MNU_ID
- name: TypeCode
  description: 'The type of the report. Field name: CODE . Length: 4 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~TypeCode.html
  field_name: CODE
  length: 4
- name: TypeName
  description: 'The name of the report type. Field name: NAME .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ReportTypeParams~TypeName.html
  field_name: NAME
