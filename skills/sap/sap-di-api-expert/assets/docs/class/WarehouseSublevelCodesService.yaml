kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WarehouseSublevelCodesService.html
description: 'The WarehouseSublevelCodesService service enables you to add, look up, update, and remove warehouse sublevel codes. Source table: OBSL .'
remarks: To access the Warehouse Sublevel Codes - Setup window, from the SAP Business One Main Menu , choose Administration --> Setup --> Inventory --> Bin Locations --> Warehouse Sublevel Codes .
