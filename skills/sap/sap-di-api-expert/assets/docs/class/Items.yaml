name: Items
title: Items Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Items.html
description: 'Items is a business object that represents the items master data in the Inventory and Production module. This object enables you to: - Add an item details. Retrieve an item by its key. Update item details. Save the object in XML format. Source table: OITM .'
remarks: 'Mandatory fields in SAP Business One: ItemCode and Manufacturer . To display the Item Master Data window, from the SAP Business One Main Menu , choose Inventory --> Item Master Data . SAP Business One also lets you manage all fixed assets in the asset master data. To access the Asset Master Data window, from the SAP Business One Main Menu , choose Financials --> Fixed Assets --> Asset Master Data .'
methods:
- name: Add
  description: Adds a new record to the OITM table. Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~Items~Add.html
- name: Cancel
