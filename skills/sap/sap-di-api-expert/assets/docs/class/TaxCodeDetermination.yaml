  field_name: BusArea
- name: Condition1
  description: 'The condition based upon which the tax code is determined. If you select more than one condition, all conditions must be met for the tax code determination rule to be applied. Mandatory property. Field name: Cond1 .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TaxCodeDetermination~Condition1.html
  field_name: Cond1
