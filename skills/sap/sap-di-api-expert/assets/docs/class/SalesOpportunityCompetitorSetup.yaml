name: SalesOpportunityCompetitorSetup
title: SalesOpportunityCompetitorSetup Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup.html
description: 'Represents a competitor. Source table: OCMT Mandatory properties: Name'
remarks: The SalesOpportunitiesCompetition object represents the competitor assigned to a specific sales opportunity.
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~ToXMLString.html
properties:
- name: Details
  description: 'A comment about the competitor. Field name: Memo'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~Details.html
  field_name: Memo
- name: Name
  description: 'The name of the competitor. Field name: Name'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~Name.html
- name: SequenceNo
  description: 'The key for a specific competitor. Field name: CompetId'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~SequenceNo.html
  field_name: CompetId
- name: ThreatLevel
  description: 'The threat level for the competitor, either low (1), medium (2), or high (3). The default is low. Field name: ThreatLevl'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesOpportunityCompetitorSetup~ThreatLevel.html
  field_name: ThreatLevl
