name: AlternativeItem
title: AlternativeItem Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem.html
description: 'A data structure object related to the AlternativeItemsService service. Source table: OALI .'
methods:
- name: FromXMLFile
  description: Imports data from an XML file to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~FromXMLFile.html
- name: FromXMLString
  description: Imports data from an XML string to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~FromXMLString.html
- name: GetXMLSchema
  description: Retrieves the XML schema of the data structure.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~ToXMLFile.html
- name: ToXMLString
  description: Creates an XML string that represents the object data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~ToXMLString.html
properties:
- name: AlternativeItemCode
  description: Sets or returns unique ID of the alternative item.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~AlternativeItemCode.html
- name: MatchFactor
  description: Returns or sets a value specifying the matching degree of this item with the original item. A higher value represents a higher match.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~MatchFactor.html
- name: Remarks
  description: Returns or sets a string specifying comments to this alternative item.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AlternativeItem~Remarks.html
