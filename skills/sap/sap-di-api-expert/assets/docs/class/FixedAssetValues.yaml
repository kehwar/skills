  description: 'The asset''s unplanned depreciation amount. Field name: UnpDprVal .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FixedAssetValues~UnplanedDepreciationValue.html
  field_name: UnpDprVal
- name: WriteUp
  description: 'The asset''s write-up amount. In SAP Business One, write-up is the increase in an asset''s value as a result of manual appreciation or revaluation. Field name: Write-Up .'
