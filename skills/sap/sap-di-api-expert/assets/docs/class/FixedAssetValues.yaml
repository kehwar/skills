  description: 'If the asset is planned for quantity maintenance, the field displays the quantity at the beginning and end of the year. Field name: Quantity .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FixedAssetValues~Quantity.html
