  field_name: AcqCost
- name: Appreciation
  description: 'The asset''s appreciation amount. Field name: Appreciate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FixedAssetValues~Appreciation.html
  field_name: Appreciate
- name: DepreciationValue
  description: 'The asset''s depreciation amount. Field name: DprVal .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FixedAssetValues~DepreciationValue.html
  field_name: DprVal
- name: NetBookValue
  description: 'The asset''s net book value. Field name: NBV .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~FixedAssetValues~NetBookValue.html
