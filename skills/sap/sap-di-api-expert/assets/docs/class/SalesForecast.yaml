name: SalesForecast
title: SalesForecast Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast.html
description: 'SalesForecast is a business object that represents the sales forecast for a specified period. The sales forecast is required for planning the purchase and production of items in the MRP module. This object enables you to: - Add a sales forecast. Retrieve a sales forecast by its key. Update a sales forecast. Remove a sales forecast. Save the object in XML format. Source table: OFCT .'
remarks: 'Mandatory fields in SAP Business One: ForecastCode and ForecastName . To display the form in the application: - Select MRP --> Define Forecasts .'
methods:
- name: Add
  description: Adds a record to the object table in SAP Business One company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Add.html
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~GetByKey.html
- name: Remove
  description: Deletes a record from the object table.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Remove.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~SaveToFile.html
- name: SaveXML
  description: Saves the object data to XML formatted data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~SaveXML.html
- name: Update
  description: Updates the object data in the company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Update.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Browser.html
- name: ForecastCode
  description: 'Sets or returns the sales forecast code. Field name: Code Mandatory property. Length: 16 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~ForecastCode.html
  field_name: Code
  length: 16
- name: ForecastEndDate
  description: 'Sets or returns the end date for the sales forecast. The default is the last day of the current year. Field name: EndDate'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~ForecastEndDate.html
  field_name: EndDate
- name: ForecastName
  description: 'Sets or returns the sales forecast name. Mandatory property. Field name: Name Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~ForecastName.html
  field_name: Name
  length: 100
- name: ForecastStartDate
  description: 'Sets or returns the start date for the sales forecast. The default is the current date. Field name: StartDate'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~ForecastStartDate.html
  field_name: StartDate
- name: Lines
  description: Returns the SalesForecast_Lines child object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Lines.html
- name: Numerator
  description: 'Returns the sales forecast absolute ID. Field name: AbsID'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~Numerator.html
  field_name: AbsID
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~UserFields.html
- name: View
  description: 'Indicates whether the lines represent daily, weekly, or monthly forecasts. The default is daily. Field name: FormView'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~SalesForecast~View.html
  field_name: FormView
