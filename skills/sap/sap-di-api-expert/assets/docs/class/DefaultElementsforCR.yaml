name: DefaultElementsforCR
title: DefaultElementsforCR Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR.html
description: 'With default elements in SAP Business One, you can maintain unified translations for Crystal Reports layouts according to different document languages. Source table: OMLP .'
remarks: "From the SAP Business One Main Menu , choose Administration â\x86\x92 Setup â\x86\x92 General â\x86\x92 Default Elements for SAP Crystal Reports . In the Default Elements for SAP Crystal Reports window, you can: - Find a list of predefined elements and their English and German translations (right-click the element and choose Translate... ). - Add default elements."
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~ToXMLString.html
properties:
- name: Code
  description: 'The code of the predefined elements. Field name: Code .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~Code.html
- name: Name
  description: 'The name of the predefined elements. Field name: Name . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DefaultElementsforCR~Name.html
  length: 100
