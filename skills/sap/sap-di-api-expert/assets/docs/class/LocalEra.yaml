name: LocalEra
title: LocalEra Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra.html
description: 'LocalEra is a business object that represents the Local Era. Local Era is a type of calendar system that co-existent in some countries (such as, Japan) with the Gregorian calendar. This object enables you to: - Browse the Local Era table for mapping to or from the Gregorian calendar ( Browser ). Retrieve details about the Local Era by its key ( Code ). Retrieve the Local Era details from XML data. Save the object to a file as XML data. Save the object as XML formatted data. Source table: OJPE .'
remarks: 'Country-specific for Japan. To display the form in the application: - Select Administration --> Setup --> Define Local Era .'
methods:
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~GetAsXML.html
- name: GetByKey
  description: Retrieves and sets the values of the object's properties by the object's absolute key from the Company database.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~GetByKey.html
- name: SaveToFile
  description: Save the object to a file as XML data.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~SaveToFile.html
- name: SaveXML
  description: method SaveXML
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~SaveXML.html
properties:
- name: Browser
  description: Returns the DataBrowser object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~Browser.html
- name: Code
  description: 'Returns the Local Era code. Field name: Code . Length: 1 character.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~Code.html
  length: 1
- name: EraName
  description: 'Returns the Local Era name. Field name: EraName . Length: 20 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~EraName.html
  length: 20
- name: StartDate
  description: 'Returns the start date of the Local Era calendar. Field name: StartDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~StartDate.html
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~LocalEra~UserFields.html
