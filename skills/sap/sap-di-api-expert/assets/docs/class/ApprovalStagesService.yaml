name: ApprovalStagesService
title: ApprovalStagesService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ApprovalStagesService.html
description: 'ApprovalStagesService is a business object that manages the Approval stages Process in SAP Business One environment. This object enables user to: - Add new Approval Stage to approval Process. Get Approval Stage from approval Process. Get a list of Approval Stages from approval Process. Remove Approval Stage from approval Process. Update Approval Stage within approval Process. Get Data interfaces. Source table: OWST .'
remarks: 'To use the service: - Connect to a valid company. Call the CompanyService , which is the main DI service that you must call before using any other service. Call the method GetBusinessService for the required service. Create an empty data structure related to the required service. - or- You can create a data structure from an XML file or XML string. Set the required properties of the specified data structure. Call the required service method. To display the form in the application: Select Administration --> Approval Procedure --> Approval Stages .'
methods:
