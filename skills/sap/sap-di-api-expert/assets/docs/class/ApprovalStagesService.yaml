  description: Adds a new ApprovalStage to the ApprovalStages data collection Object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ApprovalStagesService~AddApprovalStage.html
