name: EmployeeRolesInfo
title: EmployeeRolesInfo Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo.html
description: 'A child object of the EmployeesInfo object that represents the employee roles, for example, technician , sales employee and purchasing . Source table: HEM6 .'
remarks: 'To display the form in the application: - Select Human Resources --> Employee Master Data. Select the Membership tab. To modify the master data list of employees roles, use the EmployeeRolesSetupService service.'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~SetCurrentLine.html
properties:
- name: Count
  description: Returns the number of roles of the employee.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~Count.html
- name: EmployeeID
  description: 'Sets or returns the employee ID, which SAP Business One generates automatically when adding a new employee. Field name: empID . This is a foreign key to the EmployeesInfo object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~EmployeeID.html
  field_name: empID
- name: LineNum
  description: 'Returns the current row number in the employee roles list. Field name: line .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~LineNum.html
  field_name: line
- name: RoleID
  description: 'Sets or returns the role ID of the employee. Field name: roleID . This is a foreign key to OHTY table, which is not exposed through the DI API.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~RoleID.html
  field_name: roleID
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeRolesInfo~UserFields.html
