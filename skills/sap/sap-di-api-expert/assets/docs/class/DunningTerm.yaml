name: DunningTerm
title: DunningTerm Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm.html
description: 'Represents a dunning term, which defines a set of dunning levels that determine when to send dunning letters for past-due balances. A dunning term can be assigned to a business partner. Source table: ODUT Mandatory properties: Code , Name ; DunningTermLines must not be empty'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~ToXMLString.html
properties:
- name: ApplyHighestLetterTemplate
  description: 'Indicates whether to use the template for the highest dunning level of all the documents included in the letter. The default is no. Field name: HiLtrFrmt'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~ApplyHighestLetterTemplate.html
  field_name: HiLtrFrmt
- name: AutomaticPosting
  description: property AutomaticPosting
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~AutomaticPosting.html
- name: BaseDateSelect
  description: property BaseDateSelect
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~BaseDateSelect.html
- name: CalculateInterestMethod
  description: 'Indicates whether to calculate the interest on the remaining amount or on the original total. Field name: RemIntrst'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~CalculateInterestMethod.html
  field_name: RemIntrst
- name: Code
  description: 'The key for a specific dunning term. Field name: TermCode'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~Code.html
  field_name: TermCode
- name: DaysInMonth
  description: 'The number of days in a month for calculating interest. The default is 30. Field name: MonthDays'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~DaysInMonth.html
  field_name: MonthDays
- name: DaysInYear
  description: 'The number of days in a year for calculating interest. The default is 360. Field name: YearDays'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~DaysInYear.html
  field_name: YearDays
- name: DunningTermLines
  description: Defines the dunning levels for the current dunning term.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~DunningTermLines.html
- name: ExchangeRateSelect
  description: 'Indicates whether to use the original exchange rate defined in the invoice, or to use the exchange rate defined for the day on which the dunning letters are created. This option is relevant when calculating interest in foreign currency. Field name: XchgOrig'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~ExchangeRateSelect.html
  field_name: XchgOrig
- name: FeeAccount
  description: property FeeAccount
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~FeeAccount.html
- name: GroupingMethod
  description: 'Indicates whether to produce dunnings per invoice, per dunning level, or per business partner. The default is per business partner. Field name: GrpMethod'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~GroupingMethod.html
  field_name: GrpMethod
- name: IncludeInterest
  description: 'Indicates whether to charge interest for delinquent balances. The default is yes. Field name: CalcIntr'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~IncludeInterest.html
  field_name: CalcIntr
- name: InterestAccount
  description: property InterestAccount
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~InterestAccount.html
- name: LetterFee
  description: 'Specifies the fee to charge per dunning letter. Field name: TotalFee'
