- name: Name
  description: 'The name for a specific dunning term. Field name: TermName'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~Name.html
