  field_name: TotalFee
- name: LetterFeeCurrency
  description: 'The currency for the letter fee. Field name: FeeCurr'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DunningTerm~LetterFeeCurrency.html
