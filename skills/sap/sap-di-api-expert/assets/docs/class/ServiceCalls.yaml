description: 'ServiceCalls is a business object that represents the service calls table in the Service module. This object enables you to: - Add a service call. Retrieve a service call by its key. Update a service call. Remove a service call. Save the object in XML format. Source table: OSCL .'
remarks: 'Mandatory field in SAP Business One: CustomerCode and Subject . To display the form in the application: - Select Service --> Service Call .'
