name: MessageHeader
title: MessageHeader Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MessageHeader.html
description: 'MessageHeader is a data structure related to the MessagesService . The data is stored temporarily in the memory in a virtual table (at a later stage, the data is stored in the OAOB and OAIB tables). Source tables: - OAOB (Message Sent). OAIB (Received Alerts).'
