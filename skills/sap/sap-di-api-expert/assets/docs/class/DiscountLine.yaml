name: DiscountLine
title: DiscountLine Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine.html
description: 'Defines a single criteria for applying a cash discount, as well as the discount percentage. Source table: CDC1 Mandatory properties: - Day , Month (if discount is based on the current date) - NumOfDays (if discount is based on payment within a specific number of days after the document posting date)'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~ToXMLString.html
properties:
- name: Day
  description: 'The day of the month on which to apply the discount percentage specified in this line. Field name: Day'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~Day.html
- name: Discount
  description: 'The cash discount to grant if the current line''s criteria apply. Field name: Discount'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~Discount.html
- name: DiscountCode
  description: 'The key to this line''s parent CashDiscount object. Field name: CdcCode'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~DiscountCode.html
  field_name: CdcCode
- name: LineId
  description: 'The line number for this line. Each line within a specific CashDiscount object is assigned a unique line number. Field name: LineId'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~LineId.html
- name: Month
  description: 'The month in which to apply the discount percentage specified in this line. Field name: Month'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~Month.html
- name: NumOfDays
  description: 'Specifies the number of days following the document posting date after which this discount no longer applies. Field name: NumOfDays'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DiscountLine~NumOfDays.html
