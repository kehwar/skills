description: 'Items_Prices is a child object of the Items object that represents the items'' prices in the Inventory and Production module. This object enables you to specify prices for various price lists. Source table: ITM1'
remarks: 'Mandatory fields in SAP Business One: Price and PriceList . To display the form in the application: - Select Inventory --> Item Master Data . Select a Price List , and set a price .'
