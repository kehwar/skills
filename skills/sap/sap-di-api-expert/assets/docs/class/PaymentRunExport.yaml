name: PaymentRunExport
title: PaymentRunExport Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentRunExport.html
description: 'PaymentRunExport is a business object that enables you to export data of automatic payments for both incoming payments and outgoing payments to vendors. The automatic payments data is generated by running the Payment Wizard in SAP Business One. The property type of all properties in this object is read-only. This object enables you to: - Retrieve a payment by its key. Save the object in XML format. Source table: OPEX .'
remarks: 'To check whether or not the payment is closed, see the Status property. Mandatory fields in SAP Business One: None.'
methods:
- name: GetAsXML
  description: Returns the object from XML data, which is stored as string in a buffer.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~PaymentRunExport~GetAsXML.html
- name: GetByKey
