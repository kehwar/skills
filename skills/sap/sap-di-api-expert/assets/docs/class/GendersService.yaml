name: GendersService
title: GendersService Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService.html
description: 'The GendersService service enables you to add, look up, update, and remove genders you specified in addition to the system predefined employee gender type. Source table: OGDR .'
remarks: To see the list of genders, choose the Gender field on the Human Resources -> Employee Master Data -> Personal tab.
methods:
- name: Add
  description: Adds a gender.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~Add.html
- name: Delete
  description: Deletes an existing gender. The predefined genders in the system cannot be modified.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~Delete.html
- name: Get
  description: Retrieves a gender. The gender is specified by its key, which is contained in the GendersParams object passed to the method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~Get.html
- name: GetDataInterface
  description: Creates an empty data structure for use with the GendersService .
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~GetDataInterface.html
- name: GetDataInterfaceFromXMLFile
  description: Creates an object from an XML file.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~GetDataInterfaceFromXMLFile.html
- name: GetDataInterfaceFromXMLString
  description: Creates an object from XML.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~GetDataInterfaceFromXMLString.html
- name: GetList
  description: Returns the GendersParamsCollection data collection that identifies all genders.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~GetList.html
- name: Update
  description: Updates an existing gender. The predefined genders in the system cannot be modified. The data for the gender, including the key of the gender to be updated, is contained in the Gender object passed to the method. To update a gender, you must first retrieve it using the Get method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~GendersService~Update.html
