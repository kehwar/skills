name: ItemsPeriodControls
title: ItemsPeriodControls Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemsPeriodControls.html
description: 'ItemsPeriodControls is a child object of the Items object. You can define the depreciation calculation factors for different periods when you depreciate an asset using the straight line period control method with individual period control. Source table: ITM11 .'
remarks: 'To access the Depreciation Period Control window, do the following: - From the SAP Business One Main Menu , choose Financials --> Fixed Assets --> Asset Master Data , and select the Fixed Assets tab. On the Overview subtab of the Fixed Assets tab, select the row with the intended depreciation type in the Depreciation Parameters table and choose the Period Control pushbutton.'
methods:
