name: TargetGroup
title: TargetGroup Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~TargetGroup.html
description: 'A target group is a list of prospects. You can create a target group and then define a promotional campaign for targeting this group. You can add prospects either from existing customers and leads or from an external Microsoft Excel file. Source table: OTTG .'
