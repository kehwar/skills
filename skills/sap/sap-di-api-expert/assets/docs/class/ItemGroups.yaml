name: ItemGroups
title: ItemGroups Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~ItemGroups.html
description: 'ItemGroups is a business object that represents the item groups definition in the Inventory and Production module. This object enables you to: - Add an item group. Retrieve an item group by its key. Update an item group details. Remove an item group. Save the object in XML format. Source table: OITB'
remarks: 'Mandatory field in SAP Business One: GroupName . To display the form in the application: - Select Administration --> Setup --> Inventory --> Item Groups . The item group definition includes: - General information about the group of items. G/L accounts, which are defined in ChartOfAccounts , used in Item Master Data - Inventory Data in case GLMethod property is set to Item Group (Item Class).'
