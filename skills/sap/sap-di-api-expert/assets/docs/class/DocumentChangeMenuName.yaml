name: DocumentChangeMenuName
title: DocumentChangeMenuName Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~DocumentChangeMenuName.html
description: 'Represents the user-defined menu name for a specific document type/document subtype. For example, the menu for sales order documents is Sales Orders . The name can be changed to Orders (or any other string) with this object. Source table: The ONNM table, whose child table NNM1 is used for the SeriesService object, contains the field DocAlias , which is stored in the ChangedMenuName property.'
remarks: Use this object with the GetDocumentChangedMenuName and ChangeDocumentMenuName methods of the SeriesService .
