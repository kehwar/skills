name: MultiLanguageTranslations
title: MultiLanguageTranslations Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~MultiLanguageTranslations.html
description: 'The MultiLanguageTranslation object enables to translate alphanumeric data of specified fields in master data objects (such as, BusinessPartners and Items ) to foreign languages and then print documents in the translated language. This functionality is used by companies that trade with foreign business partners that require docouments in their language. Source table: OMLT .'
remarks: 'Prerequisites: - Set MultiLanguageSupportEnable (AdminInfo) to tYES . Set the UserLanguages object with the required foreign language. Set LanguageCode (BusinessPartners) to the requied foreign language. To display the form in the application: - Open a master data window (e.g. Business Partner Master Data). From the menu bar, select View --> Translatable Fields . A globe icon appears next to fields that can be translated. Click a field for translation and then from the menu bar, select Goto --> Translate .'
