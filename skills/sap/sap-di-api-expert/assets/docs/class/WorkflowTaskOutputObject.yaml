- name: Type
  description: 'Returns the type of the output data object. Field name: ObjectType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~Type.html
  field_name: ObjectType
