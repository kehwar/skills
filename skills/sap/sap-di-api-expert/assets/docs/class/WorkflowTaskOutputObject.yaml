name: WorkflowTaskOutputObject
title: WorkflowTaskOutputObject Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject.html
description: 'WorkflowTaskOutputObject is a data object holding properties for the workflow task output data object. Source table: WLS4'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~ToXMLString.html
properties:
- name: Key
  description: 'Returns the key of the output data object. Field name: ObjKey .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~Key.html
  field_name: ObjKey
- name: LineId
  description: 'Returns the line number of the output object. Field name: LineID .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~LineId.html
  field_name: LineID
- name: SubType
  description: 'Returns the the sub-type of the output data object if specified. Field name: ObjSubType .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~WorkflowTaskOutputObject~SubType.html
  field_name: ObjSubType
- name: TaskID
  description: 'Returns the ID of the related workflow task. Field name: TaskID .'
