name: BillOfExchange
title: BillOfExchange Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BillOfExchange.html
description: 'BillOfExchange is a business object that represents the Bill Of Exchange table in the Banking module. Bill Of Exchange is a commercial document used as a payment method in Spain, Portugal, Italy, France, Belgium, and Chile. Source table: OBOE .'
remarks: 'Mandatory fields in SAP Business One: BillOfExchangeDueDate and PaymentMethodCode . To display the form in the application: Definition: A Bill of Exchange is a signed, written order prepared by one party (drawer) who instructs another party (drawee) to pay a certain sum to a third party (payee) at a due date. The Bill of Exchange is used as a method of incoming or outgoing payment with a due date, as credit for the customer or as a flexible financing tool. Process of incoming payments : Process of outgoing payments :'
