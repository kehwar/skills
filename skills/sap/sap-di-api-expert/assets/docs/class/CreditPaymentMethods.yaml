name: CreditPaymentMethods
title: CreditPaymentMethods Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditPaymentMethods.html
description: 'The CreditPaymentMethods object enables to define payment methods by credit cards. Source table: OCRP .'
remarks: 'The methods for credit card payments are used by the Payments_CreditCards object. Mandatory field in SAP Business One: Name . To display the form in the application: - Select Administration --> Setup --> Banking --> Credit Card Payment Methods .'
methods:
- name: Add
  description: Adds a credit card payment method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~CreditPaymentMethods~Add.html
- name: GetAsXML
