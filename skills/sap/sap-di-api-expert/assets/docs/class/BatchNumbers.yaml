name: BatchNumbers
title: BatchNumbers Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BatchNumbers.html
description: 'BatchNumbers is a business object that represents the batch numbers of an item in the Inventory and Production module. This object enables you to add batch numbers for a selected item row (one record per item). Source table: OBTN , OBTW , OBTQ , OITL , ITL1 .'
remarks: 'Mandatory field in SAP Business One: BatchNumber . To display the form in the application: - Select Inventory --> Item Management --> Batches --> Define and Update Batch Numbers . In the Batch No. for Receipt - Selection Criteria window, set your selection criteria and then click OK . To deallocate batches without actually remove them from the stock (based on a delivery document) is to update the Sales Order so that it has no batches defined. Note that batches allocated by Reserve Invoice cannot be deallocated. Batches allocated by Reserve Invoice can only be drawn to a Delivery or Invoice document.'
methods:
