name: AssetDocumentAreaJournal
title: AssetDocumentAreaJournal Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal.html
description: 'AssetDocumentAreaJournal is a child object of AssetDocument object and represents the Accounting tab fields of an asset document. Source table: ACQ2 .'
methods:
- name: FromXMLFile
  description: Sets the object's properties using data from an XML file. The XML file can be created using the object's ToXMLFile method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~FromXMLFile.html
- name: FromXMLString
  description: Sets the object's properties using data from an XML string. The XML string can be created using the object's ToXMLString method.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~FromXMLString.html
- name: GetXMLSchema
  description: Returns the XML schema for the XML generated by the ToXMLFile and ToXMLString methods.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~GetXMLSchema.html
- name: ToXMLFile
  description: Creates an XML file that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~ToXMLFile.html
- name: ToXMLString
  description: Creates and returns an XML string that represents the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~ToXMLString.html
properties:
- name: CancellationJournalRemarks
  description: 'The remark about the journal entry generated upon the cancellation of the asset document. Field name: JrnlMemo1. Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~CancellationJournalRemarks.html
  field_name: JrnlMemo1
  length: 50
- name: CancellationTransactionNumber
  description: 'The transaction number that SAP Business One creates for the cancellation of the asset document. Field name: TransNum1 .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~CancellationTransactionNumber.html
  field_name: TransNum1
- name: DepreciationArea
  description: 'The Posting to G/L depreciation areas that are associated with the selected assets in this document. Field name: DprArea. Length: 15 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~DepreciationArea.html
  field_name: DprArea
  length: 15
- name: DocEntry
  description: 'The internal ID of the asset document. Field name: DocEntry .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~DocEntry.html
- name: JournalRemarks
  description: 'The remark about the journal entry generated in each depreciation area. Field name: JrnlMemo. Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~JournalRemarks.html
  field_name: JrnlMemo
  length: 50
- name: LineNumber
  description: 'The current row number in the list. Field name: LineNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~LineNumber.html
  field_name: LineNum
- name: TransactionNumber
  description: 'The transaction number that SAP Business One creates for the asset document. Field name: TransNum .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~AssetDocumentAreaJournal~TransactionNumber.html
  field_name: TransNum
