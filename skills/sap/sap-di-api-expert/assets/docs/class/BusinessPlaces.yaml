name: BusinessPlaces
title: BusinessPlaces Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~BusinessPlaces.html
description: 'BusinessPlaces is a business object that represents a company''s business locations. Each Korean company that issues tax invoices and VAT reports must indicate its business place. Each business place is bound with a VAT registry number. This object enables you to: - Retrieve a business place of a company by its key ( BPLID ). Retrieve a business place of a company from XML data. Save the object to a file as XML data. Save the object as XML formatted data. Source table: OBPL .'
remarks: 'Country-specific for Korea. Business Place is a mandatory field in all marketing documents. You can get all defined Business Place objects through this object and assign the Business Place on marketing documents. To display the form in the application: - Select Administration --> Setup --> Financials --> Define Business Places .'
