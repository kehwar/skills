name: EmployeeEducationInfo
title: EmployeeEducationInfo Object
kind: class
url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo.html
description: 'EmployeeEducationInfo is a child object of the EmployeesInfo object and represents the employee education information. Source table: HEM2 .'
remarks: 'To display the form in the application: - Select Human Resources --> Employee Master Data. Select the Administration tab. Click Education .'
methods:
- name: Add
  description: Adds a new data line to the object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~Add.html
- name: SetCurrentLine
  description: Sets the active row to a specified row number.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~SetCurrentLine.html
properties:
- name: Count
  description: Returns the total data rows in the employee education information list.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~Count.html
- name: Diploma
  description: 'Sets or returns the diploma of the employee (such as, BA, MBA, and so on). Field name: diploma . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~Diploma.html
  field_name: diploma
  length: 50
- name: EducationType
  description: 'Sets or returns the education type of the employee (such as, high-school, university, and so on). Field name: type . Length: 50 characters. This is a foreign key to the Education Types table ( OHED - not exposed through the DI API).'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~EducationType.html
  field_name: type
  length: 50
- name: EmployeeNo
  description: 'Sets or returns the employee ID, which SAP Business One generates automatically when adding a new employee. Field name: empID . This is a foreign key to the EmployeesInfo object.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~EmployeeNo.html
  field_name: empID
- name: FromDate
  description: 'Sets or returns the start date of the education period. Field name: fromDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~FromDate.html
  field_name: fromDate
- name: Institute
  description: 'Sets or returns the institute name. Field name: institute . Length: 100 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~Institute.html
  field_name: institute
  length: 100
- name: LineNum
  description: 'Returns the current row number in the employee education list. Field name: line .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~LineNum.html
  field_name: line
- name: Major
  description: 'Sets or returns the major study subject. Field name: major . Length: 50 characters.'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~Major.html
  field_name: major
  length: 50
- name: ToDate
  description: 'Sets or returns the end date of the education period. Field name: toDate .'
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~ToDate.html
  field_name: toDate
- name: UserFields
  description: Returns the UserFields object.
  url: https://help.sap.com/doc/089315d8d0f8475a9fc84fb919b501a3/10.0/en-US/SDKHelp/SAPbobsCOM~EmployeeEducationInfo~UserFields.html
